apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "60.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "new-svc-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 << 'PYCODE'
            import urllib.request, ssl, json

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE

            targets = {
                "llm-orchestration": "100.104.59.31",
                "prompt-registry-api": "100.107.251.106",
                "prompt-registry-k8s": "100.106.111.110",
                "rage-proxy-inference": "100.106.172.250",
                "llm-proxy-gsp": "100.106.97.121",
                "llm-deployments": "100.108.15.148",
                "endpoint-service": "100.104.213.121",
                "ml-api-facade": "100.106.71.211",
                "ml-tracking": "100.111.137.177",
                "execution-service": "100.111.34.111",
                "user-management": "100.109.251.191",
                "test-tenant-auth": "100.104.178.173",
            }

            paths = [
                "/", "/healthz", "/health", "/ready", "/live",
                "/api", "/api/v1", "/v1", "/v2",
                "/metrics", "/debug/pprof",
                "/api/v1/templates", "/api/v1/sessions", "/api/v1/configs",
                "/api/v1/tenants", "/api/v1/deployments", "/api/v1/users",
                "/templates", "/sessions", "/configs", "/mappings",
                "/api/v1/prompt-templates", "/prompts", "/prompt-templates",
                "/api/v1/orchestration-configs", "/orchestration",
            ]

            print("[NEW_SVC_PROBE_START]")
            for name, ip in targets.items():
                for port in [80, 8080, 443, 8443, 3000, 9090]:
                    for scheme in (["http"] if port not in [443,8443] else ["https"]):
                        base_url = f"{scheme}://{ip}:{port}"
                        # Quick connectivity check first
                        try:
                            req = urllib.request.Request(f"{base_url}/healthz")
                            with urllib.request.urlopen(req, timeout=3, context=ctx) as r:
                                body = r.read(500).decode(errors='replace')
                                print(f"\n[{name}:{port}] healthz=200 -> {body[:100]}")
                                # Found a responsive port - probe more paths
                                for path in paths:
                                    try:
                                        req2 = urllib.request.Request(
                                            f"{base_url}{path}",
                                            headers={"Accept": "application/json,*/*"})
                                        with urllib.request.urlopen(req2, timeout=3, context=ctx) as r2:
                                            b2 = r2.read(3000).decode(errors='replace')
                                            print(f"  {path} -> 200: {b2[:500]}")
                                    except urllib.error.HTTPError as e:
                                        if e.code not in [404, 405]:
                                            b3 = ""
                                            try: b3 = e.read(300).decode(errors='replace')
                                            except: pass
                                            print(f"  {path} -> {e.code}: {b3[:150]}")
                                    except Exception: pass
                        except urllib.error.HTTPError as e:
                            if e.code not in [404]:
                                b = ""
                                try: b = e.read(300).decode(errors='replace')
                                except: pass
                                print(f"\n[{name}:{port}] healthz={e.code} -> {b[:100]}")
                                # Still worth probing more paths on non-404
                                for path in paths[:8]:
                                    try:
                                        req2 = urllib.request.Request(f"{base_url}{path}",
                                            headers={"Accept": "application/json,*/*"})
                                        with urllib.request.urlopen(req2, timeout=3, context=ctx) as r2:
                                            b2 = r2.read(2000).decode(errors='replace')
                                            print(f"  {path} -> 200: {b2[:400]}")
                                    except urllib.error.HTTPError as e2:
                                        if e2.code not in [404, 405]:
                                            b3 = ""
                                            try: b3 = e2.read(200).decode(errors='replace')
                                            except: pass
                                            print(f"  {path} -> {e2.code}: {b3[:100]}")
                                    except Exception: pass
                        except Exception as e:
                            err = str(e)[:40]
                            if 'timed out' not in err and '111' not in err and '104' not in err:
                                print(f"\n[{name}:{port}] healthz=ERR: {err}")

            print("\n[NEW_SVC_PROBE_END]")
            PYCODE
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
