apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cve41485-asym-wf
  labels:
    scenarios.ai.sap.com/id: "asym-scenario"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "asym-scenario"
    executables.ai.sap.com/name: "cve41485-asym-wf"
    executables.ai.sap.com/description: "Mutation ordering asymmetry test (6 variants)"
spec:
  entrypoint: dag
  templates:
  - name: dag
    dag:
      tasks:
      - {name: a-empty, template: a-empty}
      - {name: b-runasuser, template: b-runasuser}
      - {name: c-allowpe-false, template: c-allowpe-false}
      - {name: d-capdrop, template: d-capdrop}
      - {name: e-seccomp, template: e-seccomp}
      - {name: f-runasnonroot, template: f-runasnonroot}
      - {name: g-readonly-fs, template: g-readonly-fs}

  - name: a-empty
    container:
      image: python:3.11
      env:
      - {name: ASYM_VARIANT, value: "A_empty"}
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
      securityContext: {}

  - name: b-runasuser
    container:
      image: python:3.11
      env:
      - {name: ASYM_VARIANT, value: "B_runAsUser1000"}
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
      securityContext:
        runAsUser: 1000

  - name: c-allowpe-false
    container:
      image: python:3.11
      env:
      - {name: ASYM_VARIANT, value: "C_allowPE_false"}
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
      securityContext:
        allowPrivilegeEscalation: false

  - name: d-capdrop
    container:
      image: python:3.11
      env:
      - {name: ASYM_VARIANT, value: "D_capDropAll"}
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
      securityContext:
        capabilities:
          drop: ["ALL"]

  - name: e-seccomp
    container:
      image: python:3.11
      env:
      - {name: ASYM_VARIANT, value: "E_seccompRT"}
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
      securityContext:
        seccompProfile:
          type: RuntimeDefault

  - name: f-runasnonroot
    container:
      image: python:3.11
      env:
      - {name: ASYM_VARIANT, value: "F_runAsNonRoot"}
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
      securityContext:
        runAsNonRoot: true

  - name: g-readonly-fs
    container:
      image: python:3.11
      env:
      - {name: ASYM_VARIANT, value: "G_readOnlyFS"}
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
      securityContext:
        readOnlyRootFilesystem: false
